              model:"There are strong reasons for a government to reduce income inequality. High inequality means significant poverty alongside great wealth, which is widely seen as unfair and can damage social cohesion and trust. Using progressive taxes and benefits to redistribute income shifts the Lorenz curve closer to the line of equality, directly narrowing the gap. There may be an efficiency case too: poorer households spend a higher proportion of any extra income (a higher marginal propensity to consume), so redistributing towards them can raise total consumption and aggregate demand. And improving equality of <em>opportunity</em>, especially through education, lets the economy draw on the talents of the whole population, which can raise long-run growth.<br><br>However, reducing inequality has real costs. Some inequality is necessary to create incentives: the prospect of higher pay rewards effort, skill and risk-taking, driving enterprise and productivity. Heavy redistribution can blunt these incentives &#8212; very high income taxes may discourage work and investment and even drive high earners and firms abroad. This is the <b>equity-efficiency trade-off</b>. Redistribution is also expensive, and if it relies on benefits alone it risks creating dependency, whereas supply-side routes such as education work better but <b>only slowly</b>.<br><br>On balance, a government should usually act to reduce <em>extreme</em> inequality, particularly by widening opportunity through education, since this improves both fairness and growth. But it must avoid destroying the incentives that an economy needs, so the way it reduces inequality matters just as much as whether it does.",
              modelDiagram:"lorenz" }
        ] },
        { code:"4.3.1", title:"Measures of development", notes:`
            <p><span class="keyword">Economic development</span> is broader than economic growth. Growth is simply a rise in real GDP; development is an improvement in people&apos;s overall welfare and quality of life &#8212; including health, education, and freedom, not just income.</p>
            <p>The standard measure is the <span class="keyword">Human Development Index (HDI)</span>, a composite index scored from 0 to 1. Remember its three components as HIE:</p>
            <div class="mnemonic">
              <div class="word">HIE <span class="hint">(the three components of the HDI &#8212; aim &apos;high&apos;)</span></div>
              <ul class="mnem-list">
                <li><span class="l">H</span><span><strong>Health</strong> &#8212; measured by life expectancy at birth.</span></li>
                <li><span class="l">I</span><span><strong>Income</strong> &#8212; measured by GNI per capita at purchasing-power parity (PPP).</span></li>
                <li><span class="l">E</span><span><strong>Education</strong> &#8212; measured by mean and expected years of schooling.</span></li>
              </ul>
            </div>
            <blockquote><b>Limitations of the HDI:</b> it ignores income <em>inequality</em>, the <em>environment</em>, and political <em>freedom</em> and human rights, and says nothing about cultural factors. (The limitations of using GDP/income alone are the LINE points from 2.1.1.) Other measures include the inequality-adjusted HDI, the Multidimensional Poverty Index, and happiness indices.</blockquote>
        `, questions:[
            { cmd:"Explain", marks:5, context:"Two countries have similar GDP per capita, but very different living standards.",
              text:"Explain why the Human Development Index may be a better measure of living standards than GDP per capita.",
              kaa:["GDP per capita measures only average income, not the wider quality of life.","The HDI is a composite measure combining health (life expectancy), education (years of schooling) and income (GNI per capita), so it captures development more fully.","Two countries with the same income can differ greatly in health and education, which the HDI reflects but GDP per capita does not."],
              ev:[],
              note:"Contrast the narrow income focus of GDP with the HDI&apos;s three dimensions. A brief mention of remaining HDI limitations (inequality, environment) strengthens it.",
              model:"GDP per capita measures only the average income in a country. It says nothing about how that income is used, how long people live, or whether they are educated &#8212; all of which matter for living standards.<br><br>The Human Development Index is broader. It is a composite index combining three dimensions: health, measured by life expectancy; education, measured by years of schooling; and income, measured by GNI per capita. Because it blends these together, it captures development more fully than income alone.<br><br>This matters because two countries can have the same GDP per capita yet very different lives: one might spend its income on healthcare and schooling, giving long, educated lives, while the other does not. The HDI would rank the first higher, reflecting the genuine difference in living standards that GDP per capita misses. It is not perfect &#8212; it still ignores inequality and the environment &#8212; but it is a fuller measure." }
        ] },
        { code:"4.3.2", title:"Factors influencing growth and development", diagram:"poverty-cycle", notes:`
            <p>Developing economies face a set of barriers that can trap them in poverty. A central one is the <span class="keyword">savings gap</span> (the Harrod&#8211;Domar model): low incomes mean low saving, so there is little to invest, which keeps capital and productivity &#8212; and therefore incomes &#8212; low (see the poverty-trap diagram, below).</p>
            {{diagram:poverty-cycle}}
            <p>The main barriers spell CAGED:</p>
            <div class="mnemonic">
              <div class="word">CAGED <span class="hint">(barriers that trap development)</span></div>
              <ul class="mnem-list">
                <li><span class="l">C</span><span><strong>Corruption &amp; weak governance</strong> &#8212; poor institutions, insecure property rights and political instability or conflict deter investment.</span></li>
                <li><span class="l">A</span><span><strong>Absence of capital (finance)</strong> &#8212; the savings gap and a foreign-currency gap, plus poor infrastructure, leave too little investment.</span></li>
                <li><span class="l">G</span><span><strong>Goods (primary-product) dependency</strong> &#8212; relying on volatile commodity exports exposes the economy to price swings (the Prebisch&#8211;Singer hypothesis says commodity prices fall over time relative to manufactures).</span></li>
                <li><span class="l">E</span><span><strong>Education &amp; health gaps</strong> &#8212; low human capital limits productivity; disease reduces the workforce.</span></li>
                <li><span class="l">D</span><span><strong>Debt</strong> &#8212; high external debt diverts scarce revenue into interest payments instead of development.</span></li>
              </ul>
            </div>
        `, questions:[
            { cmd:"Assess", marks:10, context:"A developing economy has very low rates of saving and investment.",
              text:"Assess the view that a lack of capital is the main barrier to economic development.",
              kaa:["Low incomes mean households can save little, so there are few funds for investment (the savings gap in the Harrod\u2013Domar model).","With little investment, the capital stock and infrastructure stay poor, holding back productivity and keeping incomes low \u2014 the poverty trap.","A foreign-currency gap can also prevent the country importing the capital equipment it needs."],
              ev:["Other barriers may matter more: corruption and weak institutions deter both domestic and foreign investment regardless of capital.","Primary-product dependency leaves the economy exposed to volatile commodity prices, undermining stable growth.","Low human capital (poor education and health) limits how productively any capital can be used. Judgement: a lack of capital is a major barrier, but capital alone achieves little without good governance, healthy, educated workers and stable export earnings \u2014 so it depends on the country&apos;s wider circumstances."],
              mnemonic:{ word:"CAGED", hint:"Barriers that trap development.", points:[
                {l:"C", t:"Corruption & weak governance / instability"},
                {l:"A", t:"Absence of capital (finance) \u2014 savings & foreign-currency gaps"},
                {l:"G", t:"Goods dependency \u2014 volatile primary exports"},
                {l:"E", t:"Education & health gaps \u2014 low human capital"},
                {l:"D", t:"Debt \u2014 interest diverts spending"}
              ]},
              note:"A 10-mark Assess wants about 6 marks of analysis and 4 of evaluation. Build the savings-gap/poverty-trap case (use the diagram), then argue other barriers may matter more, ending on what it depends on.",
              model:"A lack of capital (finance \u2014 the funds to invest, not capital equipment) is a powerful barrier to development. Because incomes are low, households can save very little, so there are few funds available for investment &#8212; the savings gap at the heart of the Harrod&#8211;Domar model. With little investment, the country&apos;s capital stock and infrastructure remain poor, so productivity stays weak and incomes stay low, which keeps saving low: a self-reinforcing poverty trap, as the diagram shows. A shortage of foreign currency can make things worse by preventing the import of the machinery the economy needs.<br><br>However, capital is far from the <b>only barrier</b>, and may not be the most important. Corruption and weak institutions deter both domestic and foreign investment no matter how much capital is potentially available, and political instability or conflict can destroy it. Many developing economies are also trapped by dependency on a few primary-product exports, whose volatile prices make stable growth difficult. And low human capital &#8212; poor education and ill health &#8212; means that even when capital is provided, it cannot be used productively.<br><br>On balance, a lack of capital is certainly a central barrier, but it rarely acts alone. Capital achieves little without good governance, healthy and educated workers, and stable export earnings, so whether it is the <em>main</em> barrier <b>depends on the particular country&apos;s circumstances</b>.",
              modelDiagram:"poverty-cycle" }
        ] },
        { code:"4.3.3", title:"Strategies influencing growth and development", notes:`
            <p>Strategies to promote development split into <strong>market-oriented</strong> approaches (using free markets and trade) and <strong>interventionist</strong> approaches (active government). The main strategies spell DRAFT:</p>
            <div class="mnemonic">
              <div class="word">DRAFT <span class="hint">(strategies for growth &amp; development)</span></div>
              <ul class="mnem-list">
                <li><span class="l">D</span><span><strong>Debt relief</strong> &#8212; cancelling or rescheduling debt frees scarce revenue for development spending.</span></li>
                <li><span class="l">R</span><span><strong>Reform &amp; markets</strong> &#8212; market-oriented policies: trade liberalisation, privatisation, removing subsidies, and microfinance.</span></li>
                <li><span class="l">A</span><span><strong>Aid</strong> &#8212; financial and technical assistance, which can fill the savings and foreign-currency gaps (but risks dependency).</span></li>
                <li><span class="l">F</span><span><strong>FDI</strong> &#8212; attracting foreign direct investment and TNCs to bring capital, jobs, technology and tax revenue.</span></li>
                <li><span class="l">T</span><span><strong>Training &amp; infrastructure</strong> &#8212; interventionist investment in human capital (education, health) and infrastructure, plus industrialisation (the Lewis model).</span></li>
              </ul>
            </div>
            <blockquote><b>No single answer:</b> the best strategy depends on the country. Market reforms can boost efficiency but may widen inequality; aid can help but risks dependency and waste under poor governance; FDI brings capital but profits may be repatriated. Most economists favour a mix, with strong institutions and human capital underpinning whatever is chosen.</blockquote>
        `, questions:[
            { cmd:"Discuss", marks:12, context:"A developing country is deciding whether to focus on attracting foreign direct investment from large multinationals.",
              text:"Discuss whether attracting foreign direct investment is the best way to promote development.",
              kaa:["FDI brings in capital (finance) that fills the savings gap, funding investment the country could not finance itself.","It creates jobs and incomes, raising living standards and government tax revenue.","TNCs can transfer technology, management skills and training, raising productivity.","They may also build infrastructure and open access to global markets and supply chains."],
              ev:["Much of the profit may be repatriated to the TNC&apos;s home country rather than reinvested locally.","TNCs may exploit cheap labour, damage the environment, or use capital-intensive methods that create few jobs, and being footloose they can leave.","Alternative strategies \u2014 aid, debt relief, trade, or investment in education and infrastructure \u2014 may suit some countries better, and FDI works poorly where governance is weak.","Judgement: FDI can be a powerful engine of development by relieving the capital shortage, but it is not automatically best \u2014 its value depends on the terms, the country&apos;s governance, and whether the gains are retained and shared locally."],
              note:"A 12-mark Discuss wants roughly 7\u20138 marks of analysis and 4\u20135 of evaluation. Set out FDI&apos;s benefits, then weigh the drawbacks and alternative strategies, ending on what determines whether it is best.",
              model:"Foreign direct investment can be a powerful route to development. Its greatest strength is that it brings in capital (finance) from abroad, directly relieving the savings gap that traps many developing economies: investment can go ahead that the country could never have financed from its own low savings. This investment creates jobs and incomes, which raises living standards and generates tax revenue the government can spend on development. Crucially, TNCs often transfer technology, management expertise and training to local workers, raising productivity, and they may build infrastructure and connect the country to global markets and supply chains.<br><br>However, FDI is not automatically the best strategy. A large share of the profit is often repatriated to the multinational&apos;s home country rather than reinvested locally, and firms may exploit cheap labour, harm the environment, or use capital-intensive techniques that create few jobs. Because TNCs are footloose, they can also leave once incentives end. <b>Other strategies</b> may serve some countries better &#8212; aid and debt relief, expanding trade, or investing directly in education, health and infrastructure &#8212; and FDI tends to deliver little where governance is weak and contracts are not enforced.<br><br>On balance, FDI can be a major engine of development by overcoming the shortage of capital, but it is not best in every case. Its value depends on the terms negotiated, the strength of the country&apos;s institutions, and whether the gains are <b>retained and shared locally</b> rather than simply flowing back abroad." }
        ] },
        { code:"4.4.1", title:"Role of financial markets", notes:`
            <p><span class="keyword">Financial markets</span> channel funds from those with surplus money (savers) to those who need it (borrowers and investors). They perform several roles &#8212; remember them as FLEES:</p>
            <div class="mnemonic">
              <div class="word">FLEES <span class="hint">(the roles of financial markets)</span></div>
              <ul class="mnem-list">
                <li><span class="l">F</span><span><strong>Forward markets</strong> &#8212; let buyers and sellers agree a price now for delivery later (in currencies and commodities), allowing firms to hedge against risk.</span></li>
                <li><span class="l">L</span><span><strong>Lending</strong> &#8212; provide credit to firms and households (loans, mortgages, overdrafts), funding investment and spending.</span></li>
                <li><span class="l">E</span><span><strong>Equity market</strong> &#8212; a market to buy and sell shares, letting firms raise capital (finance) by issuing equity.</span></li>
                <li><span class="l">E</span><span><strong>Exchange</strong> &#8212; provide the payment systems that let goods and services be bought and sold smoothly.</span></li>
                <li><span class="l">S</span><span><strong>Saving</strong> &#8212; offer a safe place to store savings and earn a return (interest), encouraging saving.</span></li>
              </ul>
            </div>
            <blockquote><b>Why it matters:</b> by linking savers to borrowers, financial markets turn idle savings into productive investment &#8212; one of the main ways an economy raises its capital stock and long-run growth.</blockquote>
        `, questions:[
            { cmd:"Explain", marks:5, context:"A commentator notes that a healthy financial sector underpins economic growth.",
              text:"Explain two roles of financial markets in an economy.",
              kaa:["Lending: financial markets channel savers&apos; funds to borrowers, providing the credit firms need to invest and households need to spend, which supports growth.","Saving: they provide a safe place to store savings and earn interest, which encourages saving and makes funds available for others to borrow."],
              ev:[],
              note:"A 5-mark &apos;explain two&apos; answer needs each role developed with how it helps the economy. The full set is FLEES in the notes.",
              model:"One role is <b>lending</b>. Financial markets act as a bridge between savers, who have surplus funds, and borrowers, who need them. Banks take in deposits and lend them out as loans, mortgages and overdrafts, giving firms the credit to invest in new capital and households the means to spend. This turns idle savings into productive use and supports economic growth.<br><br>A second role is to facilitate <b>saving</b>. Financial markets give households a safe place to store their money and earn a return through interest. This rewards and encourages saving, and the savings that flow in become the very funds that the markets can then lend out to borrowers &#8212; so the two roles reinforce each other." }
        ] },
        { code:"4.4.2", title:"Market failure in the financial sector", notes:`
            <p>The financial sector is unusually prone to <span class="keyword">market failure</span> &#8212; and because finance underpins the whole economy, when it fails the costs are huge (as the 2008 crisis showed). The main failures spell SMEAR:</p>
            <div class="mnemonic">
              <div class="word">SMEAR <span class="hint">(market failure in the financial sector)</span></div>
              <ul class="mnem-list">
                <li><span class="l">S</span><span><strong>Speculation &amp; bubbles</strong> &#8212; herding behaviour inflates asset bubbles (in housing or shares) that eventually burst, destabilising the economy.</span></li>
                <li><span class="l">M</span><span><strong>Moral hazard</strong> &#8212; banks take excessive risks believing they are "too big to fail" and will be bailed out, so they do not bear the full downside.</span></li>
                <li><span class="l">E</span><span><strong>Externalities</strong> &#8212; a bank&apos;s collapse imposes enormous costs on the wider economy (systemic risk), as failures cascade through the system.</span></li>
                <li><span class="l">A</span><span><strong>Asymmetric information</strong> &#8212; lenders and borrowers know different things, leading to mis-selling (e.g. PPI) and reckless lending.</span></li>
                <li><span class="l">R</span><span><strong>Rigging</strong> &#8212; manipulation of markets and key rates for private gain (e.g. the LIBOR scandal).</span></li>
              </ul>
            </div>
            <blockquote><b>Also:</b> some banks have monopoly power, and short-termism can lead to underinvestment. These failures are the main justification for financial regulation and for the central bank&apos;s role (4.4.3).</blockquote>
        `, questions:[
            { cmd:"Examine", marks:8, context:"After a financial crisis, a government reviews why its banking sector failed so badly.",
              text:"Examine why the financial sector is prone to market failure.",
              kaa:["Speculation and herding can inflate asset bubbles that burst, causing instability.","Moral hazard: banks take excessive risks because they expect to be bailed out if they are too big to fail.","Externalities/systemic risk: one bank&apos;s collapse imposes huge costs on the whole economy, well beyond the bank itself.","Asymmetric information leads to mis-selling and bad lending, as one party knows more than the other."],
              ev:["The most serious failure is arguably systemic risk: because finance underpins all other activity, a banking collapse can trigger a deep recession, justifying strong intervention.","Many of these failures interact \u2014 moral hazard encourages the risky speculation that creates bubbles \u2014 so they compound one another.","Regulation (capital requirements, ring-fencing) and a central bank acting as lender of last resort can reduce these failures, though not eliminate them. Judgement: the financial sector fails for several reinforcing reasons, but the externality of systemic risk is what makes these failures so dangerous and is the strongest case for regulation."],
              mnemonic:{ word:"SMEAR", hint:"Market failure in the financial sector.", points:[
                {l:"S", t:"Speculation & bubbles that burst"},
                {l:"M", t:"Moral hazard \u2014 too big to fail"},
                {l:"E", t:"Externalities \u2014 systemic risk"},
                {l:"A", t:"Asymmetric information \u2014 mis-selling"},
                {l:"R", t:"Rigging \u2014 market/rate manipulation"}
              ]},
              note:"An 8-mark Examine wants about 5 marks of analysis and 3 of evaluation. Run several SMEAR failures, then evaluate which is most serious (systemic risk) and how regulation helps.",
              model:"The financial sector fails in several ways. <b>Speculation</b> and herding can inflate asset bubbles &#8212; in housing or shares &#8212; which eventually burst, destabilising the wider economy. <b>Moral</b> hazard makes this worse: because large banks expect to be bailed out if they fail, they take excessive risks they would otherwise avoid, since they do not bear the full downside. When a bank does collapse, the damage is not contained &#8212; it imposes huge negative <b>externalities</b> on the whole economy through systemic risk, as failures cascade through interlinked institutions, exactly as happened in 2008. On top of this, <b>asymmetric</b> information means lenders and borrowers know different things, leading to mis-selling of products and reckless lending.<br><br>These failures are dangerous partly because they reinforce one another: moral hazard encourages the very risk-taking that fuels bubbles. The <b>most serious</b> is the externality of systemic risk, because finance underpins all other economic activity, so a banking collapse can drag the entire economy into recession. This is the strongest justification for regulation &#8212; capital requirements, ring-fencing and a central bank acting as lender of last resort &#8212; which can <b>reduce, though not remove</b>, these failures. On balance, the sector is prone to failure for several connected reasons, but it is systemic risk that makes those failures so costly." }
        ] },
        { code:"4.4.3", title:"Role of central banks", notes:`
            <p>A <span class="keyword">central bank</span> (such as the Bank of England) sits at the heart of the financial system. Its main functions spell GRIM:</p>
            <div class="mnemonic">
              <div class="word">GRIM <span class="hint">(the functions of a central bank)</span></div>
              <ul class="mnem-list">
                <li><span class="l">G</span><span><strong>Government&apos;s banker</strong> &#8212; it manages the government&apos;s accounts and helps issue and manage government debt.</span></li>
                <li><span class="l">R</span><span><strong>Regulation &amp; financial stability</strong> &#8212; it oversees and regulates banks (macroprudential policy) to keep the financial system safe.</span></li>
                <li><span class="l">I</span><span><strong>Interest rates (monetary policy)</strong> &#8212; it sets Bank Rate and uses tools such as QE to control inflation and influence demand (see 2.6.2).</span></li>
                <li><span class="l">M</span><span><strong>Managing bank liquidity</strong> &#8212; as <em>lender of last resort</em>, it provides emergency funds to solvent banks facing a cash crisis, preventing collapse and bank runs.</span></li>
              </ul>
            </div>
            <blockquote><b>The lender-of-last-resort tension:</b> standing ready to rescue banks prevents panics and contagion, but it can create <em>moral hazard</em> &#8212; if banks expect rescue, they take more risk. Good regulation is needed alongside it to keep that risk in check.</blockquote>
        `, questions:[
            { cmd:"Examine", marks:8, context:"During a banking panic, the central bank steps in to lend emergency funds to a struggling but solvent bank.",
              text:"Examine the functions of a central bank in maintaining financial stability.",
              kaa:["As lender of last resort, the central bank provides emergency liquidity to solvent banks, preventing collapses and the bank runs that spread panic.","Through regulation and macroprudential policy (e.g. capital requirements), it limits the risks banks take, reducing the chance of failure.","By setting interest rates and conducting monetary policy, it can calm or stimulate the economy, supporting stability.","As the government&apos;s banker it helps manage public debt and the smooth functioning of the system."],
              ev:["Acting as lender of last resort can create moral hazard: if banks expect rescue, they take greater risks, making future crises more likely.","Regulation is only as good as its enforcement and design; rules can be evaded or lag behind financial innovation.","There can be tension between the central bank&apos;s goals \u2014 e.g. raising interest rates to curb inflation can strain indebted banks and borrowers. Judgement: the central bank is central to financial stability, especially as lender of last resort, but its rescue role must be paired with strong regulation to avoid encouraging the very risk-taking it guards against."],
              mnemonic:{ word:"GRIM", hint:"The functions of a central bank.", points:[
                {l:"G", t:"Government&apos;s banker"},
                {l:"R", t:"Regulation & financial stability"},
                {l:"I", t:"Interest rates & monetary policy"},
                {l:"M", t:"Managing bank liquidity \u2014 lender of last resort"}
              ]},
              note:"An 8-mark Examine wants about 5 marks of analysis and 3 of evaluation. Cover the lender-of-last-resort, regulation and monetary-policy roles, then evaluate the moral-hazard tension.",
              model:"A central bank supports financial stability in several ways. Its most direct role in a crisis is as <b>lender of last resort</b>: by providing emergency funds to a solvent bank that is short of cash, it prevents that bank collapsing and stops the panic spreading into bank runs and contagion across the system. Day to day, its <b>regulation</b> of banks &#8212; for example requiring them to hold enough capital (financial reserves) &#8212; limits the risks they take and reduces the chance of failure in the first place. Through <b>interest</b> rate decisions and monetary policy it can also steady the wider economy, and as the <b>government&apos;s</b> banker it keeps public debt and the payments system functioning smoothly.<br><br>However, these functions carry tensions. The promise of rescue creates moral hazard: if banks believe the central bank will always step in, they may take greater risks, making crises more likely &#8212; so the rescue role must be paired with tough regulation. Regulation itself is <b>only as effective as its enforcement</b>, and can lag behind financial innovation. There can also be conflicts, since raising interest rates to fight inflation can strain heavily indebted banks. On balance, the central bank is indispensable to financial stability, <b>above all</b> as lender of last resort, but it works best when that safety net is matched by firm regulation to contain the risk-taking it might otherwise encourage." }
        ] },
        { code:"4.5.1", title:"Public expenditure", diagram:["ad-as-shift","lras-shift"], notes:`
            <p><span class="keyword">Public (government) expenditure</span> comes in three types:</p>
            <blockquote>&#8226; <b>Capital expenditure</b> &#8212; investment in long-lived assets: roads, schools, hospitals, broadband. It raises the economy&apos;s productive capacity.<br>&#8226; <b>Current expenditure</b> &#8212; day-to-day running costs: public-sector wages, medicines, fuel. Recurring spending.<br>&#8226; <b>Transfer payments</b> &#8212; money moved from one group to another with no output in return (benefits, the state pension). These are <em>not</em> part of G in AD, because nothing is produced.</blockquote>
            <p>Spending tends to rise as economies develop and populations age, and jumps in crises. Its significance spells GRIDS:</p>
            <div class="mnemonic">
              <div class="word">GRIDS <span class="hint">(the significance of public expenditure)</span></div>
              <ul class="mnem-list">
                <li><span class="l">G</span><span><strong>Growth &amp; productivity</strong> &#8212; capital spending on infrastructure and education raises LRAS and long-run growth.</span></li>
                <li><span class="l">R</span><span><strong>Redistribution</strong> &#8212; public services and transfers reduce inequality and poverty.</span></li>
                <li><span class="l">I</span><span><strong>Inflation &amp; crowding out</strong> &#8212; high spending raises AD (risking demand-pull inflation) and, if financed by borrowing, can crowd out private investment.</span></li>
                <li><span class="l">D</span><span><strong>Deficit &amp; debt</strong> &#8212; spending not matched by tax widens the budget deficit and national debt.</span></li>
                <li><span class="l">S</span><span><strong>State vs market</strong> &#8212; public provision may correct market failure, but can be less efficient than the market (government failure).</span></li>
              </ul>
            </div>
        `, questions:[
            { cmd:"Examine", marks:8, context:"A government announces a large, sustained increase in spending on transport and digital infrastructure.",
              text:"Examine the likely macroeconomic effects of an increase in government spending on infrastructure.",
              kaa:["In the short run, higher government spending raises aggregate demand directly (G is a component of AD), and the multiplier raises it further, increasing output and employment (AD shifts right).","In the long run, better infrastructure raises productivity and the economy&apos;s productive capacity, shifting LRAS to the right.","This makes infrastructure spending unusual in boosting both the demand side and the supply side, raising growth without necessarily causing inflation."],
              ev:["The spending must be financed: if by borrowing, it can widen the deficit and crowd out private investment by raising interest rates.","There are long time lags \u2014 major infrastructure takes years to build and deliver productivity gains.","The size of the benefit depends on whether the projects are well-chosen and efficiently delivered; waste or poor planning reduces the gain. Judgement: infrastructure spending can raise both demand and capacity, but its value depends on how it is financed and how efficiently it is delivered."],
              note:"This is the classic &apos;both AD and LRAS&apos; example. Use the AD/AS shift for the short-run demand effect and the LRAS shift for the long-run capacity effect. Evaluate via financing, lags and efficiency.",
              model:"An increase in government spending on infrastructure works on both sides of the economy. In the short run it raises aggregate demand directly, because government spending is a component of AD. Through the multiplier, the initial injection raises incomes and spending further, so AD shifts to the right, increasing real output and employment.<br><br>In the long run the effect is on the supply side. Better transport and digital networks raise the productivity of firms across the economy and expand its productive capacity, shifting LRAS to the right. This is what makes infrastructure spending unusual: it can raise demand <em>and</em> capacity, supporting growth without necessarily causing inflation.<br><br>However, the benefits are not guaranteed. The spending has to be financed, and if it is funded by borrowing it can widen the budget deficit and, by raising interest rates, crowd out some private investment. Major projects also take years to complete, so the productivity gains arrive only with <b>long lags</b>. And the <b>size of the benefit</b> depends on choosing good projects and delivering them efficiently &#8212; poorly planned schemes waste resources. On balance, infrastructure spending can be a powerful boost to both demand and long-run capacity, but its value depends on how it is financed and how well it is delivered.",
              modelDiagram:["ad-as-shift","lras-shift"] }
        ] },
        { code:"4.5.2", title:"Taxation", diagram:"laffer", notes:`
            <p>Taxes are either <strong>direct</strong> (on income and wealth &#8212; income tax, corporation tax, National Insurance) or <strong>indirect</strong> (on spending &#8212; VAT, excise duties). By how the burden falls as income rises, a tax is:</p>
            <blockquote>&#8226; <b>Progressive</b> &#8212; takes a larger <em>proportion</em> of income as income rises (e.g. income tax). Reduces inequality.<br>&#8226; <b>Regressive</b> &#8212; takes a larger proportion from the poor (e.g. VAT, which is a bigger share of a low income). Increases inequality.<br>&#8226; <b>Proportional</b> &#8212; the same proportion at all income levels (a flat tax).</blockquote>
            <p>Adam Smith&apos;s canons of a good tax are equity, certainty, convenience and efficiency. A change in taxes has wide effects &#8212; PRIDE:</p>
            <div class="mnemonic">
              <div class="word">PRIDE <span class="hint">(the effects of a change in taxation)</span></div>
              <ul class="mnem-list">
                <li><span class="l">P</span><span><strong>Productivity &amp; work incentives</strong> &#8212; lower income tax can strengthen the incentive to work (the substitution effect), though the income effect may offset it.</span></li>
                <li><span class="l">R</span><span><strong>Revenue</strong> &#8212; the Laffer curve shows revenue rises then falls as rates climb; beyond the revenue-maximising rate, higher rates raise <em>less</em>.</span></li>
                <li><span class="l">I</span><span><strong>Inequality</strong> &#8212; progressive taxes narrow the income distribution; regressive taxes widen it.</span></li>
                <li><span class="l">D</span><span><strong>Demand</strong> &#8212; lower taxes raise disposable income and AD, increasing output and employment (and vice versa).</span></li>
                <li><span class="l">E</span><span><strong>Enterprise &amp; FDI</strong> &#8212; lower corporation tax can attract investment and foreign firms, raising competitiveness.</span></li>
              </ul>
            </div>
        `, questions:[
            { cmd:"Assess", marks:10, context:"A government is considering cutting the top rate of income tax, arguing it could raise more revenue.",
              text:"Assess the effects of a cut in income tax.",
              kaa:["A cut raises households&apos; disposable income, so consumption and AD rise, increasing output and employment.","It can strengthen work incentives: with more take-home pay per hour, the substitution effect encourages people to work more.","Via the Laffer curve, if the current rate is above the revenue-maximising rate, a cut could even raise total tax revenue by enlarging the tax base."],
              ev:["The income effect may offset the incentive: with higher pay, some people work fewer hours to reach a target income, so labour supply may not rise.","Whether revenue rises <b>depends on where the economy sits on the Laffer curve</b> \u2014 below t*, a cut simply loses revenue and widens the deficit.","A cut in the top rate mainly benefits high earners, worsening inequality. Judgement: a cut in income tax reliably raises AD, but its effects on work incentives and revenue are uncertain and depend on the Laffer position, while it tends to increase inequality."],
              mnemonic:{ word:"PRIDE", hint:"The effects of a change in taxation.", points:[
                {l:"P", t:"Productivity & work incentives (substitution vs income effect)"},
                {l:"R", t:"Revenue \u2014 the Laffer curve"},
                {l:"I", t:"Inequality \u2014 progressive vs regressive"},
                {l:"D", t:"Demand \u2014 disposable income and AD"},
                {l:"E", t:"Enterprise & FDI"}
              ]},
              note:"A 10-mark Assess wants about 6 marks of analysis and 4 of evaluation. Run the effects (use the Laffer curve for the revenue point), then evaluate the income-effect offset, the Laffer position and the inequality cost.",
              model:"A cut in income tax has several effects. Most directly, it raises households&apos; <b>disposable</b> income, so consumption and aggregate <b>demand</b> rise, increasing output and employment. It can also improve <b>productivity</b> by strengthening work incentives: because workers keep more of each extra pound earned, the substitution effect encourages them to work more hours. On <b>revenue</b>, the Laffer curve shows that if the economy is currently taxed <em>above</em> the revenue-maximising rate, cutting the rate can actually raise total revenue, by improving incentives and shrinking avoidance so the tax base grows.<br><br>However, these effects are <b>uncertain</b>. The income effect can offset the incentive to work: with higher take-home pay, some people choose to work <em>fewer</em> hours because they can reach their target income more easily, so labour supply may not rise. Whether revenue rises <b>depends entirely on where the economy sits on the Laffer curve</b> &#8212; if it is below the revenue-maximising rate, a cut simply loses revenue and widens the deficit. And because a cut in the top rate goes mainly to high earners, it tends to worsen <b>inequality</b>.<br><br>On balance, a cut in income tax reliably boosts demand, but its impact on work incentives and on revenue is genuinely uncertain and hinges on the Laffer position, while it is likely to widen the income gap.",
              modelDiagram:"laffer" }
        ] },
        { code:"4.5.3", title:"Public sector finances", notes:`
            <p>The public finances are about how government spending, taxation and borrowing fit together.</p>
            <blockquote><b>Deficit vs debt &#8212; flow vs stock:</b> a <b>budget (fiscal) deficit</b> is when spending exceeds revenue in a given year (a <em>flow</em>); a surplus is the reverse. The <b>national debt</b> is the total stock of borrowing built up from all past deficits (a <em>stock</em>). A deficit <em>adds</em> to the debt.</blockquote>
            <blockquote><b>Structural vs cyclical:</b> a <b>cyclical</b> deficit is caused by the economic cycle (it grows in a recession as tax revenue falls and benefits rise, and shrinks in recovery). A <b>structural</b> deficit remains even at full employment &#8212; it is the part that will not disappear on its own, and is the real concern.</blockquote>
            <p>The consequences of a high deficit and debt spell ICING:</p>
            <div class="mnemonic">
              <div class="word">ICING <span class="hint">(the dangers of high deficits and debt)</span></div>
              <ul class="mnem-list">
                <li><span class="l">I</span><span><strong>Interest payments</strong> &#8212; servicing the debt diverts spending away from public services.</span></li>
                <li><span class="l">C</span><span><strong>Crowding out</strong> &#8212; heavy government borrowing can raise interest rates, crowding out private investment.</span></li>
                <li><span class="l">I</span><span><strong>Intergenerational burden</strong> &#8212; today&apos;s borrowing must be repaid by future taxpayers.</span></li>
                <li><span class="l">N</span><span><strong>No room to act</strong> &#8212; high existing debt leaves little fiscal space to respond to the next crisis.</span></li>
                <li><span class="l">G</span><span><strong>Grade downgrade</strong> &#8212; a falling credit rating raises the cost of future borrowing.</span></li>
              </ul>
            </div>
        `, questions:[
            { cmd:"Assess", marks:10, context:"After a recession, a government is under pressure to cut its large budget deficit quickly.",
              text:"Assess whether a government should act to reduce its budget deficit.",
              kaa:["Reducing the deficit slows the build-up of national debt, lowering future interest payments that would otherwise crowd out public services.","It can reassure lenders and protect the country&apos;s credit rating, keeping borrowing costs low.","It reduces the burden passed on to future taxpayers and rebuilds fiscal space for the next downturn.","It can be done by cutting spending or raising taxes (contractionary fiscal policy)."],
              ev:["Cutting the deficit (austerity) reduces aggregate demand, which can slow growth and raise unemployment, especially soon after a recession.","If the deficit is largely cyclical, it will shrink on its own as the economy recovers, so aggressive cuts may be unnecessary and self-defeating.","When interest rates are low, borrowing is cheap, and borrowing to fund investment can raise future growth and partly pay for itself. Judgement: a government should tackle a <em>structural</em> deficit over the <b>medium term</b>, but cutting too hard or too fast \u2014 especially a cyclical deficit in a weak economy \u2014 can do more harm than good, so timing and composition matter most."],
              mnemonic:{ word:"ICING", hint:"The dangers of high deficits and debt (reasons to act).", points:[
                {l:"I", t:"Interest payments divert spending"},
                {l:"C", t:"Crowding out of private investment"},
                {l:"I", t:"Intergenerational burden on future taxpayers"},
                {l:"N", t:"No fiscal room for the next crisis"},
                {l:"G", t:"Grade (credit rating) downgrade raises borrowing costs"}
              ]},
              note:"A 10-mark Assess wants about 6 marks of analysis and 4 of evaluation. Give the reasons to reduce the deficit, then weigh the cost to growth/jobs and the structural-vs-cyclical distinction, ending on timing and composition.",
              model:"There are real reasons to reduce a large budget deficit. Persistent deficits add to the national debt, and the rising <b>interest</b> payments increasingly divert money away from public services. Heavy government borrowing can also <b>crowd</b> out private investment by pushing up interest rates, and it passes an <b>intergenerational</b> burden to future taxpayers. Acting can reassure lenders, protecting the credit rating and keeping borrowing costs low, and it rebuilds the fiscal space needed to respond to the next crisis.<br><br>However, reducing the deficit through austerity &#8212; cutting spending or raising taxes &#8212; lowers aggregate demand, which can slow growth and raise unemployment, particularly just after a <b>recession when the economy is fragile</b>. The structural-versus-cyclical distinction is crucial here: if much of the deficit is <em>cyclical</em>, it will shrink by itself as the economy recovers and tax revenues rise, so aggressive cuts may be unnecessary and even self-defeating by weakening the recovery. When interest rates are low, borrowing is cheap, and borrowing to fund productive investment can raise future growth and partly pay for itself.<br><br>On balance, a government should address a genuine <em>structural</em> deficit over the <b>medium term</b>, but cutting too hard or too fast &#8212; especially a cyclical deficit in a weak economy &#8212; can do more harm than good. The <b>timing</b> and the composition of the adjustment matter more than the headline aim of balancing the books." }
        ] },
        { code:"4.5.4", title:"Macroeconomic policies in a global context", notes:`
            <p>This synoptic topic pulls the whole course together: how governments use their policy tools to tackle problems &#8212; reducing deficits and debt, cutting poverty and inequality, managing interest and exchange rates &#8212; in a deeply <em>interconnected</em> world.</p>
            <p><b>The toolkit (a recap):</b> <strong>demand-side</strong> policies (fiscal &#8212; spending and tax; monetary &#8212; interest rates and QE), <strong>supply-side</strong> policies (market-based and interventionist), and <strong>exchange-rate and direct controls</strong>. The art is matching the tool to the problem.</p>
            <p>But using policy in a global context is hard &#8212; the difficulties spell RISKS:</p>
            <div class="mnemonic">
              <div class="word">RISKS <span class="hint">(why macro policy is hard in a global economy)</span></div>
              <ul class="mnem-list">
                <li><span class="l">R</span><span><strong>Risk &amp; uncertainty</strong> &#8212; the effects of any policy are uncertain and hard to predict.</span></li>
                <li><span class="l">I</span><span><strong>Information gaps</strong> &#8212; data is incomplete and arrives with a lag, so policymakers act on an imperfect picture.</span></li>
                <li><span class="l">S</span><span><strong>Shocks</strong> &#8212; external global shocks (oil-price spikes, pandemics, financial crises) can blow policy off course.</span></li>
                <li><span class="l">K</span><span><strong>Knock-on effects</strong> &#8212; economies are interconnected, so one country&apos;s policy spills over to others, and foreign policy spills back.</span></li>
                <li><span class="l">S</span><span><strong>Side-effects</strong> &#8212; policies have unintended consequences and often conflict with other objectives (e.g. curbing inflation raises unemployment).</span></li>
              </ul>
            </div>
            <blockquote><b>The big picture:</b> there is no single right policy. Demand-side tools work fast but can stoke inflation or debt; supply-side tools are powerful but slow; exchange-rate changes help trade but can import inflation. In a global economy, a government must also accept that it cannot fully control outcomes &#8212; which is the recurring lesson of Theme 4.</blockquote>
        `, questions:[
            { cmd:"Discuss", marks:12, context:"A government wants to raise growth and cut unemployment, but is constrained by a high deficit and an open, globalised economy.",
              text:"Discuss the difficulties a government faces in using macroeconomic policy to manage its economy in a globalised world.",
              kaa:["The effects of policy are uncertain and subject to long, variable time lags, so a stimulus may arrive too late or be the wrong size.","Policymakers act on incomplete and lagged information, so they may misjudge the economy&apos;s true position (e.g. the size of the output gap).","In an open economy, much of a fiscal stimulus can leak abroad as imports, weakening the multiplier and the policy&apos;s effect at home.","External shocks \u2014 oil prices, pandemics, foreign crises \u2014 can overwhelm domestic policy, and a high deficit limits the fiscal room to respond."],
              ev:["Policies interact and conflict: tightening to curb inflation raises unemployment, while a stimulus may worsen the deficit and the current account.","Interconnectedness cuts both ways \u2014 coordinated international action can be powerful, but countries may instead pursue conflicting policies (e.g. competitive devaluations).","Supply-side policies avoid some of these problems but work only slowly, so they cannot solve an immediate downturn.","Judgement: in a globalised world a government can still influence its economy, but it cannot fully control it; effective policy means using a careful mix of tools, accepting uncertainty, and recognising the limits set by openness and external shocks."],
              mnemonic:{ word:"RISKS", hint:"Why macroeconomic policy is hard in a global economy.", points:[
                {l:"R", t:"Risk & uncertainty about effects"},
                {l:"I", t:"Information gaps & time lags"},
                {l:"S", t:"Shocks \u2014 external/global"},
                {l:"K", t:"Knock-on effects \u2014 interconnectedness"},
                {l:"S", t:"Side-effects & conflicting objectives"}
              ]},
              note:"This is a synoptic, Theme-4 capstone question. Draw on the whole toolkit and the global context. Run the RISKS difficulties, evaluate with policy conflicts and interconnectedness, and conclude on what a government can and cannot control.",
              model:"Managing an economy in a globalised world is difficult for several reasons. First, the effects of any policy are subject to <b>risk</b> and uncertainty and to long, variable time lags, so a stimulus designed for a slowdown may arrive too late or prove the wrong size. Second, policymakers face <b>information</b> gaps: data is incomplete and lagged, so they may misjudge the economy&apos;s true position, such as the size of the output gap. Third, openness invites <b>shocks</b> &#8212; an oil-price spike, a pandemic or a foreign financial crisis can overwhelm domestic policy &#8212; and a high deficit leaves little room to respond. Fourth, <b>knock-on effects</b> matter: in an open economy much of a fiscal stimulus leaks abroad as imports, weakening the multiplier, and policy abroad spills back home.<br><br>These problems are compounded by <b>side</b>-effects and conflicts between objectives: tightening policy to curb inflation tends to raise unemployment, while a stimulus can worsen both the deficit and the current account. Interconnectedness cuts both ways &#8212; coordinated international action can be powerful, but countries may instead pursue conflicting policies such as competitive devaluations. Supply-side policies sidestep some of these issues but <b>work only slowly</b>, so they cannot fix an immediate downturn.<br><br>On balance, a government in a globalised world can still influence its economy, but it cannot fully control it. Effective policy means combining tools carefully, accepting that <b>outcomes are uncertain</b>, and recognising the real limits imposed by openness and external shocks &#8212; the recurring lesson of studying the global economy." }
        ] }
      ]
    }
  ],

  technique: [
    {
      lbl:"The golden rule", title:"Match your answer to the command word",
      body:`<p>The command word tells you whether evaluation is needed and how to shape the answer.</p>
        <ul>
          <li><strong>No evaluation:</strong> Explain, Calculate, Analyse, Define, Identify, Distinguish.</li>
          <li><strong>Evaluation required:</strong> Examine (8), Assess (10), Discuss (12 & 15), Evaluate (25).</li>
        </ul>
        <p>Writing evaluation on an "analyse" question wastes time and earns nothing. Writing none on a "discuss" caps your mark.</p>`
    },
    {
      lbl:"The 25-mark essay", title:"Structure: KAA → EV → KAA → EV → judgement",
      body:`<p>No introduction is needed — start answering immediately. Develop <strong>two</strong> strong points (occasionally three), each with its own evaluation, then a justified conclusion.</p>
        <ul>
          <li>Two developed points beat four shallow ones. Pearson notes "4 or more KAA points… would be very likely to be superficial."</li>
          <li>Marks: <strong>16 KAA + 9 Evaluation</strong>.</li>
          <li>Paper 3 essays: include at least one <em>micro</em> and one <em>macro</em> point, kept separate.</li>
          <li>Suggested timing: ~35–40 minutes per 25-marker.</li>
        </ul>`
    },
    {
      lbl:"AO3 Analysis", title:"Build chains of reasoning",
      body:`<p>Link causes to consequences in stages using connectives: <code>which means…</code> <code>this leads to…</code> <code>therefore…</code></p>
        <p>Aim for chains of 5–6 links, and finish each chain by linking back to the exact wording of the question. A "two-stage chain only" is a Level 2 ceiling.</p>`
    },
    {
      lbl:"AO2 Application", title:"Use the data — every time",
      body:`<p>Quote figures and refer to the extract explicitly. "Full marks cannot be accessed when the answer does not consider… the context and data available."</p>
        <p>For Section C and Paper 3 (less data given), bring prepared real-world examples: a named firm/industry for micro, a named country for macro.</p>`
    },
    {
      lbl:"AO4 Evaluation", title:"Don't save it for the end — embed it",
      body:`<p>Attack your own analysis. Useful frameworks:</p>
        <ul>
          <li><strong>It depends on…</strong> / <strong>However…</strong></li>
          <li>Magnitude — how big is the effect, really?</li>
          <li>Short run vs long run.</li>
          <li>Different stakeholders (consumers, firms, government, workers).</li>
          <li>Elasticities; ceteris paribus; risk of government failure; data reliability.</li>
        </ul>
        <p>Each evaluation point needs its own chain of reasoning and should lead to a ranked, conditional judgement.</p>`
    },
    {
      lbl:"The evaluation toolkit", title:"CAMELS \u2014 the universal evaluation checklist",
      body:`<p>Stuck for evaluation on <em>any</em> question that needs it? Run through CAMELS. At least one or two of these give a strong, conditional &quot;it depends&quot; point on practically any topic.</p>
        <div class="mnemonic">
          <div class="word">CAMELS <span class="hint">(consider for ANY evaluation question)</span></div>
          <ul class="mnem-list">
            <li><span class="l">C</span><span><strong>Confidence</strong> &#8212; will consumers and firms actually respond? In a downturn, weak confidence can blunt even a well-judged policy or shock.</span></li>
            <li><span class="l">A</span><span><strong>Alternatives &amp; opportunity cost</strong> &#8212; is there a better or cheaper way to achieve the aim, and what is given up? Always ask &quot;compared to what?&quot;</span></li>
            <li><span class="l">M</span><span><strong>Magnitude</strong> &#8212; how big is the change, and how big is its effect? Significant or trivial? Use the data \u2014 and the multiplier can amplify it.</span></li>
            <li><span class="l">E</span><span><strong>Elasticity</strong> &#8212; how responsive are the relevant variables (PED, PES, YED, XED)? The size of most effects depends on it.</span></li>
            <li><span class="l">L</span><span><strong>Long run vs short run</strong> &#8212; effects often differ over time, and policies act with time lags; is the change temporary or permanent?</span></li>
            <li><span class="l">S</span><span><strong>State of the economy &amp; stakeholders</strong> &#8212; does it depend on spare capacity (boom vs recession)? And who actually gains and loses \u2014 consumers, firms, workers, the government?</span></li>
          </ul>
        </div>
        <p>Keep three perennial reminders in reserve too: everything assumes <em>ceteris paribus</em> (other factors may change), watch for the risk of <em>government failure</em>, and question how <em>reliable the data</em> is.</p>`
    },
    {
      lbl:"Diagrams", title:"ACE and ABC",
      body:`<p>Every diagram: label the <strong>A</strong>xes, <strong>C</strong>urves and <strong>E</strong>quilibria (ACE), and make it <strong>A</strong>ccurate, <strong>B</strong>ig and <strong>C</strong>lear (ABC).</p>
        <p>Crucially, <em>refer to the diagram in your prose</em> — a diagram alone earns only knowledge marks. A well-integrated diagram lifts both KAA and EV a whole level.</p>`
    },
    {
      lbl:"The #1 mark-loser", title:"Time management",
      body:`<p>The most common reason able students miss top grades is over-writing the 8/10/12-mark questions and rushing the 25-marker. Practise to strict time limits. Some examiners suggest doing the 25-mark essay first in each section to protect time for it.</p>`
    }
  ],

  quant: {
    intro:"At least 20% of all marks across the qualification are quantitative. These are the most reliable marks to bank — get them to 100% accuracy first. Always show working, state units, and clearly identify your final answer.",
    abbreviations:[
      { group:"Costs, revenue & profit", items:[

        { a:"TC", m:"Total Cost — all costs of production: fixed cost + variable cost (TC = FC + VC)" },
        { a:"FC", m:"Fixed Cost — costs that do not change with output (e.g. rent, insurance)" },
        { a:"VC", m:"Variable Cost — costs that rise as output rises (e.g. raw materials, wages)" },
        { a:"AR", m:"Average Revenue — revenue per unit (TR ÷ Q). It equals the price, so the AR curve is the demand curve" },
        { a:"MR", m:"Marginal Revenue — the extra revenue from selling one more unit" },
        { a:"AC / ATC", m:"Average (Total) Cost — cost per unit (TC ÷ Q)" },
        { a:"AVC", m:"Average Variable Cost — variable cost per unit (VC ÷ Q)" },
        { a:"AFC", m:"Average Fixed Cost — fixed cost per unit (FC ÷ Q); it falls continuously as output rises" },
        { a:"MC", m:"Marginal Cost — the extra cost of producing one more unit. Profit is maximised where MC = MR" },
        { a:"MRP", m:"Marginal Revenue Product — the extra revenue an extra worker generates (MPP × price); it is the demand curve for labour" },

      ]},
      { group:"The multiplier & circular flow", items:[

        { a:"MPS", m:"Marginal Propensity to Save — the fraction of each extra £1 of income that is saved" },
        { a:"MPT", m:"Marginal Propensity to Tax — the fraction of extra income taken in tax" },
        { a:"MPM", m:"Marginal Propensity to iMport — the fraction of extra income spent on imports" },
        { a:"MPW", m:"Marginal Propensity to Withdraw — the fraction of extra income that leaks out of the circular flow: MPW = MPS + MPT + MPM" },
        { a:"k", m:"The multiplier — k = 1 ÷ (1 − MPC) = 1 ÷ MPW. A multiplier of 4 means a £1 injection raises GDP by £4" }

      { group:"Elasticities", items:[

      ]},

        { a:"AS", m:"Aggregate Supply — total output firms plan to produce. SRAS / LRAS = Short-Run / Long-Run Aggregate Supply" },

        { a:"CPI / RPI", m:"Consumer / Retail Price Index — the price indices used to measure inflation" },

    skills:[
      { name:"Percentages & percentage points", formula:"%&Delta; = (new &minus; old) / old &times; 100", note:"Know the difference between a percentage change and a percentage-point change (e.g. interest rate rising from 2% to 3% is +1 percentage point, but a +50% change).", worked:{q:"A country&apos;s real GDP rises from &pound;1,200bn to &pound;1,260bn. Calculate the percentage growth rate.",steps:["Change = 1,260 &minus; 1,200 = &pound;60bn","Divide by the original (old) value: 60 / 1,200 = 0.05","Multiply by 100: 0.05 &times; 100 = <b>5%</b>"],ans:"5% growth"}, drills:[{q:"Unemployment falls from 2.0m to 1.7m. What is the percentage fall?",steps:["Change = 1.7 &minus; 2.0 = &minus;0.3m","&minus;0.3 / 2.0 = &minus;0.15","&times; 100 = <b>&minus;15%</b>"],ans:"a 15% fall"},{q:"The Bank Rate rises from 4% to 5%. State the rise in (a) percentage points and (b) percentage terms.",steps:["(a) Percentage-point change = 5 &minus; 4 = <b>1 percentage point</b>","(b) Percentage change = (5 &minus; 4) / 4 &times; 100 = <b>25%</b>"],ans:"1pp, or +25%"},{q:"A firm&apos;s costs rise 20% to &pound;60,000. What were they before?",steps:["New = old &times; 1.20, so old = 60,000 / 1.20","old = <b>&pound;50,000</b>"],ans:"&pound;50,000"}] },
      { name:"Price elasticity of demand (PED)", formula:"PED = %&Delta;Qd / %&Delta;P", note:"Always negative. |PED|&gt;1 elastic, &lt;1 inelastic. Links to revenue: inelastic &rarr; raise price to raise revenue.", worked:{q:"When price rises 10%, quantity demanded falls 4%. Find PED and state whether demand is elastic or inelastic.",steps:["PED = %&Delta;Qd / %&Delta;P = &minus;4% / +10%","PED = <b>&minus;0.4</b>","|&minus;0.4| &lt; 1, so demand is <b>inelastic</b>"],ans:"&minus;0.4 (inelastic)"}, drills:[{q:"A 5% price cut raises quantity demanded by 15%. Calculate PED.",steps:["PED = +15% / &minus;5%","= <b>&minus;3</b> (elastic)"],ans:"&minus;3 (elastic)"},{q:"PED for a good is &minus;0.5. Price rises 8%. What happens to quantity demanded?",steps:["%&Delta;Qd = PED &times; %&Delta;P = &minus;0.5 &times; 8%","= <b>&minus;4%</b> (falls 4%)"],ans:"falls 4%"},{q:"Demand is price inelastic. A firm wants more revenue. Should it raise or cut price?",steps:["Inelastic: quantity changes proportionally less than price","Raising price loses few sales, so total revenue <b>rises</b>","&rarr; <b>raise price</b>"],ans:"raise price"}] },
      { name:"Income & cross elasticity (YED, XED)", formula:"YED = %&Delta;Qd / %&Delta;Y &nbsp;&middot;&nbsp; XED = %&Delta;Qd(A) / %&Delta;P(B)", note:"YED: +normal, &minus;inferior, &gt;1 luxury. XED: +substitutes, &minus;complements.", worked:{q:"Incomes rise 6% and demand for restaurant meals rises 9%. Find YED and classify the good.",steps:["YED = %&Delta;Qd / %&Delta;Y = +9% / +6%","YED = <b>+1.5</b>","Positive and &gt;1 &rarr; a <b>normal luxury</b> good"],ans:"+1.5 (luxury)"}, drills:[{q:"Incomes rise 10%; demand for bus travel falls 2%. Find YED and classify.",steps:["YED = &minus;2% / +10% = <b>&minus;0.2</b>","Negative &rarr; an <b>inferior</b> good"],ans:"&minus;0.2 (inferior)"},{q:"The price of tea rises 20%; demand for coffee rises 5%. Find XED and state the relationship.",steps:["XED = %&Delta;Qd(coffee) / %&Delta;P(tea) = +5% / +20%","= <b>+0.25</b>","Positive &rarr; <b>substitutes</b>"],ans:"+0.25 (substitutes)"},{q:"XED between two goods is &minus;1.8. What is their relationship, and are they strong or weak?",steps:["Negative sign &rarr; <b>complements</b>","|1.8| &gt; 1 &rarr; <b>strong</b> (close) complements"],ans:"strong complements"}] },
      { name:"The multiplier", formula:"k = 1 / (1 &minus; MPC) &nbsp;=&nbsp; 1 / MPW", note:"MPW = MPS + MPT + MPM. A multiplier of 4 means &pound;1 injection raises GDP by &pound;4.", worked:{q:"In an economy the marginal propensity to consume is 0.8. Find the multiplier and the effect of a &pound;5bn rise in government spending.",steps:["k = 1 / (1 &minus; MPC) = 1 / (1 &minus; 0.8)","k = 1 / 0.2 = <b>5</b>","&Delta;GDP = k &times; injection = 5 &times; &pound;5bn = <b>&pound;25bn</b>"],ans:"k = 5; GDP rises &pound;25bn"}, drills:[{q:"MPS = 0.1, MPT = 0.15, MPM = 0.25. Calculate the multiplier.",steps:["MPW = 0.1 + 0.15 + 0.25 = 0.5","k = 1 / MPW = 1 / 0.5 = <b>2</b>"],ans:"2"},{q:"A &pound;3bn injection eventually raises GDP by &pound;12bn. What is the multiplier?",steps:["k = &Delta;GDP / injection = 12 / 3","= <b>4</b>"],ans:"4"},{q:"MPC rises from 0.75 to 0.8. What happens to the multiplier?",steps:["Old k = 1/(1&minus;0.75) = 1/0.25 = 4","New k = 1/(1&minus;0.8) = 1/0.2 = 5","Multiplier <b>rises from 4 to 5</b>"],ans:"rises 4 &rarr; 5"}] },
      { name:"Index numbers (incl. CPI)", formula:"Index = (value / base value) &times; 100", note:"Base year = 100. Read inflation as the % change in the index, not the index level itself.", worked:{q:"The CPI is 100 in the base year and 108 two years later. State the price level change and the inflation rate in the second year if CPI was 104 after year one.",steps:["From base to year 2: prices rose <b>8%</b> in total (index 100&rarr;108)","Year-2 inflation = (108 &minus; 104)/104 &times; 100","= 4/104 &times; 100 = <b>3.85%</b>"],ans:"+8% total; 3.85% in year 2"}, drills:[{q:"A price index goes from 120 to 126. What is the inflation rate?",steps:["%&Delta; = (126 &minus; 120)/120 &times; 100","= 6/120 &times; 100 = <b>5%</b>"],ans:"5%"},{q:"CPI was 100, then 103, then 105. Is inflation rising or falling?",steps:["Year 1 inflation: 3% (100&rarr;103)","Year 2 inflation: (105&minus;103)/103&times;100 &asymp; 1.94%","Inflation is positive but <b>falling</b> (disinflation)"],ans:"falling (disinflation)"},{q:"The index rises from 100 to 110 over a period when a basket cost &pound;200 in the base year. What does it cost now?",steps:["Cost now = 200 &times; (110/100)","= 200 &times; 1.10 = <b>&pound;220</b>"],ans:"&pound;220"}] },
      { name:"Real vs nominal", formula:"Real value = nominal &times; (base price index / current price index)", note:"Stripping out inflation. &apos;Real&apos; always means inflation-adjusted.", worked:{q:"Nominal wages rise from &pound;30,000 to &pound;31,500 (+5%) while the CPI rises from 100 to 102. What is the real wage change?",steps:["Quick method: real %&Delta; &asymp; nominal %&Delta; &minus; inflation = 5% &minus; 2% = <b>+3%</b>","Check: real wage = 31,500 &times; (100/102) = &pound;30,882","Change = (30,882 &minus; 30,000)/30,000 &times; 100 &asymp; <b>+2.9%</b>"],ans:"about +3% in real terms"}, drills:[{q:"Nominal GDP grows 4%; inflation is 4%. What is real GDP growth?",steps:["Real &asymp; nominal &minus; inflation = 4% &minus; 4%","= <b>0%</b> (no real growth)"],ans:"0%"},{q:"A salary of &pound;25,000 in a year when the index is 125. What is it worth in base-year (index 100) prices?",steps:["Real = 25,000 &times; (100/125)","= 25,000 &times; 0.8 = <b>&pound;20,000</b>"],ans:"&pound;20,000"},{q:"Nominal interest rate is 6%, inflation is 2.5%. What is the real interest rate?",steps:["Real rate &asymp; nominal &minus; inflation = 6% &minus; 2.5%","= <b>3.5%</b>"],ans:"3.5%"}] },
      { name:"Costs, revenue, profit", formula:"Profit = TR &minus; TC &nbsp;&middot;&nbsp; AR = TR/Q &nbsp;&middot;&nbsp; MC = &Delta;TC/&Delta;Q", note:"Marginal = the extra from one more unit. Profit max where MC = MR.", worked:{q:"A firm sells 500 units at &pound;20 each. Total costs are &pound;7,500. Find total revenue, profit, and average cost.",steps:["TR = price &times; Q = 20 &times; 500 = <b>&pound;10,000</b>","Profit = TR &minus; TC = 10,000 &minus; 7,500 = <b>&pound;2,500</b>","AC = TC/Q = 7,500 / 500 = <b>&pound;15</b>"],ans:"TR &pound;10,000; profit &pound;2,500; AC &pound;15"}, drills:[{q:"TC rises from &pound;8,000 to &pound;8,450 when output rises from 200 to 209 units. Find MC.",steps:["MC = &Delta;TC/&Delta;Q = (8,450 &minus; 8,000)/(209 &minus; 200)","= 450 / 9 = <b>&pound;50</b>"],ans:"&pound;50"},{q:"AR = &pound;12, AC = &pound;9, output = 1,000. Find total profit.",steps:["Profit per unit = AR &minus; AC = 12 &minus; 9 = &pound;3","Total profit = 3 &times; 1,000 = <b>&pound;3,000</b>"],ans:"&pound;3,000"},{q:"A firm has fixed costs of &pound;4,000 and variable costs of &pound;6 per unit. Find total cost of 1,000 units.",steps:["TC = FC + (VC &times; Q) = 4,000 + (6 &times; 1,000)","= 4,000 + 6,000 = <b>&pound;10,000</b>"],ans:"&pound;10,000"}] },
      { name:"Concentration ratio", formula:"n-firm CR = combined market share of the largest n firms", note:"A 4-firm CR above ~60% indicates an oligopoly.", worked:{q:"Five firms hold market shares of 30%, 22%, 13%, 9% and 6%. Calculate the 4-firm concentration ratio and state the market structure.",steps:["Take the four largest: 30 + 22 + 13 + 9","4-firm CR = <b>74%</b>","Above ~60% &rarr; a highly concentrated <b>oligopoly</b>"],ans:"74% (oligopoly)"}, drills:[{q:"Three firms have 18%, 15% and 12%; the rest are tiny. Find the 3-firm CR.",steps:["CR&#8323; = 18 + 15 + 12","= <b>45%</b>"],ans:"45%"},{q:"A 2-firm CR is 90%. What does this suggest about the market?",steps:["Two firms supply 90% of the market","Very high concentration &rarr; a <b>duopoly / tight oligopoly</b>"],ans:"duopoly"}] },
      { name:"Terms of trade", formula:"ToT = (index of export prices / index of import prices) &times; 100", note:"A rise = improvement (each export buys more imports).", worked:{q:"Export prices index = 110, import prices index = 100. Calculate the terms of trade and say whether they have improved.",steps:["ToT = (110 / 100) &times; 100","= <b>110</b>","Above 100 &rarr; terms of trade have <b>improved</b> (exports buy more imports)"],ans:"110 (improved)"}, drills:[{q:"Export prices rise 5%; import prices rise 10%. What happens to the terms of trade?",steps:["ToT &asymp; (105/110) &times; 100","&asymp; <b>95.5</b> &rarr; terms of trade <b>worsen</b>"],ans:"worsen (&asymp;95.5)"},{q:"ToT moves from 100 to 104. Interpret this.",steps:["A 4-point rise &rarr; <b>improvement</b>","Each unit of exports now buys 4% more imports"],ans:"improved 4%"}] }
    ]
  },
  essayClinic:{
    intro:`The 25-mark essay (Section B/C of Papers 1&ndash;3) is where the highest grades are decided. It rewards <em>sustained</em> chains of reasoning, evaluation woven throughout, and a genuine judgement &mdash; not a brain-dump of everything you know. Here is the architecture, the timing, and a fully-annotated model so you can see exactly what a top-band answer does.`,
    structure:[{phase:`Introduction (brief)`,detail:`Define the key term(s), state what you will argue, and signpost. No long preamble &mdash; 2&ndash;3 sentences. For &lsquo;to what extent&rsquo; or &lsquo;evaluate&rsquo;, a one-line indication of your eventual line is fine.`},{phase:`KAA paragraph 1`,detail:`One developed chain of reasoning. Make a point, then push it through several logical links (&lsquo;which means&hellip; so&hellip; therefore&hellip;&rsquo;), using a diagram where relevant and the data in the extract. Aim for depth over breadth: one fully-developed argument beats three half-made ones.`},{phase:`Evaluation 1`,detail:`Evaluate <em>that</em> argument immediately, while it is fresh &mdash; do not save all evaluation for the end. Use a CAMELS lens: does it depend on magnitude, elasticity, the time period, the state of the economy, an assumption, or who the stakeholders are?`},{phase:`KAA paragraph 2`,detail:`A second, <em>different</em> chain &mdash; ideally the counter-argument or a second mechanism. Again develop it fully and link to the context.`},{phase:`Evaluation 2`,detail:`Evaluate the second argument the same way. Strong scripts weave a third mini KAA+EV here if time allows.`},{phase:`Judgement (the marks live here)`,detail:`A <em>justified</em> conclusion that actually answers the question. Do not sit on the fence: come down on a side and say <em>why</em>, usually with a condition (&lsquo;it depends mainly on&hellip;&rsquo;). Reference your strongest evaluation point. This is where Level 4/5 is won or lost.`}],
    timing:[`25-mark essay: aim for ~35&ndash;40 minutes. Roughly 5 to plan, 28&ndash;30 to write, 2 to check.`,`Plan with a mnemonic: each letter becomes a paragraph, so a 4-letter plan = two KAA + two EV with a judgement.`,`Watch the clock at the paragraph level: if a KAA paragraph is over ~8 minutes, you are over-writing &mdash; move to evaluation.`,`Never leave a 25-marker without a judgement, even a rushed one &mdash; an unjudged essay is capped well below half marks.`],
    annotated:{cmd:"Evaluate",marks:25,text:`Evaluate the view that the benefits of economic growth outweigh its costs. (25 marks)`,paras:[{role:"intro",label:`Introduction`,text:`Economic growth means a sustained rise in real GDP. Whether its benefits outweigh its costs depends less on growth itself than on <em>how</em> the economy grows &mdash; so while growth usually raises welfare, fast and unmanaged growth can do real harm. This essay weighs the benefits against the costs before reaching that conditional judgement.`},{role:"kaa",label:`KAA 1 &mdash; the benefits chain`,text:`Growth brings clear benefits. As real output rises, firms sell more and earn higher profits, which raises business confidence and funds further investment that expands productive capacity (an outward LRAS shift). Producing more output requires more labour, so employment rises and unemployment falls. Higher incomes and spending also swell government tax revenue, allowing better public services or a smaller deficit without raising tax rates. Above all, higher real incomes lift living standards, which is why almost every government targets growth.`},{role:"ev",label:`Evaluation 1 &mdash; how big, and for whom?`,text:`However, the <b>magnitude</b> of these gains depends on the <em>type</em> of growth and on the <b>state of the economy</b>. Starting from spare capacity, growth raises real output with little inflation; near full capacity, the same demand mostly pulls prices up. And the gains are often <b>unevenly shared</b> &mdash; owners and skilled workers tend to benefit more than the low-skilled &mdash; so growth in headline GDP need not raise everyone&rsquo;s living standards.`},{role:"kaa",label:`KAA 2 &mdash; the costs chain`,text:`Rapid growth also carries costs. If it is demand-led near capacity, the extra spending causes demand-pull inflation, eroding real incomes and hitting poorer households hardest. Faster production speeds the depletion of finite resources and, because more output usually means more pollution, generates negative externalities borne by third parties. Rapid structural change can also throw up structural unemployment as declining industries shed workers whose skills are now obsolete.`},{role:"ev",label:`Evaluation 2 &mdash; are the costs inevitable?`,text:`Yet these costs are not inevitable. Their <b>magnitude</b> depends on policy: environmental damage can be curbed with regulation or carbon taxes, and the gains spread through education and progressive taxation. There is also a <b>long-run</b> point &mdash; short-run costs such as transition unemployment may be outweighed by long-run gains in incomes and life expectancy. So the costs turn on whether growth is well-managed, not on growth as such.`},{role:"judge",label:`Judgement &mdash; the conditional verdict`,text:`On balance, the benefits of growth usually outweigh the costs, but <em>only when growth is sustainable and inclusive</em>. The decisive factor is the kind of growth: export- and investment-led growth that expands capacity raises living standards with little inflation, whereas fast, debt-fuelled consumption beyond capacity can do lasting damage. The strongest evaluation point is therefore that the verdict hinges on <em>how</em> the economy grows, not simply how fast &mdash; which is precisely why policymakers care about the <em>quality</em> of growth, not just its rate.`}],examiner:[`Notice the essay never lists more than two KAA chains &mdash; depth beats breadth at A Level.`,`Each evaluation sits <em>next to</em> the argument it judges, not bolted on at the end.`,`The CAMELS lenses (magnitude, state of the economy, long run) are named and used, not just mentioned.`,`The judgement is genuinely conditional (&lsquo;only when&hellip;&rsquo;) and points to the single most decisive factor &mdash; that is what separates Level 5 from a list of points.`]},
    skeleton:{cmd:"Evaluate",marks:25,text:`Evaluate the view that monetary policy is the most effective way to control inflation.`,plan:`Plan (BASE + judgement): Borrowing costs &rarr; Asset prices &amp; confidence &rarr; Savings/spending &rarr; Exchange rate; then evaluate with lags, the zero-bound, and the cause of inflation; judge by type of inflation.`,paras:[{label:`KAA 1`,text:`Raising the base rate raises borrowing costs and rewards saving, cooling consumption and investment, so AD falls and demand-pull inflation eases (shift AD left on AD/AS).`},{label:`EV 1`,text:`But monetary policy works with long, variable <b>time lags</b> (up to ~2 years), so it may bite only after the shock has passed &mdash; and near the <b>zero bound</b> there is little room to ease.`},{label:`KAA 2`,text:`A higher rate also tends to appreciate the currency, making imports cheaper and curbing imported inflation, reinforcing the effect.`},{label:`EV 2`,text:`However, if inflation is <b>cost-push</b> (e.g. an oil-price spike), tightening demand does little to the cause and risks raising unemployment &mdash; a supply-side or fiscal response may fit better.`},{label:`Judgement`,text:`Monetary policy is usually the most effective tool against <em>demand-pull</em> inflation in normal conditions, but its effectiveness <em>depends on the cause of inflation and how close rates are to the floor</em> &mdash; so it is best, but not always sufficient alone.`}]}
  },
  dataResponse:[
