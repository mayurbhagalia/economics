    {tag:`Theme 1 · Microeconomics`,title:`A tax on sugary drinks`,extract:`In April 2018 the UK introduced a levy on soft drinks containing more than 5g of sugar per 100ml. Many producers reformulated their drinks to fall below the threshold. Sales data for one major brand are shown below. Demand for the brand is estimated to be price inelastic, with a PED of around &minus;0.4.`,chartLabel:`Figure 1 — Annual sales of one sugary-drink brand`,chart:`<svg viewBox="0 0 460 290" role="img" aria-label="Sugary-drink sales (million litres)"><line class="dgm-axis" x1="70" y1="40" x2="70" y2="250"/><line class="dgm-axis" x1="70" y1="250" x2="430" y2="250"/><line x1="70" y1="250" x2="430" y2="250" stroke="#e3d9c6" stroke-width="1"/><text class="dgm-lbl" x="62" y="254" text-anchor="end" font-size="11">0</text><line x1="70" y1="145" x2="430" y2="145" stroke="#e3d9c6" stroke-width="1"/><text class="dgm-lbl" x="62" y="149" text-anchor="end" font-size="11">300</text><line x1="70" y1="40" x2="430" y2="40" stroke="#e3d9c6" stroke-width="1"/><text class="dgm-lbl" x="62" y="44" text-anchor="end" font-size="11">600</text><rect x="103" y="68" width="54" height="182" fill="#9a2d2d" rx="2"/><text class="dgm-lbl" x="130" y="62" text-anchor="middle" font-size="11" font-weight="600">520</text><text class="dgm-lbl" x="130" y="266" text-anchor="middle" font-size="11">2019</text><rect x="223" y="73" width="54" height="177" fill="#9a2d2d" rx="2"/><text class="dgm-lbl" x="250" y="67" text-anchor="middle" font-size="11" font-weight="600">505</text><text class="dgm-lbl" x="250" y="266" text-anchor="middle" font-size="11">2021</text><rect x="343" y="86" width="54" height="164" fill="#9a2d2d" rx="2"/><text class="dgm-lbl" x="370" y="80" text-anchor="middle" font-size="11" font-weight="600">470</text><text class="dgm-lbl" x="370" y="266" text-anchor="middle" font-size="11">2023</text><text class="dgm-axislbl" x="250" y="282" text-anchor="middle">Sugary-drink sales (million litres)</text></svg>`,qs:[{cmd:"Calculate",marks:4,q:`With reference to Figure 1, calculate the percentage change in sales between 2019 and 2023.`,steps:[`Change = 470 &minus; 520 = &minus;50 million litres`,`%&Delta; = &minus;50 / 520 &times; 100`,`= <b>&minus;9.6%</b> (a fall of about 9.6%)`],ans:`a fall of about 9.6%`},{cmd:"Explain",marks:5,q:`With reference to the PED figure, explain why the tax raised significant revenue despite aiming to cut consumption.`,steps:[`PED of &minus;0.4 means demand is <b>price inelastic</b>: a price rise causes a proportionally smaller fall in quantity`,`So after the tax, consumers keep buying almost the same amount`,`Because quantity falls only a little while the price per unit is higher, total spending &mdash; and therefore tax revenue &mdash; stays high`,`The health aim (cutting consumption) is only weakly met, but the revenue aim is met strongly`],ans:`Inelastic demand → quantity barely falls → revenue stays high`},{cmd:"Examine",marks:8,q:`Examine, using the data, one reason the fall in sales may overstate the tax&apos;s effect on sugar consumption.`,steps:[`The data show <em>sales of sugary versions</em>, which also fell because producers <b>reformulated</b> drinks below the 5g threshold`,`So some of the 9.6% fall reflects switching to low-sugar versions of the same brand, not less drinking overall`,`Consumers may have kept drinking the same volume, just of reformulated drinks &mdash; so sugar intake fell more than consumption`,`<b>Evaluation:</b> the true health effect depends on whether reformulation genuinely cut sugar or shifted consumers to other untaxed sugary products`],ans:`Reformulation means falling sugary-version sales ≠ less drinking`}]},
    {tag:`Theme 2 · Macroeconomics`,title:`Inflation and interest rates`,extract:`Following a sharp rise in energy and food prices, a central bank raised its base rate from 0.5% to 5.0% over an 18-month period to bring inflation back to its 2% target. Annual CPI inflation over the period is shown below. Commentators noted that monetary policy &lsquo;works with long and variable lags&rsquo;.`,chartLabel:`Figure 2 — Annual CPI inflation rate`,chart:`<svg viewBox="0 0 460 290" role="img" aria-label="CPI inflation (%)"><line class="dgm-axis" x1="70" y1="40" x2="70" y2="250"/><line class="dgm-axis" x1="70" y1="250" x2="430" y2="250"/><line x1="70" y1="250" x2="430" y2="250" stroke="#e3d9c6" stroke-width="1"/><text class="dgm-lbl" x="62" y="254" text-anchor="end" font-size="11">0</text><line x1="70" y1="145" x2="430" y2="145" stroke="#e3d9c6" stroke-width="1"/><text class="dgm-lbl" x="62" y="149" text-anchor="end" font-size="11">5</text><line x1="70" y1="40" x2="430" y2="40" stroke="#e3d9c6" stroke-width="1"/><text class="dgm-lbl" x="62" y="44" text-anchor="end" font-size="11">10</text><rect x="88" y="195" width="54" height="55" fill="#9a2d2d" rx="2"/><text class="dgm-lbl" x="115" y="189" text-anchor="middle" font-size="11" font-weight="600">2.6%</text><text class="dgm-lbl" x="115" y="266" text-anchor="middle" font-size="11">2021</text><rect x="178" y="59" width="54" height="191" fill="#9a2d2d" rx="2"/><text class="dgm-lbl" x="205" y="53" text-anchor="middle" font-size="11" font-weight="600">9.1%</text><text class="dgm-lbl" x="205" y="266" text-anchor="middle" font-size="11">2022</text><rect x="268" y="107" width="54" height="143" fill="#9a2d2d" rx="2"/><text class="dgm-lbl" x="295" y="101" text-anchor="middle" font-size="11" font-weight="600">6.8%</text><text class="dgm-lbl" x="295" y="266" text-anchor="middle" font-size="11">2023</text><rect x="358" y="183" width="54" height="67" fill="#9a2d2d" rx="2"/><text class="dgm-lbl" x="385" y="177" text-anchor="middle" font-size="11" font-weight="600">3.2%</text><text class="dgm-lbl" x="385" y="266" text-anchor="middle" font-size="11">2024</text><text class="dgm-axislbl" x="250" y="282" text-anchor="middle">CPI inflation (%)</text></svg>`,qs:[{cmd:"Calculate",marks:4,q:`Using Figure 2, calculate the percentage-point fall in inflation between 2022 and 2024.`,steps:[`2022 inflation = 9.1%; 2024 inflation = 3.2%`,`Percentage-point change = 9.1 &minus; 3.2`,`= <b>5.9 percentage points</b>`],ans:`5.9 percentage points`},{cmd:"Explain",marks:5,q:`Explain one way raising the base rate from 0.5% to 5.0% would help bring inflation down.`,steps:[`A higher base rate raises borrowing costs and the reward for saving`,`Households and firms borrow and spend less, so consumption and investment fall`,`Aggregate demand falls (shifts AD left on AD/AS), easing demand-pull inflation`,`Prices rise more slowly, moving inflation back toward target`],ans:`Higher rates → lower AD → less demand-pull inflation`},{cmd:"Assess",marks:10,q:`Assess, using the data, whether the interest-rate rises were the main cause of inflation falling.`,steps:[`<b>For:</b> inflation fell sharply (9.1% → 3.2%) over the same period the bank tightened, consistent with higher rates cutting AD`,`<b>But the cause matters:</b> the inflation was largely <b>cost-push</b> (energy and food), so it may have fallen mainly as global energy prices eased, not because of rates`,`<b>Lags:</b> monetary policy acts with <b>long and variable lags</b>, so 2022&ndash;23 falls may pre-date the full effect of the rate rises`,`<b>Judgement:</b> rates likely contributed, but with cost-push inflation the easing of global supply shocks was probably the bigger factor &mdash; the data alone cannot separate the two`],ans:`Hard to isolate — cost-push easing likely mattered more than rates`}]},
    {tag:`Theme 4 · Global economy`,title:`Current-account deficits`,extract:`The table shows macroeconomic data for four economies in the same year. Country B has the largest current-account deficit and the fastest growth; its currency has also depreciated sharply. Economists disagree over whether B&apos;s deficit is a problem.`,chartLabel:`Figure 3 — Selected macroeconomic data`,chart:`<table class='dr-table'><thead><tr><th>Country</th><th>Current account (% of GDP)</th><th>Real GDP growth (%)</th><th>Currency vs $ (year change)</th></tr></thead><tbody><tr><td>Country A</td><td>&minus;1.0</td><td>2.5</td><td>&minus;2%</td></tr><tr><td>Country B</td><td>&minus;4.5</td><td>3.8</td><td>&minus;9%</td></tr><tr><td>Country C</td><td>+2.0</td><td>1.2</td><td>+3%</td></tr><tr><td>Country D</td><td>&minus;0.5</td><td>2.0</td><td>0%</td></tr></tbody></table>`,qs:[{cmd:"Explain",marks:5,q:`With reference to Country B, explain how fast economic growth can be linked to a large current-account deficit.`,steps:[`Fast growth (3.8%) raises household incomes`,`Higher incomes increase demand for imports (some of which are bought instead of domestic goods)`,`Rising imports, with exports roughly unchanged, worsen the trade balance`,`So the current-account deficit widens &mdash; consistent with B&apos;s &minus;4.5% balance`],ans:`Growth → more imports → wider deficit`},{cmd:"Examine",marks:8,q:`Examine, using the data, why Country B&apos;s deficit may be partly self-correcting.`,steps:[`B&apos;s currency has <b>depreciated 9%</b> against the dollar`,`A weaker currency makes B&apos;s exports cheaper abroad and imports dearer at home`,`Over time, this should raise export volumes and cut import volumes, narrowing the deficit (subject to the Marshall&ndash;Lerner condition)`,`<b>Evaluation:</b> correction depends on <b>elasticities</b> and operates only with a lag (the J-curve), so the deficit may worsen before it improves`],ans:`Depreciation → cheaper exports → deficit narrows (with lags)`},{cmd:"Assess",marks:10,q:`Assess, using the data, whether Country B&apos;s current-account deficit is a serious problem.`,steps:[`<b>Concern:</b> at &minus;4.5% of GDP it is large and must be financed by borrowing or selling assets abroad`,`<b>Reassurance:</b> it coincides with the fastest growth (3.8%), so it may reflect strong demand and investment rather than weakness`,`<b>Self-correction:</b> the 9% depreciation should help narrow it over time`,`<b>Judgement:</b> a deficit this size matters mainly if it funds consumption rather than investment, or if lenders lose confidence &mdash; in a fast-growing economy with a floating currency it may well be sustainable`],ans:`Large, but possibly sustainable given growth + floating currency`}]}
  ],
  pastPapers:[
    { paper:"Paper 2 \u00b7 The National & Global Economy", blurb:"Macroeconomics \u2014 drawing on Themes 2 and 4.", qs:[
      { cmd:"Evaluate", marks:25,
        context:"An emerging economy has grown by an average of 7% a year for a decade, driven by rising exports and investment. Over the same period, urban air pollution and income inequality have both risen sharply.",
        text:"Evaluate the view that the benefits of economic growth outweigh its costs.",
        plans:[
          { word:"PEGS", hint:"your FOR side \u2014 the benefits of growth", points:[
            {l:"P", t:"Profits & investment rise (and higher share prices \u2192 wealth effect)"},
            {l:"E", t:"Employment rises, unemployment falls"},
            {l:"G", t:"Government tax revenue rises \u2192 better services / smaller deficit"},
            {l:"S", t:"Standards of living rise \u2014 higher real incomes, less poverty"} ]},
          { word:"CRIES", hint:"your AGAINST side \u2014 the costs of growth", points:[
            {l:"C", t:"Cost of living \u2014 demand-pull inflation erodes real incomes"},
            {l:"R", t:"Resource depletion \u2014 threatens sustainability"},
            {l:"I", t:"Inequality widens \u2014 low-skilled benefit less"},
            {l:"E", t:"Environmental damage \u2014 negative externalities"},
            {l:"S", t:"Structural unemployment \u2014 declining industries"} ]} ],
        model:"Economic growth, a sustained rise in real GDP, brings substantial benefits. As demand grows, firms sell more, so their <b>profits</b> rise, and higher profits and confidence encourage further investment that expands capacity (shifting LRAS right). Producing more output needs more workers, so <b>employment</b> rises and unemployment falls. Higher incomes and spending swell <b>government</b> tax revenue, letting the state fund better public services or cut its deficit without raising tax rates. Above all, higher real incomes raise <b>standards</b> of living, lifting many out of poverty. These explain why almost every government pursues growth.<br><br>However, rapid growth carries real costs. If it is demand-led near capacity, the extra spending pulls prices up, raising the <b>cost</b> of living and eroding real incomes \u2014 hitting poorer households hardest. Faster production speeds the depletion of finite <b>resources</b>, threatening future growth. The gains are often shared unevenly, so <b>inequality</b> widens as owners and skilled workers benefit more than the low-skilled. More output usually means more pollution \u2014 <b>environmental</b> damage that is a negative externality. And rapid change can cause <b>structural</b> unemployment as declining industries shed workers whose skills are obsolete.<br><br>Whether the benefits outweigh the costs depends on the <em>type</em> of growth. Export- and investment-led growth that expands capacity \u2014 as in this economy \u2014 raises living standards while causing far less inflation than debt-fuelled consumption <b>beyond capacity</b>: on an AD/AS diagram, growth from a rightward LRAS shift is non-inflationary, whereas growth from AD alone near full capacity is not. It also depends on policy: environmental costs can be curbed by regulation or carbon taxes, and the gains spread through education and progressive taxation, so the costs are not inevitable. The <b>time horizon</b> matters too \u2014 short-run costs may be outweighed by long-run gains in incomes and life expectancy.<br><br>On balance, the benefits of growth usually outweigh the costs, but only when growth is sustainable and inclusive. Fast, unmanaged, consumption-driven growth can do lasting harm, so the verdict turns on <em>how</em> the economy grows, not simply how fast.",
        modelDiagram:["ad-as-shift","lras-shift"],
        why:"The structure writes itself: one mnemonic gives every point on the FOR side, the other every point on the AGAINST side, and the judgement weighs them. Two five-letter words = a complete 25-mark plan." },

      { cmd:"Discuss", marks:12,
        context:"To support a weakening economy, the central bank cuts its policy interest rate by 0.5 percentage points.",
        text:"Discuss the extent to which a reduction in interest rates is likely to increase aggregate demand.",
        plans:[ { word:"BASE", hint:"the four channels from a rate cut to AD", points:[
            {l:"B", t:"Borrowing cheaper \u2192 consumption & investment rise"},
            {l:"A", t:"Asset prices rise \u2192 wealth effect lifts spending"},
            {l:"S", t:"Saving less rewarding \u2192 households spend more"},
            {l:"E", t:"Exchange rate falls \u2192 net exports rise"} ]} ],
        model:"A cut in interest rates works through several channels. First, <b>borrowing</b> becomes cheaper, so households take out loans to spend and firms borrow to invest, raising consumption and investment. Second, lower rates push up <b>asset</b> prices \u2014 cheaper mortgages raise housing demand, while poorer returns on savings make shares more attractive \u2014 so households feel wealthier and spend more. Third, <b>saving</b> becomes less rewarding, encouraging households to save less and spend more. Fourth, the lower return on UK assets weakens the <b>exchange</b> rate as money flows abroad, making exports cheaper and imports dearer, so net trade rises. Each channel raises a component of AD, shifting it right and raising output.<br><br>However, the size of the effect is uncertain. If <b>confidence</b> is low \u2014 as in a downturn \u2014 households and firms may not borrow however cheap credit is, so the policy can be like &apos;pushing on a string&apos;. Monetary policy also works with <b>long, variable time lags</b>, so it may act too late. If rates are already near zero there is little room to cut, and banks may not pass the full cut on. The impact also depends on how indebted households are.<br><br>Overall, a rate cut tends to raise AD through all four channels, but the extent depends critically on confidence, debt levels and how close rates already are to zero \u2014 so in a deep slump the effect may be modest.",
        modelDiagram:"ad-as-shift",
        why:"A &apos;Discuss\u2026 extent&apos; question wants the mechanism then the &apos;it depends&apos;. BASE supplies the four-channel mechanism in order; the evaluation is the standard limits of monetary policy." },

      { cmd:"Evaluate", marks:15,
        context:"A government wants to raise its economy&apos;s long-run trend rate of growth without fuelling inflation.",
        text:"Evaluate the use of supply-side policies to increase an economy&apos;s long-run growth rate.",
        plans:[ { word:"TIDE", hint:"the supply-side toolkit (shifts LRAS right)", points:[
            {l:"T", t:"Training & education \u2192 higher productivity"},
            {l:"I", t:"Infrastructure & investment incentives"},
            {l:"D", t:"Deregulation & privatisation"},
            {l:"E", t:"Employment incentives & flexible labour markets"} ]} ],
        model:"Supply-side policies raise productive capacity, shifting LRAS right and allowing growth without inflation. First, <b>training</b> and education raise skills and productivity, so each worker produces more. Second, investment in <b>infrastructure</b> \u2014 transport, energy, digital \u2014 and tax incentives for private investment raise the quantity and quality of capital. Third, <b>deregulation</b> and privatisation can sharpen competition and efficiency by exposing firms to market discipline. Fourth, <b>employment</b> incentives and more flexible labour markets raise participation and make hiring easier. Each expands capacity, so LRAS shifts right, raising potential output and easing inflationary pressure as the economy grows.<br><br>However, there are limits. Most work only with <b>long time lags</b> \u2014 education and infrastructure can take a decade \u2014 so they cannot fix a short-run downturn. Many are expensive and carry an <b>opportunity cost</b>, and government schemes may be poorly targeted. Market-based measures such as deregulation can widen inequality or, in finance, increase risk, and success is never guaranteed: a training scheme only helps if it teaches skills employers want. They also work best alongside adequate demand \u2014 extra capacity is wasted if AD is too weak to use it.<br><br>On balance, supply-side policies are the only way to raise the <em>sustainable</em> long-run growth rate, and are most powerful when they genuinely raise productivity. But because they are slow, costly and uncertain, they are best used as a long-term complement to demand-side policy, and the choice between market-based and interventionist measures depends on the economy&apos;s circumstances.",
        modelDiagram:"lras-shift",
        why:"TIDE turns &apos;name some supply-side policies&apos; into four developed analytical points; the evaluation (lags, cost, no guarantee) is the same whichever policies you pick." },

      { cmd:"Assess", marks:10,
        context:"Following a recession, a government is running a large budget deficit and faces calls to cut it quickly.",
        text:"Assess whether a government should act to reduce its budget deficit.",
        plans:[ { word:"ICING", hint:"the dangers of high deficits/debt \u2014 reasons to act", points:[
            {l:"I", t:"Interest payments divert spending"},
            {l:"C", t:"Crowding out of private investment"},
            {l:"I", t:"Intergenerational burden on future taxpayers"},
            {l:"N", t:"No fiscal room for the next crisis"},
            {l:"G", t:"Grade (credit rating) downgrade raises borrowing costs"} ]} ],
        model:"There are strong reasons to reduce a large deficit. Persistent deficits add to the national debt, so rising <b>interest</b> payments increasingly divert money from public services. Heavy borrowing can <b>crowd</b> out private investment by pushing up interest rates. It passes an <b>intergenerational</b> burden to future taxpayers, leaves <b>no</b> fiscal room for the next crisis, and risks a credit-rating <b>grade</b> downgrade that raises borrowing costs.<br><br>However, cutting the deficit through austerity \u2014 lower spending or higher taxes \u2014 reduces aggregate demand, which can slow growth and raise unemployment, especially just after a <b>recession</b>. The structural-versus-cyclical distinction is crucial: if much of the deficit is cyclical, it will shrink on its own as the economy recovers, so aggressive cuts may be unnecessary and self-defeating. When interest rates are low, borrowing is cheap, and borrowing to fund productive investment can raise future growth and partly pay for itself.<br><br>On balance, a government should tackle a genuine <em>structural</em> deficit over the <b>medium term</b>, but cutting too hard or too fast \u2014 particularly a cyclical deficit in a fragile economy \u2014 can do more harm than good. The answer depends on the deficit&apos;s cause, the state of the cycle and the cost of borrowing.",
        why:"ICING gives five distinct reasons to act \u2014 the whole KAA side. The evaluation is the structural-vs-cyclical judgement, so a five-letter word plus one distinction is the full plan." },
      { cmd:"Assess", marks:12,
        context:"An economy&apos;s inflation rate has risen sharply to 9%, well above its 2% target.",
        text:"Assess the costs of a high rate of inflation.",
        plans:[ { word:"CRIME", hint:"the costs of high inflation", points:[
            {l:"C", t:"Competitiveness falls \u2014 exports dearer, trade worsens"},
            {l:"R", t:"Redistribution \u2014 hurts savers & fixed incomes, helps borrowers"},
            {l:"I", t:"Investment falls \u2014 uncertainty deters firms"},
            {l:"M", t:"Menu & shoe-leather costs"},
            {l:"E", t:"Erodes real incomes & the value of savings"} ]} ],
        model:"High inflation imposes several costs. Domestic goods become relatively dearer, so international <b>competitiveness</b> falls, worsening the trade balance as exports drop and imports rise. Inflation also causes arbitrary <b>redistribution</b>: it hurts savers and those on fixed incomes while benefiting borrowers, as the real value of debt falls. The uncertainty it creates discourages <b>investment</b>, because firms cannot plan ahead confidently, harming long-run growth. There are also <b>menu</b> and shoe-leather costs \u2014 repricing and managing cash to avoid holding depreciating money. And if wages lag, inflation <b>erodes</b> real incomes and the real value of savings.<br><br>However, the <b>magnitude</b> of these costs depends on circumstances. If inflation is fully <em>anticipated</em>, wages, interest rates and contracts adjust, greatly reducing the redistribution and uncertainty costs. The cause matters too: cost-push inflation usually comes with falling output and is more damaging than mild demand-pull inflation in a growing economy. So does the rate: low, stable inflation around the 2% target is beneficial, oiling the labour market and avoiding the greater dangers of deflation.<br><br>On balance, a high and especially an <em>unanticipated</em> inflation rate carries serious costs for competitiveness, investment and the most vulnerable households. But whether inflation is a major problem depends on how high, how stable and how <b>expected</b> it is \u2014 which is why central banks target low positive inflation rather than zero.",
        why:"CRIME names five distinct costs \u2014 enough for the whole analysis \u2014 and the evaluation (anticipated vs not, cause, rate) follows on naturally." },

      { cmd:"Discuss", marks:15,
        context:"A government pursuing rapid economic growth is finding it harder to meet its other macroeconomic objectives.",
        text:"Discuss the view that there are unavoidable conflicts between a government&apos;s macroeconomic objectives.",
        plans:[ { word:"BEEPS", hint:"conflicts & trade-offs between objectives", points:[
            {l:"B", t:"Balance of payments worsens (imports sucked in)"},
            {l:"E", t:"Environment harmed (more output, more pollution)"},
            {l:"E", t:"Equality worsens (gains shared unevenly)"},
            {l:"P", t:"Prices vs jobs \u2014 inflation & the short-run Phillips curve trade-off"},
            {l:"S", t:"Sound finances vs growth \u2014 cutting the deficit (less spending / more tax) lowers AD"} ]} ],
        model:"Pursuing one objective often damages another. Fast, demand-led growth tends to suck in imports, so the <b>balance</b> of payments on the current account worsens. It also harms the <b>environment</b>, as more output means more pollution and resource use. The gains are often shared unevenly, so <b>equality</b> can worsen. And as the economy nears full capacity, demand-pull pressure pushes <b>prices</b> up \u2014 the trade-off between unemployment and inflation captured by the short-run Phillips curve, where boosting demand to cut unemployment raises inflation.<br><br>These conflicts can look unavoidable in the short run, because they stem from using demand-side policy: any stimulus that raises AD to cut unemployment also tends to raise inflation and imports, while austerity to cut a deficit tends to raise unemployment.<br><br>However, they are not always inevitable. Growth driven by <em>supply-side</em> improvements shifts LRAS right, letting the economy grow and cut unemployment <em>without</em> inflation \u2014 shown by the long-run Phillips curve being vertical at the natural rate. Green technology can partly decouple growth from emissions, and redistributive policy can offset rising inequality, so those conflicts can be managed. Some objectives are even complementary: steady growth raises tax revenue, helping the public finances. The trade-offs are also a matter of <b>time horizon</b> \u2014 short-run conflicts may ease in the long run.<br><br>On balance, there are real conflicts, especially in the short run and when using demand-side tools, but they are not wholly unavoidable. With supply-side policy and well-designed complementary measures a government can soften or escape many of them, so the degree of conflict depends on <b>which policies are used</b> and over what horizon.",
        modelDiagram:"phillips",
        why:"BEEPS names the conflicts a growth drive runs into \u2014 plus the Phillips and budget trade-offs; the Phillips curve supplies both the analysis (short-run trade-off) and the key evaluation (vertical long-run curve)." },

      { cmd:"Evaluate", marks:12,
        context:"In a recession, a government plans a large package of higher spending and tax cuts.",
        text:"Evaluate the use of expansionary fiscal policy to stimulate an economy in a recession.",
        plans:[ { word:"FACETS", hint:"the features of fiscal policy", points:[
            {l:"F", t:"Fiscal tools \u2014 government spending & taxation"},
            {l:"A", t:"AD \u2014 shifts AD, amplified by the multiplier"},
            {l:"C", t:"Contractionary or expansionary (here, expansionary)"},
            {l:"E", t:"Effect on the budget balance (deficit widens)"},
            {l:"T", t:"Targeted & flexible, but with time lags"},
            {l:"S", t:"Supply-side effects (infrastructure, incentives)"} ]} ],
        model:"Expansionary fiscal policy uses the government&apos;s two <b>fiscal</b> tools \u2014 higher spending and lower taxes \u2014 to raise aggregate demand. Because it is expansionary, it shifts <b>AD</b> to the right, and through the multiplier the final rise in output exceeds the initial injection, cutting unemployment in a recession (as the diagram shows). It can be <b>targeted</b> at the regions, groups or projects where it is most needed, and it can have <b>supply-side</b> effects too: spending on infrastructure or skills raises long-run capacity.<br><br>However, it has drawbacks. It worsens the <b>budget</b> balance, widening the deficit and adding to the national debt, with future interest costs. Heavy borrowing may crowd out private investment by raising interest rates. Fiscal policy also acts with time lags \u2014 it needs political approval and time to implement \u2014 so it may arrive late, and its impact depends on the <b>size of the multiplier</b>, which is smaller in an open economy where spending leaks into imports.<br><br>Whether it is the right tool depends on the situation. In a deep recession with <b>spare capacity</b>, cheap borrowing and a low inflation risk, expansionary fiscal policy is powerful. Where debt is already high or the economy is near capacity, the deficit and inflation costs loom larger and monetary policy may be preferable. On balance, expansionary fiscal policy can be very effective in a recession, especially when it funds productive investment, but it must be weighed against its effect on the public finances and the lags involved.",
        modelDiagram:"ad-as-shift",
        why:"FACETS turns fiscal policy into a structured answer: the opening letters give the analysis (tools, AD, expansionary, supply-side) and the rest hand you the evaluation (budget balance, lags)." },
      {"cmd": "Assess", "marks": 12, "text": "Assess the usefulness of GDP per capita compared with the Human Development Index as a measure of living standards.", "plans": [{"word": "LINE", "hint": "what GDP per capita misses", "points": [{"l": "L", "t": "Leisure and working hours ignored"}, {"l": "I", "t": "Inequality hidden by the average"}, {"l": "N", "t": "Non-marketed and hidden economy excluded"}, {"l": "E", "t": "Environment / sustainability ignored"}]}, {"word": "HIE", "hint": "the three components of the HDI", "points": [{"l": "H", "t": "Health (life expectancy)"}, {"l": "I", "t": "Income (GNI per capita)"}, {"l": "E", "t": "Education (years of schooling)"}]}], "model": "GDP per capita \u2014 average income per person \u2014 is the standard measure of living standards, but it has serious limitations. It ignores <b>leisure</b> and working hours, so a country working punishing hours can look better off than one enjoying more free time. It hides <b>inequality</b>, since an average says nothing about distribution. It excludes <b>non</b>-marketed output and the hidden economy, such as unpaid work. And it ignores the <b>environment</b> and sustainability, counting pollution-heavy output as pure gain.<br><br>The Human Development Index addresses some of this by combining three dimensions: <b>health</b> (life expectancy), <b>income</b> (GNI per capita) and <b>education</b> (years of schooling). Because it blends health and education with income, it captures development more fully than income alone, so two countries with the same GDP per capita can be ranked differently by how long and how educated their people's lives are.<br><br>However, the HDI is not perfect either: it still ignores inequality, the environment and political freedom, and the <b>data can be unreliable</b> in poorer countries. Which is more useful <b>depends on the purpose</b>: GDP per capita is fine for tracking short-run output, but for comparing genuine living standards the HDI is broader. On balance, neither is complete, so the most useful approach is to read the HDI alongside GDP and measures of inequality and sustainability.", "why": "LINE supplies every weakness of GDP (the analysis); HIE shows what the HDI adds (the evaluation) \u2014 together a built-in comparison."},
      {"cmd": "Explain", "marks": 5, "text": "Explain why the aggregate demand curve slopes downwards.", "plans": [{"word": "WIT", "hint": "why AD slopes down", "points": [{"l": "W", "t": "Wealth effect"}, {"l": "I", "t": "Interest-rate effect"}, {"l": "T", "t": "Trade effect"}]}], "model": "The AD curve slopes downward because a lower price level raises real spending through three effects. The <b>wealth</b> effect: a lower price level raises the real value of people's money and savings, so they feel richer and spend more. The <b>interest</b>-rate effect: lower prices reduce the demand for money, lowering interest rates and encouraging borrowing and investment. And the <b>trade</b> effect: lower domestic prices make exports more competitive and imports dearer, raising net trade. So as the price level falls, the real GDP demanded rises.", "modelDiagram": "ad-curve", "why": "WIT names the three real-balance/interest/trade effects \u2014 exactly the three reasons AD slopes down."},
      {"cmd": "Examine", "marks": 8, "text": "Examine the factors that determine consumption and investment.", "plans": [{"word": "WIRED", "hint": "determinants of consumption", "points": [{"l": "W", "t": "Wealth"}, {"l": "I", "t": "Income"}, {"l": "R", "t": "interest Rates"}, {"l": "E", "t": "Expectations / confidence"}, {"l": "D", "t": "Debt / credit availability"}]}, {"word": "TRACE", "hint": "determinants of investment", "points": [{"l": "T", "t": "corporation Tax"}, {"l": "R", "t": "Rate of interest"}, {"l": "A", "t": "Access to credit"}, {"l": "C", "t": "Confidence / expected demand"}, {"l": "E", "t": "Expected returns"}]}], "model": "Consumption depends on several factors. <b>Wealth</b> \u2014 rising house and share prices make households feel richer and spend more. <b>Income</b> is the main driver: higher disposable income raises consumption. <b>Interest</b> rates affect the cost of borrowing and the reward for saving. <b>Expectations</b> and confidence about future jobs and incomes shape willingness to spend, and the availability of <b>debt</b> and credit sets how much households can borrow to consume.<br><br>Investment by firms depends on related forces. Corporation <b>tax</b> affects post-tax returns. The <b>rate</b> of interest sets the cost of borrowing to invest. <b>Access</b> to credit determines whether projects can be financed. <b>Confidence</b> and expected demand are crucial \u2014 firms invest only if they expect to sell the output. And the <b>expected</b> returns on a project, weighed against its cost, ultimately decide whether it goes ahead. Both components are therefore driven heavily by interest rates and confidence.", "why": "WIRED and TRACE cover the two biggest components of AD; note both share interest rates and confidence \u2014 a neat evaluative link."},
      {"cmd": "Examine", "marks": 8, "text": "Examine the factors that influence government spending and net trade.", "plans": [{"word": "PADS", "hint": "influences on government spending", "points": [{"l": "P", "t": "Political priorities / fiscal stance"}, {"l": "A", "t": "Ageing population"}, {"l": "D", "t": "Debt interest payments"}, {"l": "S", "t": "State of the economy"}]}, {"word": "PRICE", "hint": "determinants of net trade", "points": [{"l": "P", "t": "Protectionism abroad"}, {"l": "R", "t": "Real incomes (home and overseas)"}, {"l": "I", "t": "Inflation (relative)"}, {"l": "C", "t": "Competitiveness (non-price)"}, {"l": "E", "t": "Exchange rate"}]}], "model": "Government spending is shaped by several factors. <b>Political</b> priorities and the chosen fiscal stance set overall spending plans. An <b>ageing</b> population raises spending on pensions and healthcare. <b>Debt</b> interest payments are a rising, largely unavoidable commitment. And the <b>state</b> of the economy matters: in a recession, benefit spending rises automatically and governments may add stimulus.<br><br>Net trade (exports minus imports) depends on different forces. <b>Protectionism</b> abroad reduces exports. <b>Real</b> incomes at home and overseas affect demand for imports and exports. Relative <b>inflation</b> changes price competitiveness. Non-price <b>competitiveness</b> \u2014 quality, design, reliability \u2014 affects export demand. And the <b>exchange</b> rate is pivotal: a weaker currency makes exports cheaper and imports dearer, raising net trade. So government spending turns on demographics and the cycle, while net trade turns on competitiveness and the exchange rate.", "why": "PADS and PRICE complete the AD components \u2014 government spending and net trade \u2014 so together with WIRED and TRACE you can analyse any AD shift."},
      {"cmd": "Examine", "marks": 8, "text": "Examine the factors that can cause aggregate supply to shift.", "plans": [{"word": "POWER", "hint": "what shifts short-run AS", "points": [{"l": "P", "t": "Productivity"}, {"l": "O", "t": "Oil and energy prices"}, {"l": "W", "t": "Wages"}, {"l": "E", "t": "Exchange rate (import costs)"}, {"l": "R", "t": "Raw materials and business taxes"}]}, {"word": "TIRES", "hint": "what shifts long-run AS right", "points": [{"l": "T", "t": "Technology"}, {"l": "I", "t": "Investment in capital"}, {"l": "R", "t": "Resources"}, {"l": "E", "t": "Education and training"}, {"l": "S", "t": "Size of the labour force"}]}], "model": "Short-run aggregate supply shifts when firms' costs change. Higher <b>productivity</b> lowers unit costs, shifting SRAS right. <b>Oil</b> and energy prices are a major cost, so a spike shifts SRAS left. <b>Wages</b> are a key cost too, so pay rises shift SRAS left. The <b>exchange</b> rate matters because a weaker currency raises the cost of imported inputs. And <b>raw</b> material prices and business taxes change costs directly.<br><br>Long-run aggregate supply shifts when the economy's productive capacity changes. Better <b>technology</b> raises potential output. <b>Investment</b> expands and improves the capital stock. More or better <b>resources</b> raise capacity. Improved <b>education</b> and training raise the quality of labour (human capital). And a larger <b>size</b> of the labour force \u2014 through migration or higher participation \u2014 raises potential output. So SRAS shifts reflect costs, while LRAS shifts reflect underlying capacity.", "modelDiagram": ["sras-shift", "lras-shift"], "why": "POWER explains short-run (cost) shifts and TIRES the long-run (capacity) shifts \u2014 the two diagrams the question needs."},
      {"cmd": "Explain", "marks": 5, "text": "Explain the circular flow of income.", "plans": [{"word": "WINCES", "hint": "the key terms of the circular flow", "points": [{"l": "W", "t": "Withdrawals (leakages)"}, {"l": "I", "t": "Injections"}, {"l": "N", "t": "National income"}, {"l": "C", "t": "Circular flow"}, {"l": "E", "t": "Equilibrium"}, {"l": "S", "t": "Saving (a withdrawal)"}]}], "model": "The <b>circular</b> flow of income shows money moving between households and firms: households supply factors and receive income, which they spend on firms' output. <b>National</b> income measures this flow. It is reduced by <b>withdrawals</b> (leakages) \u2014 <b>saving</b>, taxation and spending on imports \u2014 which take money out of the domestic flow, and added to by <b>injections</b> \u2014 investment, government spending and exports. The economy is at <b>equilibrium</b> when planned withdrawals equal planned injections; if injections exceed withdrawals, national income rises, and vice versa.", "why": "WINCES captures the leakages-and-injections framework and the equilibrium condition in one word."},
      {"cmd": "Examine", "marks": 8, "context": "After several years of strong growth, an economy shows signs of overheating.", "text": "Examine the characteristics of a boom in the economic cycle.", "plans": [{"word": "TEMPO", "hint": "what to assess at each phase of the cycle", "points": [{"l": "T", "t": "Trend & output \u2014 above trend (positive gap)"}, {"l": "E", "t": "Employment \u2014 high, unemployment low"}, {"l": "M", "t": "Momentum \u2014 fast GDP growth"}, {"l": "P", "t": "Pressure on capacity \u2014 inflation rises"}, {"l": "O", "t": "Optimism \u2014 high confidence"}]}], "model": "A boom is the peak phase of the economic cycle, and its features can be read off five indicators. On <b>trend</b> and output, real GDP is above its long-run trend \u2014 a positive output gap. <b>Employment</b> is high and unemployment low as firms expand and hire. <b>Momentum</b> is strong: the rate of GDP growth is fast, often above the long-run average. There is intense <b>pressure</b> on capacity \u2014 firms and labour markets are stretched \u2014 so demand-pull inflation rises and shortages appear. And <b>optimism</b> is high, with buoyant consumer and business confidence fuelling spending and investment.<br><br>These features interact: high confidence and momentum push the economy beyond its sustainable trend, which is why booms generate inflation and can prove unsustainable, eventually tipping into a downturn. As the diagram shows, a boom sits where actual GDP rises above the trend line.", "modelDiagram": "economic-cycle", "why": "TEMPO gives a ready checklist for describing any phase; here each indicator becomes a feature of the boom."},
      {"cmd": "Explain", "marks": 5, "text": "Explain the main macroeconomic objectives a government might pursue.", "plans": [{"word": "BUDGIES", "hint": "the main UK macroeconomic objectives", "points": [{"l": "B", "t": "Balance of payments"}, {"l": "U", "t": "Unemployment low"}, {"l": "D", "t": "Distribution of income fairer"}, {"l": "G", "t": "Growth"}, {"l": "I", "t": "Inflation low and stable"}, {"l": "E", "t": "Environment protected"}, {"l": "S", "t": "Sound public finances"}]}], "model": "Governments pursue several macroeconomic objectives at once. A stable <b>balance</b> of payments avoids large, persistent current-account deficits. Low <b>unemployment</b> aims at full employment so resources are not wasted. A fairer <b>distribution</b> of income reduces extreme inequality. Steady, sustainable <b>growth</b> in real GDP raises living standards. Low and stable <b>inflation</b> \u2014 the UK's 2% target \u2014 protects purchasing power. Protecting the <b>environment</b> keeps growth sustainable. And <b>sound</b> public finances keep borrowing and debt under control. Because these objectives often conflict, governments must prioritise between them.", "why": "BUDGIES is the complete objectives list; it also sets up any 'conflicts between objectives' question."},
      {"cmd": "Explain", "marks": 4, "text": "Explain the functions of money.", "plans": [{"word": "MUDS", "hint": "the four functions of money", "points": [{"l": "M", "t": "Medium of exchange"}, {"l": "U", "t": "Unit of account"}, {"l": "D", "t": "standard for Deferred payment"}, {"l": "S", "t": "Store of value"}]}], "model": "Money performs four functions. As a <b>medium</b> of exchange, it is widely accepted in payment, removing the need for barter. As a <b>unit</b> of account, it gives a common measure of value so prices can be compared. As a standard for <b>deferred</b> payment, it allows borrowing and lending over time, since debts can be set in money terms. And as a <b>store</b> of value, it holds its worth over time, letting people save \u2014 provided inflation stays low.", "why": "MUDS is the four-function definition; a clean 4-mark knowledge answer."},
      {"cmd": "Assess", "marks": 10, "context": "A prolonged recession has pushed the unemployment rate to over 10%.", "text": "Assess the costs of a high rate of unemployment.", "plans": [{"word": "SCOWL", "hint": "the costs of high unemployment", "points": [{"l": "S", "t": "Social costs (crime, health, family)"}, {"l": "C", "t": "Costs to the government (benefits, lost tax)"}, {"l": "O", "t": "lost Output (negative output gap)"}, {"l": "W", "t": "Worsening of skills (hysteresis)"}, {"l": "L", "t": "Lower living standards and incomes"}]}], "model": "High unemployment imposes wide costs. There are <b>social</b> costs: unemployment is linked to higher crime, poorer physical and mental health, and family stress. There are <b>costs</b> to the government \u2014 a rising benefits bill alongside lost income-tax and VAT revenue, worsening the budget balance. There is <b>lost</b> output, as the economy produces below potential (a negative output gap), wasting resources. The longer it lasts, the more it causes a <b>worsening</b> of skills, as the unemployed become less employable (hysteresis), raising structural unemployment. And it brings <b>lower</b> living standards and incomes, deepening poverty.<br><br>However, the <b>magnitude</b> of these costs depends on circumstances. Short-term frictional unemployment, as people move between jobs, carries few of these costs, whereas long-term structural unemployment is far more damaging \u2014 so the type matters more than the headline rate. A generous welfare system can also cushion the income and social costs, though at a fiscal cost.<br><br>On balance, high unemployment is very costly to individuals, the government and the economy, but the severity depends heavily on its <b>duration</b> and type, which is why policy targets long-term and structural unemployment most urgently.", "why": "SCOWL spans the personal, fiscal and economic costs; the evaluation is simply that duration and type determine how severe they are."},
      {"cmd": "Examine", "marks": 8, "text": "Examine the structure of the current account and the causes of a current account deficit.", "plans": [{"word": "GIST", "hint": "the components of the current account", "points": [{"l": "G", "t": "trade in Goods (visibles)"}, {"l": "I", "t": "primary Income (interest, profits, dividends)"}, {"l": "S", "t": "trade in Services (invisibles)"}, {"l": "T", "t": "Transfers"}]}, {"word": "DISC", "hint": "why a current account deficit widens", "points": [{"l": "D", "t": "Domestic demand strong (imports rise)"}, {"l": "I", "t": "Inflation high (relative)"}, {"l": "S", "t": "Strong exchange rate"}, {"l": "C", "t": "Competitiveness poor"}]}], "model": "The current account of the balance of payments records four flows. The balance of trade in <b>goods</b> (visibles) is often where the UK runs a deficit. <b>Primary</b> income covers interest, profits and dividends flowing in and out. Trade in <b>services</b> (invisibles) \u2014 finance, tourism, education \u2014 is a UK strength. And <b>transfers</b> include government payments such as overseas aid.<br><br>A current-account deficit can widen for several reasons. Strong <b>domestic</b> demand sucks in imports as incomes rise. High relative <b>inflation</b> makes domestic goods dearer than foreign ones. A <b>strong</b> exchange rate makes exports expensive and imports cheap. And poor non-price <b>competitiveness</b> \u2014 weak quality, productivity or design \u2014 loses export sales. So the current account is the sum of trade and income flows, and a deficit reflects either booming demand or a loss of competitiveness.", "why": "GIST gives the account's structure; DISC gives the causes of a deficit \u2014 note this is a different DISC from the protectionism one."},
      { cmd:"Assess", marks:10,
        context:"A government is considering a cut in the basic rate of income tax.",
        text:"Assess the likely effects of a cut in income tax.",
        plans:[ { word:"PRIDE", hint:"the effects of a change in taxation", points:[
            {l:"P", t:"Productivity & work incentives (substitution vs income effect)"},
            {l:"R", t:"Revenue \u2014 the Laffer curve"},
            {l:"I", t:"Inequality \u2014 progressive vs regressive"},
            {l:"D", t:"Demand \u2014 disposable income and AD"},
            {l:"E", t:"Enterprise & FDI"} ]} ],
        model:"A cut in income tax raises households&apos; disposable income, so consumption and aggregate <b>demand</b> rise, increasing output and employment. It can also improve <b>productivity</b> by strengthening work incentives, since workers keep more of each extra pound earned (the substitution effect). On <b>revenue</b>, the Laffer curve shows that if the rate is currently above the revenue-maximising point, a cut can paradoxically raise total revenue by enlarging the tax base. Lower taxes can also boost <b>enterprise</b> and attract FDI, raising competitiveness.<br><br>However, the effects are <b>uncertain</b>. The income effect may offset the work incentive, as some choose to work fewer hours once they can reach a target income more easily. Whether revenue rises <b>depends on where the economy sits on the Laffer curve</b>; below the peak, a cut simply loses revenue and widens the deficit. A cut also tends to worsen <b>inequality</b>, especially if higher-rate taxes are cut, since the better-off gain most.<br><br>On balance, a tax cut reliably raises demand, but its effects on incentives and revenue depend on the Laffer position, and it risks widening inequality and the deficit.",
        modelDiagram:"laffer",
        why:"PRIDE lists every effect of a tax change \u2014 demand, incentives, revenue, enterprise and inequality \u2014 so the analysis and the &apos;it depends&apos; both come straight from the word." },

      { cmd:"Discuss", marks:12,
        context:"A government announces a large, sustained increase in public spending.",
        text:"Discuss the significance of a large increase in government spending.",
        plans:[ { word:"GRIDS", hint:"the significance of public expenditure", points:[
            {l:"G", t:"Growth & productivity (capital spending lifts LRAS)"},
            {l:"R", t:"Redistribution \u2014 services & transfers cut inequality"},
            {l:"I", t:"Inflation & crowding out"},
            {l:"D", t:"Deficit & debt rise"},
            {l:"S", t:"State vs market (efficiency)"} ]} ],
        model:"A large rise in government spending matters in several ways. If it funds infrastructure and education it can raise <b>growth</b> and productivity, expanding the economy&apos;s capacity (LRAS) as well as raising AD. It can improve <b>redistribution</b>, since public services and transfers reduce inequality and poverty. But higher spending also risks <b>inflation</b> and crowding out: extra AD near full capacity pulls prices up, and borrowing can raise interest rates and squeeze private investment. Unless matched by taxation it widens the <b>deficit</b> and national debt. And it shifts the balance between <b>state</b> and market \u2014 more public provision may correct market failure but can be less efficient than the private sector.<br><br>How significant these effects are depends on circumstances. In a recession with <b>spare capacity</b>, the growth and jobs benefits dominate and the inflation risk is small; near full capacity, the inflation and deficit costs loom larger. Composition matters too: capital spending raises <b>long-run capacity</b>, whereas current spending mainly affects demand.<br><br>On balance, a rise in government spending can be highly significant for growth and equality, but its overall effect depends on the state of the economy, what the money is spent on, and how it is funded.",
        modelDiagram:"ad-as-shift",
        why:"GRIDS captures the full significance of public spending \u2014 growth, redistribution, inflation/crowding out, the deficit and state-vs-market \u2014 i.e. every paragraph of the answer." },

      { cmd:"Examine", marks:8,
        context:"A commentator argues that a well-developed financial sector underpins economic growth.",
        text:"Examine the roles that financial markets play in an economy.",
        plans:[ { word:"FLEES", hint:"the roles of financial markets", points:[
            {l:"F", t:"Forward markets \u2014 hedge risk in currencies & commodities"},
            {l:"L", t:"Lending \u2014 credit to firms & households"},
            {l:"E", t:"Equity market \u2014 firms raise capital (finance)"},
            {l:"E", t:"Exchange \u2014 payment systems"},
            {l:"S", t:"Saving \u2014 a safe place to store wealth"} ]} ],
        model:"Financial markets channel funds from savers to borrowers and perform several roles. They provide <b>forward</b> markets that let firms fix prices for currencies and commodities in advance, hedging against risk. Through <b>lending</b> they supply the credit firms need to invest and households need to spend. The <b>equity</b> market lets firms raise capital (finance &#8212; money, not capital equipment) by issuing shares. They provide the means of <b>exchange</b> \u2014 the payment systems that allow goods and services to be traded. And they offer a safe place for <b>saving</b>, rewarding savers with interest and making those funds available to borrowers.<br><br>These roles matter because, by turning idle savings into productive investment, financial markets raise the capital stock and support long-run growth. However, they can also fail \u2014 through speculation, mis-selling and systemic risk \u2014 which is why the sector is heavily regulated. On balance, financial markets are central to a modern economy, but their benefits <b>depend on their being well regulated</b>.",
        why:"FLEES lists every role of financial markets in one word \u2014 the whole analysis \u2014 leaving room for a brief evaluative nod to financial-market failure." },

      { cmd:"Examine", marks:8,
        context:"During a banking panic, a central bank lends emergency funds to a solvent but illiquid bank.",
        text:"Examine the functions of a central bank.",
        plans:[ { word:"GRIM", hint:"the functions of a central bank", points:[
            {l:"G", t:"Government&apos;s banker"},
            {l:"R", t:"Regulation & financial stability"},
            {l:"I", t:"Interest rates & monetary policy"},
            {l:"M", t:"Managing bank liquidity \u2014 lender of last resort"} ]} ],
        model:"A central bank performs several functions. As the <b>government&apos;s</b> banker it manages the state&apos;s accounts and helps issue and manage public debt. It is responsible for <b>regulation</b> and financial stability, overseeing banks through macroprudential policy to keep the system safe. It conducts monetary policy by setting <b>interest</b> rates and using tools such as QE to control inflation and influence demand. And, crucially in a crisis, it acts as lender of last resort, <b>managing</b> bank liquidity by providing emergency funds to solvent banks to prevent collapse and bank runs.<br><br>These functions can <b>conflict</b>. Acting as lender of last resort can create moral hazard, encouraging banks to take excessive risks in the expectation of rescue, so it must be paired with firm regulation. On balance, the central bank is central to both price stability and financial stability, but its safety-net role works best alongside strong regulation.",
        why:"GRIM gives the four functions of a central bank directly, and the lender-of-last-resort point opens straight into the moral-hazard evaluation." }
    ]},

    { paper:"Paper 1 \u00b7 Markets & Business Behaviour", blurb:"Microeconomics \u2014 drawing on Themes 1 and 3.", qs:[
      { cmd:"Evaluate", marks:25,
        context:"A regulator is concerned that a firm with a 70% market share is charging high prices and under-investing in quality.",
        text:"Evaluate the methods a government could use to control firms with monopoly power.",
        plans:[
          { word:"PROMPT", hint:"the toolkit of methods \u2014 your analysis", points:[
            {l:"P", t:"Price regulation (RPI&#8722;X caps)"},
            {l:"R", t:"Regulate mergers (block/modify takeovers)"},
            {l:"O", t:"Outlaw collusion (fine cartels)"},
            {l:"M", t:"Monitor quality & performance standards"},
            {l:"P", t:"Promote competition & contestability (open networks, cut entry barriers)"},
            {l:"T", t:"Third parties \u2014 give suppliers, employees & consumers a voice"} ]},
          { word:"CRIB", hint:"why regulation can fail \u2014 your evaluation", points:[
            {l:"C", t:"Capture \u2014 regulator ends up serving the industry"},
            {l:"R", t:"Reduced incentives & unintended consequences"},
            {l:"I", t:"Information gaps \u2014 true costs unknown"},
            {l:"B", t:"Burden of administrative cost"} ]} ],
        model:"A monopoly can harm consumers by restricting output and charging a price above marginal cost, creating allocative inefficiency and a deadweight welfare loss, and its lack of competition can breed productive inefficiency. Governments have several tools. <b>Price</b> regulation, such as RPI&#8722;X caps, directly limits what a monopoly can charge while leaving an incentive to cut costs. Authorities can <b>regulate</b> mergers, blocking takeovers that would concentrate the market. They can <b>outlaw</b> collusion, fining cartels that fix prices. They can <b>monitor</b> quality and performance, so a protected firm cannot let standards slide. They can <b>promote</b> competition and contestability \u2014 forcing a dominant firm to open its network or removing entry barriers \u2014 and give <b>third</b> parties such as suppliers and consumers a voice. Together these push prices and output towards the competitive level, cutting the deadweight loss shown on the diagram.<br><br>However, regulation often fails. Regulators can suffer <b>capture</b>, acting in the industry&apos;s interest because the firm holds the expertise. Heavy controls can blunt <b>incentives</b> and cause unintended consequences \u2014 a tight price cap may discourage the very investment that benefits consumers. Regulators face <b>information</b> gaps: they cannot easily know a monopoly&apos;s true costs, so caps may be set wrongly. And regulation imposes a <b>burden</b> of administrative cost, ultimately borne by taxpayers or customers.<br><br>Intervention is also not always justified, because monopoly is not always against the consumer interest: large firms reap economies of scale and fund the research behind dynamic efficiency, so clumsy regulation could destroy genuine benefits. The best approach <b>depends on the source of power</b>. Where it rests on artificial entry barriers, promoting competition is most effective and avoids the pitfalls of price-setting; where the industry is a natural monopoly, price-cap regulation with quality standards fits better. On balance, governments can meaningfully control monopoly power, but only if regulation is well-informed and <b>proportionate</b> \u2014 clumsy intervention can leave consumers worse off than the monopoly it was meant to tame.",
        modelDiagram:"monopoly-dwl",
        why:"PROMPT lists every method (the KAA), and CRIB supplies a ready-made set of evaluation points \u2014 one for each method that can go wrong. Two mnemonics map straight onto the two halves of the essay." },

      { cmd:"Assess", marks:12,
        context:"A single firm supplies the great majority of a country&apos;s rail services.",
        text:"Assess the view that monopolies always act against the interests of consumers.",
        plans:[ { word:"ICED", hint:"the case that monopoly can BENEFIT consumers \u2014 your evaluation", points:[
            {l:"I", t:"Innovation \u2014 scale & secure profits fund R&D"},
            {l:"C", t:"Cross-subsidisation \u2014 fund loss-making but valued services"},
            {l:"E", t:"Economies of scale \u2192 lower average costs (maybe lower prices)"},
            {l:"D", t:"Dynamic efficiency \u2014 profit reinvested over time"} ]} ],
        model:"There is a strong case that monopolies harm consumers. With no competition, a monopoly maximises profit by restricting output and charging a price well above marginal cost, as the diagram shows, creating allocative inefficiency and a deadweight welfare loss. The lack of competitive pressure can also breed productive (X-)inefficiency and complacency over quality, and consumers face less choice.<br><br>However, monopoly does not <em>always</em> harm consumers. A large firm can exploit <b>innovation</b>, using its scale and secure profits to fund research and development. It can <b>cross</b>-subsidise, using profits from busy routes to keep open services that would otherwise close \u2014 important in rail, where profitable lines can support rural ones. A single large producer can reap <b>economies</b> of scale, with lower long-run average costs than many small firms; if some is passed on, prices may be <em>lower</em>. And supernormal profit can drive <b>dynamic</b> efficiency, financing investment and better services over time.<br><br>Whether consumers lose therefore <b>depends on the case</b>. A natural monopoly such as rail infrastructure avoids wasteful duplication, so a single network is efficient \u2014 provided it is regulated to stop abuse. An unregulated monopoly facing no threat of entry will likely exploit consumers; a contestable or price-capped one may pass on its scale economies. On balance, monopolies often harm consumers, but not always \u2014 the outcome <b>hinges on whether scale economies are shared</b> and whether the firm is disciplined by regulation or the threat of competition.",
        modelDiagram:"monopoly-dwl",
        why:"The word &apos;always&apos; demands a two-sided answer. The costs of monopoly are the analysis; ICED hands you four ready-made evaluation points showing when a monopoly can actually help consumers." },
      { cmd:"Assess", marks:12,
        context:"The government introduces a tax on manufacturers of sugary soft drinks in order to reduce consumption.",
        text:"Assess the likely effects of imposing an indirect tax on a demerit good such as sugary drinks.",
        plans:[ { word:"SUGAR", hint:"the effects of an indirect tax on a demerit good", points:[
            {l:"S", t:"Supply shifts left \u2014 price rises, quantity falls"},
            {l:"U", t:"Unresponsive (inelastic) demand \u2014 small fall in quantity"},
            {l:"G", t:"Government revenue rises"},
            {l:"A", t:"Addiction & few substitutes \u2014 weak response"},
            {l:"R", t:"Regressive burden on poorer households"} ]} ],
        model:"An indirect tax on sugary drinks raises producers&apos; costs, so <b>supply</b> shifts left and the market price rises while quantity falls, which is the policy&apos;s aim: to cut consumption of a demerit good that carries health externalities. However, demand is often <b>unresponsive</b> \u2014 price-inelastic \u2014 because the drinks are habitual with few close substitutes, so the fall in quantity may be small. That has one upside: because consumers keep buying, <b>government</b> revenue rises substantially, which can fund health or dental programmes. The strength of the effect depends on the <b>addiction</b> and habit involved \u2014 the more addictive the product, the smaller the drop in consumption.<br><br>The policy also has costs. The tax is <b>regressive</b>: poorer households spend a larger share of income on such drinks, so they bear a heavier relative burden. If demand is very <b>inelastic</b>, the tax mainly raises revenue rather than cutting consumption, so it may miss its health goal, and consumers may switch to other untaxed sugary products. On the other hand, firms may reformulate drinks to avoid the tax \u2014 a sign it can change behaviour.<br><br>On balance, an indirect tax does reduce consumption and raise revenue, but its effectiveness hinges on the <b>price elasticity of demand</b>. Where demand is very inelastic it is better at raising revenue than improving health, and its regressive impact is a real cost \u2014 so it works best alongside information campaigns and reformulation incentives.",
        modelDiagram:"tax-inelastic",
        why:"SUGAR gives both the analysis (supply shift, revenue) and a built-in evaluation: the elasticity and addiction points double as the &apos;it depends&apos; and the regressive point is the key cost." },

      { cmd:"Evaluate", marks:25,
        context:"A market generates significant negative externalities, and the government is considering how best to intervene.",
        text:"Evaluate the methods a government could use to correct market failure.",
        plans:[
          { word:"STRIPES", hint:"the policy toolkit \u2014 your analysis", points:[
            {l:"S", t:"Subsidies (encourage positive externalities)"},
            {l:"T", t:"Taxes (Pigouvian \u2014 internalise negative externalities)"},
            {l:"R", t:"Regulation (bans, limits, standards)"},
            {l:"I", t:"Information (advertising, labelling)"},
            {l:"P", t:"Price controls (e.g. minimum alcohol price)"},
            {l:"E", t:"Emissions \u2014 tradable pollution permits"},
            {l:"S", t:"State provision (public & merit goods)"} ]},
          { word:"DICE", hint:"government failure \u2014 your evaluation", points:[
            {l:"D", t:"Distortion of price signals (shortages, black markets)"},
            {l:"I", t:"Information gaps \u2014 hard to value the externality"},
            {l:"C", t:"Consequences that are unintended"},
            {l:"E", t:"Excessive administrative costs"} ]} ],
        model:"Market failure \u2014 where the free market misallocates resources, for example by over-producing goods with negative externalities \u2014 gives a government several tools. It can grant <b>subsidies</b> to encourage goods with positive externalities, lowering price and raising output. It can impose <b>taxes</b> on goods with negative externalities (a Pigouvian tax), internalising the external cost so price reflects the full social cost, as the externality diagram shows. It can use <b>regulation</b> \u2014 bans, limits or standards \u2014 to compel or forbid behaviour directly. It can correct <b>information</b> gaps through advertising and labelling. It can set <b>price</b> controls, such as a minimum price on alcohol. It can issue tradable <b>emissions</b> permits, capping pollution while letting the market price it. And it can resort to direct <b>state</b> provision of public and merit goods the market under-provides.<br><br>However, intervention can fail in its own right \u2014 government failure, where the cure is worse than the disease. Taxes and price controls can cause <b>distortion</b> of price signals, creating shortages, surpluses or black markets. Policy is undermined by <b>information</b> gaps: governments cannot easily value an externality, so a tax may be set too high or too low. Intervention often has unintended <b>consequences</b> \u2014 a landfill tax can encourage fly-tipping. And many policies carry <b>excessive</b> administrative costs of monitoring and enforcement that may exceed the welfare gained.<br><br>Which method is best therefore depends on the type of failure and the <b>quality of information</b>. Taxes and tradable permits are efficient where the externality can be valued, letting the market find the cheapest way to cut it; regulation is better where harm is severe and certainty is needed, even if it is blunt; information provision is cheap but weak alone. The case for any intervention rests on whether it actually <b>improves welfare once its own costs and risks are counted</b>. On balance, governments can meaningfully reduce market failure, but a well-targeted mix of measures based on good information works best \u2014 and clumsy intervention can leave society worse off than the failure it set out to fix.",
        modelDiagram:"neg-ext",
        why:"STRIPES lists the whole policy toolkit (the analysis); DICE supplies four ready-made evaluation points for why intervention can backfire. A toolkit word plus a failure word = both halves of a 25-marker." },

      { cmd:"Assess", marks:12,
        context:"A firm has grown rapidly and now produces on a far larger scale than its rivals.",
        text:"Assess whether the growth of a firm always benefits consumers.",
        plans:[ { word:"FIRMS", hint:"internal economies of scale \u2014 the benefit side", points:[
            {l:"F", t:"Financial \u2014 cheaper borrowing"},
            {l:"I", t:"Increased dimensions (technical economies)"},
            {l:"R", t:"Risk-bearing \u2014 spread across products/markets"},
            {l:"M", t:"Managerial \u2014 specialist managers"},
            {l:"S", t:"Supply / purchasing \u2014 bulk-buying"} ]} ],
        model:"As a firm grows it can exploit internal economies of scale, lowering its long-run average cost, as the falling section of the LRAC curve shows. <b>Financial</b> economies let large firms borrow more cheaply; <b>increased</b> dimensions (technical economies) make bigger equipment more efficient; <b>risk</b>-bearing economies come from spreading risk across products and markets; <b>managerial</b> economies allow specialist managers; and <b>supply</b> or purchasing economies come from buying inputs in bulk. Lower unit costs can mean lower prices, more investment and better products \u2014 all benefiting consumers.<br><br>However, growth does not <em>always</em> benefit consumers. Lower costs <b>only help if they are passed on</b> rather than kept as profit, and a firm that grows to dominate its market gains monopoly power: it may then restrict output and raise price above the competitive level, harming consumers despite its efficiency. Beyond a certain size a firm can suffer <em>diseconomies</em> of scale, as communication and coordination problems push average costs back up. Growth can also reduce choice if it drives smaller rivals out.<br><br>Whether consumers gain therefore <b>depends on competition and regulation</b>. In a contestable or well-regulated market, the threat of entry forces the firm to pass on its scale economies as lower prices; in an unregulated market with no rivals, it may keep the gains and exploit consumers. On balance, the growth of a firm <em>can</em> benefit consumers through economies of scale, but only when competition or regulation ensures those savings are shared rather than turned into market power.",
        modelDiagram:"lrac-curve",
        why:"FIRMS gives five developed reasons a larger firm has lower costs \u2014 the whole benefit side \u2014 and the evaluation is simply whether those savings reach consumers or become monopoly power." },
      {"cmd": "Explain", "marks": 5, "text": "Explain why economists use the assumption of ceteris paribus when building models.", "plans": [{"word": "VIT CAPS", "hint": "why economists assume ceteris paribus", "points": [{"l": "V", "t": "Variables in reality change at once"}, {"l": "I", "t": "Isolate a single variable"}, {"l": "T", "t": "Test the models"}, {"l": "C", "t": "Constant other variables"}, {"l": "A", "t": "Assume incomes, tastes fixed"}, {"l": "P", "t": "Price change is the easy example"}, {"l": "S", "t": "Social science \u2014 cannot run experiments"}]}], "model": "In the real world many <b>variables</b> change at the same time, making cause and effect hard to identify. By <b>isolating</b> the effect of one variable and holding all others <b>constant</b> \u2014 the assumption of ceteris paribus \u2014 economists can build and <b>test</b> models, <b>assuming</b> factors such as incomes and tastes are unchanged. For example, holding all else equal lets us ask whether a higher <b>price</b> reduces quantity demanded. Because economics is a <b>social</b> science it cannot run controlled experiments, so this simplifying assumption is essential, even though it makes models approximations.", "why": "A 5-mark 'explain' just needs a definition plus a developed reason; VIT CAPS supplies the whole chain."},
      {"cmd": "Explain", "marks": 5, "text": "Explain what is meant by the economic problem.", "plans": [{"word": "SPEND", "hint": "scarcity, choice and opportunity cost", "points": [{"l": "S", "t": "Scarce resources / budget"}, {"l": "P", "t": "Pick one option"}, {"l": "E", "t": "Each pound cannot be respent"}, {"l": "N", "t": "Next best alternative given up"}, {"l": "D", "t": "Definition: that is opportunity cost"}]}], "model": "The economic problem is that resources are <b>scarce</b> while wants are unlimited, so choices must be made. Any agent with a limited budget must <b>pick</b> one option from many. Because <b>each</b> pound spent on one thing cannot also be spent on another, choosing has a cost: the <b>next</b> best alternative given up. This forgone alternative is the <b>definition</b> of opportunity cost. Scarcity therefore forces consumers, firms and governments to choose, and every choice carries an opportunity cost.", "why": "SPEND turns the abstract 'economic problem' into a clean chain ending on opportunity cost."},
      {"cmd": "Explain", "marks": 5, "context": "An economy is currently producing at a point inside its production possibility frontier.", "text": "Explain how a production possibility frontier can illustrate opportunity cost and unemployment.", "plans": [{"word": "COST", "hint": "how a PPF shows opportunity cost", "points": [{"l": "C", "t": "Curve = the PPF (maximum output)"}, {"l": "O", "t": "On the curve, move along it"}, {"l": "S", "t": "Sacrifice some of the other good"}, {"l": "T", "t": "That sacrifice is the opportunity cost"}]}, {"word": "JOBS", "hint": "how unemployment appears on a PPF", "points": [{"l": "J", "t": "Joblessness = a point inside"}, {"l": "O", "t": "Output rises using idle resources"}, {"l": "B", "t": "Brings the economy towards the frontier"}, {"l": "S", "t": "Still only reaches the frontier"}]}], "model": "A production possibility frontier (PPF) shows the maximum combinations of two goods an economy can produce. Moving along the <b>curve</b>, producing more of one good means moving <b>along</b> it and <b>sacrificing</b> some of the other; <b>that</b> sacrifice is the opportunity cost, shown by the slope of the curve.<br><br>A PPF also shows unemployment. A point <em>inside</em> the frontier represents <b>joblessness</b> and idle resources, where the economy produces less than it could. Putting those resources back to work raises <b>output</b>, <b>bringing</b> the economy from inside the curve back towards the frontier. Crucially this only moves the economy <em>to</em> the frontier \u2014 actual growth using spare capacity \u2014 not beyond it.", "modelDiagram": "ppf-unemployment", "why": "Two short mnemonics: COST handles opportunity cost, JOBS handles unemployment \u2014 the two things the question asks for."},
      {"cmd": "Explain", "marks": 5, "text": "Explain the benefits of specialisation and the division of labour.", "plans": [{"word": "PROFIT", "hint": "the effects of specialisation and division of labour", "points": [{"l": "P", "t": "Practice \u2014 workers repeat one task"}, {"l": "R", "t": "Rise in skill and speed"}, {"l": "O", "t": "Output per worker (productivity) rises"}, {"l": "F", "t": "Falling average costs"}, {"l": "I", "t": "Increased profit (or lower prices)"}, {"l": "T", "t": "Tedium and turnover (a drawback)"}]}], "model": "When the division of labour lets workers <b>practise</b> one task repeatedly, there is a <b>rise</b> in their skill and speed. This raises <b>output</b> per worker \u2014 productivity \u2014 so more is produced from the same resources. Higher productivity brings <b>falling</b> average costs, which can lift the firm's <b>increased</b> profit or allow lower prices. The main drawback is <b>tedium</b>: repetitive work can lower morale and raise staff turnover. Overall, specialisation boosts productivity and cuts costs, though it can demotivate workers.", "why": "PROFIT gives the productivity-to-profit chain plus the standard drawback for balance."},
      {"cmd": "Examine", "marks": 8, "text": "Examine the assumption that consumers always behave rationally.", "plans": [{"word": "CUB", "hint": "how rational agents make decisions", "points": [{"l": "C", "t": "Cost-benefit reasoning"}, {"l": "U", "t": "Utility maximised"}, {"l": "B", "t": "Benefit at least equals price"}]}, {"word": "WHO", "hint": "why consumers may not be rational", "points": [{"l": "W", "t": "Weakness at computation"}, {"l": "H", "t": "Habitual behaviour and defaults"}, {"l": "O", "t": "the influence of Others"}]}], "model": "Traditional theory assumes consumers are rational. They use <b>cost</b>-benefit reasoning, weighing a purchase's benefit against its cost, to maximise their <b>utility</b> (satisfaction), buying only while the <b>benefit</b> is at least equal to the price. On this view consumers make consistent choices that make them as well off as possible.<br><br>However, behavioural economics shows this is often unrealistic. Consumers show <b>weakness</b> at computation, struggling with complex calculations and probabilities. Much behaviour is <b>habitual</b>, following defaults and rules of thumb rather than fresh calculation. And the choices of <b>others</b> \u2014 herding and social norms \u2014 strongly shape decisions. So while rationality is a useful simplifying <b>assumption</b>, real consumers are only boundedly rational, which is why nudges and default options can change behaviour.", "why": "CUB defines rationality (the analysis); WHO gives three ready-made reasons it breaks down (the evaluation)."},
      {"cmd": "Explain", "marks": 5, "text": "Explain the difference between a movement along and a shift of the demand curve.", "plans": [{"word": "MAPS", "hint": "movement along vs shift of the demand curve", "points": [{"l": "M", "t": "Movement is caused by price"}, {"l": "A", "t": "Along the existing curve"}, {"l": "P", "t": "PIRATES = the conditions of demand"}, {"l": "S", "t": "Shift the whole curve"}]}], "model": "A <b>movement</b> along the demand curve is caused only by a change in the good's own price: as price falls, quantity demanded rises, tracing a path <b>along</b> the existing curve (an extension or contraction). A <b>shift</b> of the whole curve, by contrast, is caused by a change in the <em>conditions</em> of demand \u2014 the non-price factors such as incomes, tastes and the prices of substitutes and complements. These move the entire curve left or right at every price. So a price change moves you along the curve; everything else shifts it.", "why": "MAPS pins the distinction students most often lose marks on \u2014 price moves <em>along</em>, conditions <em>shift</em>."},
      {"cmd": "Explain", "marks": 5, "text": "Explain the functions of the price mechanism in a market economy.", "plans": [{"word": "SIR", "hint": "the three functions of price", "points": [{"l": "S", "t": "Signalling where to reallocate"}, {"l": "I", "t": "Incentive to producers"}, {"l": "R", "t": "Rationing scarce supply"}]}], "model": "Prices perform three functions. They <b>signal</b> where resources should be reallocated: a rising price tells producers to supply more and consumers to buy less. They create an <b>incentive</b>, since a higher price rewards producers for supplying more and the profit motive draws resources into that market. And they <b>ration</b> scarce supply, allocating limited goods to those willing and able to pay. Together, signalling, incentive and rationing let markets allocate resources without any central direction.", "why": "SIR is the textbook three-function answer; each letter is one function to develop."},
