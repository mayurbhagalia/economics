            <p>The MRP curve <em>is</em> the demand curve for labour, and it slopes down because of diminishing marginal returns: as more workers are added to fixed capital, each extra worker eventually adds less output, so their MRP falls. A firm hires up to the point where the wage equals MRP.</p>
            <p><b>What shifts the demand for labour &#8212; the 4 P&apos;s:</b></p>
            <blockquote>&#8226; <b>Product demand</b> (derived demand) &#8212; more demand for the good raises demand for its workers.<br>&#8226; <b>Productivity</b> of labour &#8212; more productive workers have a higher MRP, so are demanded more.<br>&#8226; <b>Price of substitutes</b> (capital) &#8212; if machines become cheaper, firms substitute capital for labour, cutting labour demand.<br>&#8226; <b>Profitability</b> of firms &#8212; profitable, confident firms expand and hire more.</blockquote>
        `, questions:[
            { cmd:"Explain", marks:5, context:"A surge in demand for electric cars leads manufacturers to recruit thousands more workers.",
              text:"Explain why an increase in the demand for a product is likely to increase the demand for labour.",
              kaa:["The demand for labour is a derived demand \u2014 workers are wanted for the output they produce, not for their own sake.","A worker&apos;s value to a firm is their marginal revenue product (MRP = marginal physical product &#215; price of the product).","If product demand rises, the price (and marginal revenue) of the product rises, so each worker&apos;s MRP rises, shifting the demand for labour outward and raising employment."],
              ev:[],
              note:"The chain is: derived demand &#8594; MRP = output &#215; price &#8594; higher product price raises MRP &#8594; more labour demanded. Link explicitly to the product, not just &apos;the firm&apos;.",
              model:"The demand for labour is a derived demand, meaning firms employ workers not for their own sake but for the goods those workers produce. Car manufacturers want assembly workers only because they want to make cars.<br><br>A worker&apos;s value to a firm is their marginal revenue product &#8212; the extra output they produce multiplied by the price each unit sells for (MRP = marginal physical product &#215; price). When demand for electric cars surges, the price manufacturers can charge rises. Because each worker&apos;s output now sells for more, the marginal revenue product of every worker increases.<br><br>A firm hires up to the point where the wage equals MRP, so a higher MRP means firms are willing to employ more workers at any given wage. The demand curve for labour shifts outward, and employment rises &#8212; which is exactly why the manufacturers recruit thousands more workers." }
        ] },
        { code:"3.5.2", title:"Supply of labour", diagram:"labour-market", notes:`
            <p>The <span class="keyword">supply of labour</span> to an occupation is the number of workers willing and able to do that job at each wage. It slopes upward: a higher wage attracts more workers into the occupation. What determines the supply spells SWAN:</p>
            <div class="mnemonic">
              <div class="word">SWAN <span class="hint">(what determines the supply of labour to a job)</span></div>
              <ul class="mnem-list">
                <li><span class="l">S</span><span><strong>Skills / qualifications needed</strong> &#8212; the more training or talent a job requires, the smaller the pool of workers who can supply it (a key reason surgeons are paid more than cleaners).</span></li>
                <li><span class="l">W</span><span><strong>Wages in other occupations</strong> &#8212; if pay rises in comparable jobs, workers leave this one, reducing supply.</span></li>
                <li><span class="l">A</span><span><strong>Amenities &amp; non-monetary factors</strong> &#8212; good conditions, job satisfaction, status and flexible hours attract workers even at lower pay; unpleasant or risky jobs need higher pay to attract supply.</span></li>
                <li><span class="l">N</span><span><strong>Number available</strong> &#8212; the size of the working population, set by demographics, migration, the retirement age and participation rates.</span></li>
              </ul>
            </div>
            <blockquote><b>Work incentives:</b> income tax and the benefits system also affect supply &#8212; high marginal tax rates or generous out-of-work benefits can weaken the incentive to supply labour, while in-work benefits can strengthen it.</blockquote>
        `, questions:[
            { cmd:"Explain", marks:5, context:"Specialist NHS surgeons are in short supply, while supermarket shelf-stackers are plentiful.",
              text:"Explain two factors that determine the supply of labour to a particular occupation.",
              kaa:["The skills and qualifications a job requires: jobs needing long, costly training (like surgery) have a small pool of able workers, so supply is limited.","Non-monetary factors: poor conditions, danger or low status reduce supply, while satisfying, flexible or high-status work increases it at any given wage."],
              ev:[],
              note:"A 5-mark &apos;explain two&apos; answer needs each factor developed with reasoning. The full set is SWAN in the notes; you only need two here.",
              model:"One key factor is the <b>skills and qualifications</b> a job requires. Jobs that demand long, expensive or difficult training have only a small pool of workers able to do them. Becoming a surgeon takes many years of study and training, so relatively few people can supply that labour, keeping supply low. A shelf-stacking job needs little training, so almost anyone can do it and supply is plentiful.<br><br>A second factor is <b>non-monetary conditions</b>. Workers care about more than pay: job satisfaction, status, safety, hours and working conditions all matter. Pleasant, high-status or flexible jobs attract more workers even at a given wage, raising supply, while unpleasant, risky or unsociable jobs need higher pay to attract the same number of workers." }
        ] },
        { code:"3.5.3", title:"Wage determination", diagram:["labour-market","labour-monopsony","labour-min-wage"], notes:`
            <p><b>Competitive labour market.</b> Where there are many employers and many workers, the wage and level of employment are set where the demand for labour (MRP) meets the supply of labour (first diagram). No single party can influence the wage &#8212; both are wage takers.</p>
            <p>Real labour markets are often <em>not</em> competitive. Three forces change the outcome:</p>
            <p><b>Monopsony</b> (second diagram). A single dominant employer faces the upward supply curve (ACL). Because hiring one more worker means raising the wage for everyone, the marginal cost of labour (MCL) lies above supply. The firm hires where MCL = MRP, but pays only the wage on the supply curve. The result is a <em>lower wage and lower employment</em> than in a competitive market &#8212; and the wage sits below the worker&apos;s MRP.</p>
            <p><b>Trade unions.</b> A union is a monopoly <em>seller</em> of labour. By bargaining collectively it can push wages above the equilibrium. In a <em>competitive</em> market this causes a fall in employment (a wage above equilibrium creates excess supply). But in a <em>monopsony</em>, a union can raise <em>both</em> the wage and employment, by offsetting the employer&apos;s buying power.</p>
            <p><b>Minimum wage</b> (third diagram). A legal wage floor above the equilibrium raises pay but, in a competitive market, cuts labour demanded (Qd) below labour supplied (Qs) &#8212; the gap is unemployment. Yet, as with unions, in a monopsony a minimum wage can raise the wage <em>and</em> employment, because the firm no longer has to raise wages to attract more workers up to the floor.</p>
            <blockquote><b>The twist to remember:</b> in a competitive market, forcing wages up (union or minimum wage) tends to <em>cost jobs</em>. In a monopsony, the same policy can raise wages <em>and</em> jobs &#8212; the opposite result. So the effect of a minimum wage depends on how competitive the market is.</blockquote>
        `, questions:[
            { cmd:"Assess", marks:10, context:"A government is deciding whether to raise the national minimum wage, and economists disagree about the effect on jobs.",
              text:"Assess whether raising the minimum wage will always reduce employment.",
              kaa:["In a competitive labour market, a minimum wage set above the equilibrium raises the wage but reduces the quantity of labour demanded.","At the higher wage more workers want to work (Qs) than firms wish to hire (Qd), so the excess supply is unemployment.","Higher labour costs may also lead firms to substitute capital for labour, especially over time, reinforcing the job losses."],
              ev:["In a monopsony, the result reverses: because the firm was paying below the competitive wage and restricting employment, a minimum wage between the monopsony wage and the competitive wage can raise both the wage and employment.","The size of the effect depends on the level of the minimum wage relative to the equilibrium and on the elasticity of labour demand \u2014 if demand is inelastic, few jobs are lost.","A higher wage may raise worker motivation and productivity (efficiency wages) and cut poverty, offsetting some costs. Judgement: a minimum wage does not <em>always</em> reduce employment \u2014 it depends crucially on whether the market is competitive or monopsonistic, on elasticity, and on how high it is set."],
              note:"The key to a strong answer is the contrast between the competitive case (jobs lost) and the monopsony case (jobs can rise). Use both the minimum-wage and monopsony diagrams.",
              model:"In a <em>competitive</em> labour market, the argument that a minimum wage reduces employment is strong. With many employers, the wage is set where labour demand meets supply. A minimum wage set above this equilibrium raises the cost of labour, so firms cut the number of workers they demand to Qd. At the same time the higher wage attracts more workers, raising quantity supplied to Qs. The gap between Qs and Qd is excess supply &#8212; unemployment. <b>Over time</b>, firms may also replace workers with machines, deepening the job losses.<br><br>However, it does not <em>always</em> reduce employment. In a <em>monopsony</em>, a single dominant employer already restricts hiring and pays a wage below the competitive level. Here a minimum wage set between the monopsony wage and the competitive wage removes the firm&apos;s incentive to hold wages down: it can now hire more workers without driving up the wage for all, so both the wage <em>and</em> employment can rise.<br><br>The outcome also depends on the <b>elasticity</b> of labour demand &#8212; if it is inelastic, few jobs are lost &#8212; and a higher wage may lift productivity and reduce poverty. On balance, a minimum wage reduces employment in a competitive market but can raise it in a monopsony, so the claim that it always cuts jobs is too simple.",
              modelDiagram:["labour-min-wage","labour-monopsony"] }
        ] },
        { code:"3.6.1", title:"Government intervention", diagram:"monopoly-dwl", notes:`
            <p>Because firms with market power can raise prices, restrict output and grow inefficient, governments intervene to protect consumers, suppliers and employees and to promote competition. The toolkit spells PROMPT:</p>
            <div class="mnemonic">
              <div class="word">PROMPT <span class="hint">(how governments control market power)</span></div>
              <ul class="mnem-list">
                <li><span class="l">P</span><span><strong>Price regulation</strong> &#8212; capping the prices of natural monopolies, e.g. <em>RPI&#8722;X</em> (firms may raise prices by inflation <em>minus</em> an efficiency factor X), enforced by regulators such as Ofgem, Ofwat and Ofcom. On the diagram, a cap below the monopoly price pushes output up towards the competitive level, shrinking the deadweight loss.</span></li>
                <li><span class="l">R</span><span><strong>Regulate mergers</strong> &#8212; the Competition and Markets Authority (CMA) can investigate or block mergers that would harm competition.</span></li>
                <li><span class="l">O</span><span><strong>Outlaw collusion</strong> &#8212; cartels and price-fixing are illegal; firms can be fined heavily for colluding.</span></li>
                <li><span class="l">M</span><span><strong>Monitor quality &amp; performance</strong> &#8212; setting quality standards and performance targets (e.g. on punctuality or leaks) stops regulated firms cutting corners.</span></li>
                <li><span class="l">P</span><span><strong>Promote competition &amp; contestability</strong> &#8212; deregulation, privatisation, lowering barriers to entry and supporting small firms make markets more contestable.</span></li>
                <li><span class="l">T</span><span><strong>Third parties protected</strong> &#8212; suppliers and employees are shielded from abuse of buyer power, e.g. the Groceries Code Adjudicator protecting farmers, and minimum-wage and conditions laws protecting workers.</span></li>
              </ul>
            </div>
            <blockquote><b>Re-check near your exam:</b> the specific regulators, the RPI&#8722;X formula and merger thresholds change over time, so confirm current details (and any newer regulators) closer to the day.</blockquote>
        `, questions:[
            { cmd:"Examine", marks:8, context:"A privatised water company is the sole supplier in its region and is earning very large profits.",
              text:"Examine the methods a government could use to control the market power of a monopoly.",
              kaa:["Price regulation such as RPI&#8722;X caps the prices the monopoly can charge, pushing output towards the competitive level and reducing the deadweight loss.","Profit regulation and quality standards stop the firm earning excessive profit or cutting service quality.","Promoting competition and contestability \u2014 deregulation, lowering entry barriers \u2014 introduces rivals that discipline the firm.","Protecting third parties, e.g. an industry adjudicator, prevents the firm exploiting its suppliers."],
              ev:["Price caps are hard to set correctly because the regulator lacks the firm&apos;s cost information, and a cap set too low can deter the investment a water network needs.","Regulators risk regulatory capture, coming to serve the industry rather than consumers.","Some methods suit some markets better than others \u2014 a natural monopoly cannot simply be broken up, so price regulation may be the only realistic option. Judgement: a mix of methods is usually needed, and their success depends on the regulator&apos;s information and independence."],
              mnemonic:{ word:"PROMPT", hint:"How governments control market power.", points:[
                {l:"P", t:"Price regulation (RPI&#8722;X caps)"},
                {l:"R", t:"Regulate mergers (CMA)"},
                {l:"O", t:"Outlaw collusion (fine cartels)"},
                {l:"M", t:"Monitor quality & performance"},
                {l:"P", t:"Promote competition & contestability"},
                {l:"T", t:"Third parties (suppliers/employees) protected"}
              ]},
              note:"An 8-mark Examine wants about 5 marks of analysis and 3 of evaluation. Run several PROMPT methods, use the diagram to show a price cap moving the firm towards the competitive outcome, then evaluate the difficulties.",
              model:"A government has several tools to control a monopoly water company. The most direct is <b>price regulation</b>: a cap such as RPI&#8722;X limits how fast prices can rise. On a diagram, setting the cap below the monopoly price effectively flattens the firm&apos;s demand at the capped price, so it produces more output, closer to the competitive level, shrinking the deadweight welfare loss. The regulator can also impose <b>quality</b> standards and performance targets so the firm cannot cut service to boost profit, and can use <b>profit</b> regulation to claw back excessive returns.<br><br>Where competition is possible, the government can <b>promote</b> it by lowering entry barriers, and it can <b>protect</b> the firm&apos;s suppliers through an adjudicator.<br><br>However, these methods are not easy to apply. The regulator <b>does not know the firm&apos;s true costs</b>, so it may set the cap too high (little benefit) or too low (deterring the investment a water network badly needs). There is also a risk of regulatory capture, where the regulator ends up serving the industry. And since a single water network is a natural monopoly that cannot sensibly be broken up, price regulation may be the only realistic option. So a combination of methods is usually needed, and their success depends heavily on the regulator&apos;s information and independence.",
              modelDiagram:"monopoly-dwl" }
        ] },
        { code:"3.6.2", title:"Impact of government intervention", diagram:"monopoly-dwl", notes:`
            <p>Government intervention <em>can</em> work well: price caps lower bills, merger control preserves competition, quality standards protect service, and protecting suppliers and workers prevents the abuse of market power. At its best, intervention moves a monopoly towards the competitive outcome (a lower price and higher output), reducing the deadweight loss.</p>
            <p>But intervention can also misfire &#8212; a form of government failure. The main limits spell CRIB:</p>
            <div class="mnemonic">
              <div class="word">CRIB <span class="hint">(the limits of government intervention)</span></div>
              <ul class="mnem-list">
                <li><span class="l">C</span><span><strong>Capture</strong> &#8212; <em>regulatory capture</em>: over time the regulator can come to serve the industry it polices rather than consumers, going soft on the firms it knows well.</span></li>
                <li><span class="l">R</span><span><strong>Reduced incentives &amp; unintended consequences</strong> &#8212; tough price caps can deter the investment and innovation a firm should make, and targets are often "gamed" rather than genuinely met.</span></li>
                <li><span class="l">I</span><span><strong>Information gaps</strong> &#8212; regulators rarely know a firm&apos;s true costs (asymmetric information), so they may set caps, targets or fines at the wrong level.</span></li>
                <li><span class="l">B</span><span><strong>Burden of cost</strong> &#8212; running regulators and enforcing rules is expensive, and the administrative cost can sometimes outweigh the benefit.</span></li>
              </ul>
            </div>
            <blockquote><b>Link:</b> these are the market-power version of the wider idea of <em>government failure</em> (the DICE points in Theme 1.4.2). Whether intervention improves outcomes depends on getting more right than it gets wrong.</blockquote>
        `, questions:[
            { cmd:"Discuss", marks:12, context:"A regulator has capped the prices of an energy monopoly and set it efficiency and service targets.",
              text:"Discuss whether government intervention to control monopoly power always benefits consumers.",
              kaa:["Price regulation (e.g. RPI&#8722;X) lowers the price and raises output towards the competitive level, cutting the deadweight loss and directly benefiting consumers.","Quality standards and performance targets stop the firm cutting service to boost profit.","Controlling mergers and outlawing collusion preserves competition, keeping prices lower in the long run.","Protecting suppliers and employees prevents the firm abusing its buyer and employer power."],
              ev:["Regulatory capture means a regulator may end up serving the industry, so the promised consumer gains fail to appear.","Information gaps make it hard to set caps correctly: too low deters investment (harming consumers later through poorer service), too high achieves little.","Intervention is costly to administer and can have unintended consequences, such as targets being gamed.","Judgement: intervention can clearly benefit consumers, but not <em>always</em> \u2014 it depends on the regulator&apos;s information and independence, the method chosen, and whether the benefits outweigh the costs and side-effects."],
              mnemonic:{ word:"CRIB", hint:"The limits of intervention (why it may not benefit consumers).", points:[
                {l:"C", t:"Capture \u2014 regulator serves the industry, not consumers"},
                {l:"R", t:"Reduced incentives & unintended consequences"},
                {l:"I", t:"Information gaps \u2014 wrong caps/targets set"},
                {l:"B", t:"Burden of administrative cost"}
              ]},
              note:"A 12-mark Discuss wants roughly 7\u20138 marks of analysis and 4\u20135 of evaluation, ending in a judgement. Build the consumer benefits (use the diagram), then weigh the CRIB limits, then judge what it depends on.",
              model:"Government intervention can clearly benefit consumers. Capping an energy monopoly&apos;s prices, for example with RPI&#8722;X, forces the price down and raises output towards the competitive level, which reduces the deadweight welfare loss and lowers consumers&apos; bills. Quality standards and performance targets stop the firm cutting service to protect its profit, while merger control and bans on collusion preserve the competition that keeps prices low over the long run. Protecting suppliers and employees stops the firm abusing its power over them too.<br><br>However, intervention does not <em>always</em> benefit consumers. A regulator can suffer regulatory capture, gradually coming to serve the industry it polices rather than the public, so the promised gains never materialise. Because the regulator <b>lacks the firm&apos;s cost information</b>, it may set the cap wrongly: too high achieves little, while too low deters the investment the network needs, harming consumers later through poorer reliability. Regulation is also costly to run and can have unintended consequences, such as firms gaming their targets while neglecting what really matters.<br><br>On balance, intervention to control monopoly power can benefit consumers substantially, but it does not do so automatically. The outcome depends on the regulator&apos;s information and independence, the method chosen, and whether the benefits genuinely <b>outweigh the costs</b> and side-effects.",
              modelDiagram:"monopoly-dwl" }
        ] }
      ]
    },

        {q:"The Human Development Index combines income with measures of:",opts:["Inflation and unemployment","Health and education","Trade openness and investment","Inequality and poverty"],ans:1,why:"HDI = GNI per capita (PPP) + life expectancy + mean/expected years of schooling &mdash; a broader yardstick of development than income alone."}
      ],
      blurb:"Trade, the global economy, poverty and inequality, development, finance and the state.",
      papers:"Examined in Paper 2 & Paper 3",
      topics:[
        { code:"4.1.1", title:"Globalisation", notes:`
            <p><span class="keyword">Globalisation</span> is the increasing integration and interdependence of the world&apos;s economies &#8212; through trade in goods and services, flows of capital and labour, and the spread of technology. National economies are increasingly woven into a single global one.</p>
            <p>What drove it &#8212; the 4 C&apos;s:</p>
            <blockquote>&#8226; <b>Containerisation</b> &#8212; cheap, standardised shipping slashed transport costs.<br>&#8226; <b>Communications technology</b> &#8212; the internet lets data, money and orders move instantly worldwide.<br>&#8226; <b>Capital flows</b> &#8212; financial deregulation lets money move freely across borders.<br>&#8226; <b>Cooperation</b> &#8212; trade liberalisation through the WTO and trading blocs cut tariffs and barriers.</blockquote>
            <p>A key feature (and driver) is the rise of <span class="keyword">transnational corporations (TNCs)</span> &#8212; firms such as Apple or Toyota that locate production across many countries to exploit lower costs and reach global markets.</p>
            <blockquote><b>Winners and losers:</b> globalisation has clear benefits &#8212; cheaper goods and more choice for consumers, bigger markets and economies of scale for firms, and jobs, investment and growth for developing countries. But there are losers too: workers in high-cost countries can lose jobs to offshoring, the environment bears more emissions, inequality can widen, and some developing-country workers may be exploited.</blockquote>
        `, questions:[
            { cmd:"Assess", marks:10, context:"A politician argues that globalisation has been good for everyone.",
              text:"Assess the view that globalisation benefits all groups in society.",
              kaa:["Consumers gain access to cheaper imports and far more choice, raising their living standards.","Firms can sell to a global market and exploit economies of scale, lowering costs.","Developing countries attract foreign investment from TNCs, creating jobs, raising incomes and spreading technology.","Greater competition and the sharing of ideas can raise productivity and innovation worldwide."],
              ev:["Workers in higher-cost countries may lose jobs as production is offshored to cheaper locations, causing structural unemployment.","Globalisation can widen inequality, as skilled workers and capital owners gain far more than the low-skilled.","There are environmental costs from extra production and transport, and some developing-country workers face poor pay and conditions (a possible &apos;race to the bottom&apos;), while TNCs may avoid tax.","Judgement: globalisation has raised total world output and incomes, but the gains are unevenly shared, so whether it benefits <em>all</em> groups depends on how those gains are redistributed by government."],
              note:"A 10-mark Assess wants about 6 marks of analysis and 4 of evaluation. Set out the gains to consumers, firms and developing countries, then weigh the losers (workers, the environment, the unequal). End on who gains and who loses, and on what it depends.",
              model:"Globalisation brings large benefits to several groups. Consumers gain most visibly: access to cheap imports from low-cost producers lowers prices and hugely widens choice, raising real living standards. Firms benefit from selling into a global market, which lets them exploit economies of scale and lower their average costs. Developing countries can gain too, attracting foreign direct investment from transnational corporations that brings jobs, higher incomes, tax revenue and new technology &#8212; a path several Asian economies have followed to rapid growth.<br><br>However, globalisation does not benefit everyone. Workers in higher-cost economies may lose their jobs as firms offshore production to cheaper countries, creating structural unemployment in regions that cannot easily adapt. The gains are also <b>unevenly shared</b>: skilled workers and capital owners tend to benefit far more than the low-skilled, so inequality can widen. There are wider costs too &#8212; more production and shipping raise emissions, some developing-country workers face poor pay and conditions, and footloose TNCs can avoid tax.<br><br>On balance, globalisation has clearly raised total world output and average incomes, but those gains are spread very unevenly. Whether it benefits <em>all</em> groups therefore depends on whether governments redistribute the gains and <b>help the losers</b> adjust." }
        ] },
        { code:"4.1.2", title:"Specialisation and trade", notes:`
            <p>Countries trade because <em>specialising</em> in what they do best and exchanging the rest makes everyone better off. Two ideas explain this.</p>
            <p><span class="keyword">Absolute advantage</span>: a country has it when it can produce <em>more</em> of a good than another country using the same resources.</p>
            <p><span class="keyword">Comparative advantage</span> (David Ricardo): a country should specialise in the good in which it has the <em>lower opportunity cost</em> &#8212; even if it is worse at producing <em>both</em> goods. Mutual gains arise whenever opportunity costs differ. Consider two countries, each using one unit of resources:</p>
            <table style="border-collapse:collapse;margin:.6rem 0;font-size:.86rem;">
              <tr><td style="padding:.3rem .6rem;border:1px solid #d8cdb8;"></td><td style="padding:.3rem .6rem;border:1px solid #d8cdb8;"><b>Wheat</b></td><td style="padding:.3rem .6rem;border:1px solid #d8cdb8;"><b>Cloth</b></td><td style="padding:.3rem .6rem;border:1px solid #d8cdb8;"><b>Opp. cost of 1 cloth</b></td></tr>
              <tr><td style="padding:.3rem .6rem;border:1px solid #d8cdb8;"><b>Country A</b></td><td style="padding:.3rem .6rem;border:1px solid #d8cdb8;">20</td><td style="padding:.3rem .6rem;border:1px solid #d8cdb8;">10</td><td style="padding:.3rem .6rem;border:1px solid #d8cdb8;">2 wheat</td></tr>
              <tr><td style="padding:.3rem .6rem;border:1px solid #d8cdb8;"><b>Country B</b></td><td style="padding:.3rem .6rem;border:1px solid #d8cdb8;">6</td><td style="padding:.3rem .6rem;border:1px solid #d8cdb8;">8</td><td style="padding:.3rem .6rem;border:1px solid #d8cdb8;">0.75 wheat</td></tr>
            </table>
            <p>Country A has an absolute advantage in <em>both</em> goods. But A gives up only 0.5 cloth to make a wheat, while B gives up 1.33 &#8212; so A has the lower opportunity cost in <b>wheat</b>. B gives up only 0.75 wheat per cloth, against A&apos;s 2 &#8212; so B has the lower opportunity cost in <b>cloth</b>. If A specialises in wheat and B in cloth and they trade at a rate between the two opportunity costs (say 1 cloth for 1 wheat), <em>both</em> end up able to consume more than without trade.</p>
            <p><b>Gains from trade:</b> lower prices and more choice, higher world output, and economies of scale from larger markets. But the theory rests on assumptions that may not hold &#8212; the TRAPS:</p>
            <div class="mnemonic">
              <div class="word">TRAPS <span class="hint">(the limitations of comparative advantage)</span></div>
              <ul class="mnem-list">
                <li><span class="l">T</span><span><strong>Transport costs</strong> are ignored &#8212; they can be large enough to wipe out the cost advantage.</span></li>
                <li><span class="l">R</span><span><strong>Returns to scale</strong> are assumed constant &#8212; the model ignores economies and diseconomies of scale.</span></li>
                <li><span class="l">A</span><span><strong>Assumes factor mobility</strong> &#8212; it supposes resources can switch industries freely, but workers and capital often cannot, so specialising can cause structural unemployment.</span></li>
                <li><span class="l">P</span><span><strong>Protectionism</strong> is assumed away &#8212; tariffs and barriers in the real world can negate the advantage.</span></li>
                <li><span class="l">S</span><span><strong>Specialisation risks</strong> &#8212; relying on a few goods leaves a country vulnerable to demand or price shocks (e.g. commodity dependence).</span></li>
              </ul>
            </div>
        `, questions:[
            { cmd:"Examine", marks:8, context:"Two countries are considering whether to specialise and trade rather than each producing everything themselves.",
              text:"Examine the gains a country can make from specialisation and trade based on comparative advantage.",
              kaa:["A country should specialise in the good in which it has the lower opportunity cost, even if another country is better at producing both.","If each country specialises and they trade at a rate between their opportunity costs, total world output rises.","Both countries can then consume beyond what they could produce alone, gaining lower prices and more choice.","Larger markets also allow firms to exploit economies of scale, lowering costs further."],
              ev:["Transport costs are ignored by the theory but can be large enough to outweigh the cost advantage.","The theory assumes resources can move freely between industries; in reality specialising can cause structural unemployment as some industries decline.","Over-specialisation leaves a country exposed to a fall in demand or price for its main export. Judgement: comparative advantage shows real gains from trade, but how large they are depends on transport costs, factor mobility and the risks of over-specialising."],
              mnemonic:{ word:"TRAPS", hint:"The limitations of the comparative advantage model (use in evaluation).", points:[
                {l:"T", t:"Transport costs ignored \u2014 can wipe out the gain"},
                {l:"R", t:"Returns to scale assumed constant"},
                {l:"A", t:"Assumes factor mobility \u2014 risk of structural unemployment"},
                {l:"P", t:"Protectionism assumed away \u2014 barriers can negate it"},
                {l:"S", t:"Specialisation risks \u2014 vulnerability to shocks"}
              ]},
              note:"An 8-mark Examine wants about 5 marks of analysis and 3 of evaluation. Explain the gains (you can refer to an opportunity-cost example), then evaluate using the TRAPS limitations.",
              model:"Comparative advantage shows that a country should specialise in the good in which it has the lower opportunity cost, even if another country can produce both goods more cheaply. Suppose Country A gives up less cloth to make wheat than Country B does. Then A should specialise in wheat and B in cloth. If they trade at a rate that lies between their two opportunity costs, total world output of both goods rises, and each country can consume <em>beyond</em> what it could produce on its own. Consumers therefore enjoy lower prices and greater choice, and because firms now serve a larger global market, they can exploit economies of scale and cut average costs further.<br><br>However, the gains depend on <b>assumptions</b> that may not hold. The theory ignores <b>transport</b> costs, which can be large enough to cancel out the cost advantage. It also assumes factors of production can move freely between industries, but in reality workers and capital cannot switch easily, so specialising can leave declining industries with <b>structural</b> unemployment. Finally, heavy <b>specialisation</b> leaves a country exposed if demand or the price of its main export collapses. So the gains from trade are real but their size depends on transport costs, how mobile resources are, and the risks of over-specialising." }
        ] },
        { code:"4.1.3", title:"Pattern of trade", notes:`
            <p>The <span class="keyword">pattern of trade</span> describes which countries trade which products with whom. It is not fixed &#8212; it shifts over time as the world economy changes. The main forces that reshape it are:</p>
            <blockquote>&#8226; <b>Changes in comparative advantage</b> &#8212; as a country develops and wages rise, its advantage in low-cost manufacturing fades and shifts elsewhere (e.g. low-cost clothing production moving from China towards Vietnam and Bangladesh).<br>&#8226; <b>The growth of emerging economies</b> &#8212; the rise of China, India and others has created huge new trading partners and competitors.<br>&#8226; <b>Trading blocs and agreements</b> &#8212; deals such as the EU single market create trade between members and can divert it away from non-members.<br>&#8226; <b>Relative exchange rates</b> &#8212; a sustained fall in a country&apos;s currency makes its exports cheaper, shifting trade towards it.<br>&#8226; <b>Relative competitiveness</b> &#8212; differences in inflation and productivity change which countries can undercut others.</blockquote>
            <p>Together these explain why, for example, the UK now trades far more services and less heavy manufacturing than it did 50 years ago, and why a growing share of world trade is with Asia.</p>
        `, questions:[
            { cmd:"Explain", marks:5, context:"Over two decades, a developed economy&apos;s trade has shifted away from manufacturing towards services, and increasingly towards Asian partners.",
              text:"Explain two factors that can change a country&apos;s pattern of trade.",
              kaa:["Changes in comparative advantage: as wages and costs rise in a developing economy, its advantage in low-cost manufacturing fades and that production shifts to lower-cost countries.","The growth of emerging economies: the rapid rise of economies such as China and India creates major new trading partners and competitors, redirecting trade flows towards them."],
              ev:[],
              note:"A 5-mark &apos;explain two&apos; answer needs each factor developed with a clear example of how it redirects trade.",
              model:"One factor is a change in <b>comparative advantage</b>. A country&apos;s advantage in producing a good is not permanent. As a developing economy grows, its wages and costs rise, so it loses its edge in low-cost, labour-intensive manufacturing. That production then shifts to cheaper locations &#8212; for example, basic clothing manufacturing has been moving from China towards Vietnam and Bangladesh as Chinese wages have risen &#8212; changing who exports what.<br><br>A second factor is the <b>growth of emerging economies</b>. The rapid rise of economies such as China and India has created enormous new markets and competitors. As their incomes grow they import far more, and as their industries develop they export more, so a steadily larger share of world trade now flows to and from Asia, reshaping established trade patterns." }
        ] },
        { code:"4.1.4", title:"Terms of trade", notes:`
            <p>The <span class="keyword">terms of trade</span> measure the rate at which a country&apos;s exports exchange for its imports &#8212; how much it can import for a given amount of exports. It is an index:</p>
            <blockquote><b>Terms of trade = (index of export prices &#247; index of import prices) &#215; 100</b></blockquote>
            <p>An <strong>improvement</strong> (a rise in the index) means export prices have risen relative to import prices, so each unit of exports now buys <em>more</em> imports. A <strong>deterioration</strong> (a fall) means the opposite. What moves the terms of trade spells PIED:</p>
            <div class="mnemonic">
              <div class="word">PIED <span class="hint">(what changes the terms of trade)</span></div>
              <ul class="mnem-list">
                <li><span class="l">P</span><span><strong>Productivity</strong> &#8212; faster relative productivity growth can lower a country&apos;s export prices, worsening the index but raising competitiveness.</span></li>
                <li><span class="l">I</span><span><strong>Inflation (relative)</strong> &#8212; higher domestic inflation raises export prices relative to imports, improving the index &#8212; though it can harm competitiveness.</span></li>
                <li><span class="l">E</span><span><strong>Exchange rate</strong> &#8212; a stronger currency raises export prices abroad and lowers import prices, improving the terms of trade.</span></li>
                <li><span class="l">D</span><span><strong>Demand &amp; commodity prices</strong> &#8212; a rise in the world price of a country&apos;s key export (e.g. oil) improves its terms of trade.</span></li>
              </ul>
            </div>
            <blockquote><b>Improvement isn&apos;t always good:</b> if the terms of trade improve because export <em>prices</em> rose, exports may become less competitive and sell in smaller volumes &#8212; the overall effect depends on the elasticity of demand for exports. Commodity-dependent economies often face volatile terms of trade.</blockquote>
        `, questions:[
            { cmd:"Explain", marks:5, context:"A country&apos;s currency appreciates strongly over a year.",
              text:"Explain what is meant by an improvement in the terms of trade, and one cause of it.",
              kaa:["The terms of trade are the ratio of export prices to import prices, expressed as an index.","An improvement means export prices have risen relative to import prices, so a given quantity of exports now buys more imports.","A cause is a stronger exchange rate, which raises export prices in foreign currency and lowers the price of imports, improving the index."],
              ev:[],
              note:"Define the terms of trade with the formula, explain what &apos;improvement&apos; means in real terms (more imports per export), then give one clear cause.",
              model:"The terms of trade are the ratio of a country&apos;s export prices to its import prices, written as an index: (export price index &#247; import price index) &#215; 100. An <em>improvement</em> means export prices have risen relative to import prices. In real terms this means each unit of exports now buys a greater quantity of imports, so the country can import more for any given volume of exports.<br><br>One cause is a rise in the exchange rate. When the currency appreciates, the country&apos;s exports become more expensive in foreign currency while its imports become cheaper at home. Export prices therefore rise relative to import prices, which raises the index and improves the terms of trade." }
        ] },
        { code:"4.1.5", title:"Trading blocs and the WTO", diagram:"trade-creation", notes:`
            <p>A <span class="keyword">trading bloc</span> is a group of countries that agree to reduce trade barriers between themselves. There is a ladder of ever-deeper integration:</p>
            <blockquote>&#8226; <b>Free trade area</b> &#8212; no tariffs between members, but each keeps its own external tariffs (e.g. the former NAFTA).<br>&#8226; <b>Customs union</b> &#8212; free trade between members <em>plus</em> a common external tariff on outsiders.<br>&#8226; <b>Single (common) market</b> &#8212; adds free movement of labour and capital, meaning money and investment (e.g. the EU single market).<br>&#8226; <b>Monetary union</b> &#8212; members share a common currency (e.g. the eurozone).<br>&#8226; <b>Economic union</b> &#8212; adds harmonised economic policy.</blockquote>
            <blockquote><b>Two effects to keep straight:</b> <b>trade creation</b> is <em>good</em> &#8212; joining a bloc lets a country switch to buying from a <em>lower-cost</em> member instead of producing it expensively at home. <b>Trade diversion</b> is <em>bad</em> &#8212; the common external tariff makes a country switch from a low-cost <em>non-member</em> to a higher-cost member, a welfare loss.</blockquote>
            {{diagram:trade-creation}}
            <p>The <span class="keyword">World Trade Organization (WTO)</span> promotes free trade globally: it negotiates the reduction of barriers, settles trade disputes, and enforces the "most favoured nation" principle (a country must treat all WTO members equally). Critics argue it is slow, can favour developed economies, and that regional blocs undercut its global approach.</p>
            <p>Joining a bloc brings real benefits &#8212; BEEF:</p>
            <div class="mnemonic">
              <div class="word">BEEF <span class="hint">(the benefits of joining a trading bloc)</span></div>
              <ul class="mnem-list">
                <li><span class="l">B</span><span><strong>Bigger market</strong> &#8212; tariff-free access to many countries lets firms exploit economies of scale.</span></li>
                <li><span class="l">E</span><span><strong>Efficiency</strong> &#8212; tougher competition from other members forces domestic firms to cut costs and innovate.</span></li>
                <li><span class="l">E</span><span><strong>Export-led growth</strong> &#8212; trade creation and easier exporting can raise growth and jobs.</span></li>
                <li><span class="l">F</span><span><strong>FDI</strong> &#8212; foreign firms invest inside the bloc to gain tariff-free access to the whole market.</span></li>
              </ul>
            </div>
        `, questions:[
            { cmd:"Examine", marks:8, context:"A medium-sized economy is deciding whether to join a regional customs union.",
              text:"Examine the likely benefits to a country of joining a trading bloc.",
              kaa:["Tariff-free access to a much bigger market lets domestic firms expand output and exploit economies of scale, lowering average costs.","Greater competition from other members&apos; firms forces domestic producers to become more efficient and innovative.","Trade creation lets consumers and firms buy from lower-cost member producers, lowering prices.","The bloc attracts foreign direct investment from firms wanting tariff-free access to the whole market, bringing jobs and technology."],
              ev:["Trade diversion may occur: the common external tariff can force the country to buy from a higher-cost member instead of a cheaper non-member, a welfare loss.","Membership involves a loss of economic sovereignty, as the country must accept common rules and external tariffs.","Domestic firms that cannot compete with stronger members may shut down, causing structural unemployment. Judgement: a trading bloc usually brings net benefits through scale and competition, but the outcome depends on whether trade creation outweighs trade diversion and on how competitive domestic firms are."],
              mnemonic:{ word:"BEEF", hint:"The benefits of joining a trading bloc.", points:[
                {l:"B", t:"Bigger market \u2014 economies of scale"},
                {l:"E", t:"Efficiency \u2014 more competition cuts costs"},
                {l:"E", t:"Export-led growth \u2014 trade creation"},
                {l:"F", t:"FDI attracted into the bloc"}
              ]},
              note:"An 8-mark Examine wants about 5 marks of analysis and 3 of evaluation. Run the BEEF benefits, then evaluate using trade diversion, lost sovereignty and exposed firms.",
              model:"Joining a trading bloc gives a country tariff-free access to a much <b>bigger</b> market. Firms can sell across all member states, expanding output and exploiting economies of scale that lower their average costs. The extra competition from other members&apos; firms also raises <b>efficiency</b>, forcing domestic producers to cut costs and innovate to survive. Consumers and firms benefit from trade creation, switching to lower-cost member producers, which supports <b>export</b>-led growth and jobs. The bloc is also more attractive to <b>foreign</b> investment, as multinationals locate inside it to reach the whole market tariff-free, bringing capital (investment funds) and technology.<br><br>However, the benefits are not guaranteed. The common external tariff can cause trade diversion, forcing the country to buy from a higher-cost member instead of a cheaper non-member, which reduces welfare. Membership also means surrendering some economic sovereignty, since the country must accept common rules and tariffs. And domestic firms unable to compete with stronger rivals in the bloc may close, causing structural unemployment. On balance, joining a bloc tends to bring net gains from scale and competition, but only if <b>trade creation outweighs trade diversion</b> and domestic firms can hold their own." }
        ] },
        { code:"4.1.6", title:"Restrictions on free trade", diagram:"tariff", notes:`
            <p><span class="keyword">Protectionism</span> means restricting free trade to shield domestic industries. The main methods are:</p>
            <blockquote>&#8226; <b>Tariffs</b> &#8212; a tax on imports, raising their price (see diagram).<br>&#8226; <b>Quotas</b> &#8212; a physical limit on the quantity of a good that may be imported.<br>&#8226; <b>Subsidies</b> to domestic producers &#8212; lowering their costs so they can undercut imports.<br>&#8226; <b>Non-tariff barriers</b> &#8212; red tape, regulations and quality standards that make importing harder.</blockquote>
            {{diagram:tariff}}
            <p>The <b>tariff diagram</b> shows the effects: the price rises from the world price Pw to Pw+tariff, so domestic production rises, consumption falls, and imports shrink. The government gains tariff revenue, but society suffers a deadweight welfare loss (the two triangles) from protecting inefficient production and from consumers buying less.</p>
            <p>Governments justify protection on several grounds &#8212; the DISC:</p>
            <div class="mnemonic">
              <div class="word">DISC <span class="hint">(arguments for protectionism)</span></div>
              <ul class="mnem-list">
                <li><span class="l">D</span><span><strong>Dumping</strong> &#8212; tariffs protect domestic firms when foreign producers sell below cost to capture the market.</span></li>
                <li><span class="l">I</span><span><strong>Infant industries</strong> &#8212; new industries may need temporary protection to grow until they can compete and reap economies of scale.</span></li>
                <li><span class="l">S</span><span><strong>Strategic &amp; security industries</strong> &#8212; protecting industries vital to national security (food, defence, energy).</span></li>
                <li><span class="l">C</span><span><strong>Current account &amp; jobs</strong> &#8212; protection can reduce a trade deficit and save jobs in declining industries (and tariffs raise revenue).</span></li>
              </ul>
            </div>
            <blockquote><b>Arguments against:</b> higher prices and less choice for consumers, a deadweight welfare loss, protection of inefficient firms that never improve, the risk of retaliation and trade wars, and the distortion of comparative advantage.</blockquote>
        `, questions:[
            { cmd:"Discuss", marks:12, context:"Facing a flood of cheap imported steel, a government is considering placing a tariff on steel imports to protect its domestic industry.",
              text:"Discuss whether a government should use tariffs to protect a domestic industry.",
              kaa:["A tariff raises the price of imports from Pw to Pw+tariff, so domestic firms supply more (Qs1 to Qs2) and the industry&apos;s output and jobs are protected.","Imports fall as consumption drops to Qd2, helping to reduce a current account deficit.","The government earns tariff revenue (the shaded rectangle).","Protection can be justified to guard against dumping, to nurture an infant industry, or to safeguard a strategically important industry such as steel."],
              ev:["Consumers lose: they pay a higher price and consume less, and society bears a deadweight welfare loss (the two triangles).","Protecting the industry shields it from competition, so it has little incentive to become more efficient \u2014 the problem may persist.","Other countries may retaliate with their own tariffs, triggering a trade war that harms the country&apos;s exporters.","Judgement: a tariff can be justified temporarily (e.g. genuine dumping or a true infant industry), but as a permanent policy the welfare loss, inefficiency and retaliation risk usually outweigh the benefits \u2014 so it depends on whether the protection is temporary and well-targeted."],
              note:"A 12-mark Discuss wants roughly 7\u20138 marks of analysis and 4\u20135 of evaluation. Use the tariff diagram to show the price rise, output and import changes, the revenue and the deadweight loss, then weigh the case for against the costs, ending on whether protection is temporary and targeted.",
              model:"A tariff on imported steel would raise the price domestic buyers pay from the world price Pw to Pw+tariff. As the diagram shows, this encourages domestic steel firms to expand output from Qs1 to Qs2, protecting production and jobs in the industry, while consumption falls to Qd2, so imports shrink and any current-account deficit eases. The government also collects tariff revenue, shown by the shaded rectangle. There are respectable arguments for acting: if foreign producers are <em>dumping</em> steel below cost, a tariff offsets unfair competition; steel may also count as a <em>strategic</em> industry worth safeguarding.<br><br>However, the costs are significant. <b>Domestic consumers</b> &#8212; including carmakers and builders who use steel &#8212; pay a higher price and buy less, and society suffers a deadweight welfare loss, shown by the two triangles, from protecting inefficient production and from reduced consumption. Shielding the industry also removes the pressure to become more efficient, so it may never become competitive and the protection becomes permanent. Worst of all, other countries may retaliate with their own tariffs, hurting the country&apos;s exporters in a trade war.<br><br>On balance, a tariff can be justified as a <em>temporary</em>, targeted response to genuine dumping or to nurture an infant industry. But as a lasting policy, the welfare loss, the protection of inefficiency and the risk of retaliation usually outweigh the benefits, so whether the government should act depends on how <b>temporary and well-targeted</b> the tariff is.",
              modelDiagram:"tariff" }
        ] },
        { code:"4.1.7", title:"Balance of payments", notes:`
            <p>The <span class="keyword">balance of payments</span> records all financial transactions between a country and the rest of the world. It has two main parts.</p>
            <p>The <strong>current account</strong> records trade and income flows. Its components are GIST (covered in 2.1.4): <em>Goods, Income, Services, Transfers</em>. A current account <em>deficit</em> means a country spends more abroad (mainly on imports) than it earns.</p>
            <p>The <strong>capital and financial account</strong> records flows of money and assets &#8212; foreign direct investment, portfolio flows (shares and bonds), and changes in reserves.</p>
            <blockquote><b>The accounts must balance:</b> overall the balance of payments sums to zero. A current account <em>deficit</em> must be financed by a <em>surplus</em> on the financial account &#8212; the country borrows from abroad or sells assets (such as property and companies) to foreigners to pay for the extra imports.</blockquote>
            <p>The main causes of a current account deficit are the DISC factors from 2.1.4: high <em>Domestic</em> demand, high relative <em>Inflation</em>, a <em>Strong</em> exchange rate, and poor <em>Competitiveness</em>. Deficits can be corrected by <strong>expenditure-reducing</strong> policies (cutting AD to reduce import spending), <strong>expenditure-switching</strong> policies (a weaker currency or protectionism to switch demand towards domestic goods), and <strong>supply-side</strong> policies (improving competitiveness) &#8212; the most sustainable route.</p>
        `, questions:[
            { cmd:"Assess", marks:10, context:"A developed economy has run a current account deficit of 4&#8211;5% of GDP for many years.",
              text:"Assess whether a persistent current account deficit is a problem for an economy.",
              kaa:["A deficit means the country imports more than it exports, so net trade is negative, which is a leakage from the circular flow and can lower AD, growth and jobs.","It must be financed by a financial account surplus \u2014 borrowing from abroad or selling assets \u2014 which builds up external debt and foreign ownership of domestic assets.","A persistent deficit may signal weak international competitiveness, which is a deeper structural problem.","It can put downward pressure on the currency, as more of it is supplied to buy imports."],
              ev:["A deficit is not always a problem: if it finances investment and imported capital goods, it can raise future productive capacity and exports.","With a floating exchange rate it can be self-correcting \u2014 the currency depreciates, making exports cheaper and imports dearer.","A deficit may simply reflect strong domestic demand in a growing economy, and large reserve-currency economies (e.g. the US) can finance deficits easily.","Judgement: a current account deficit is a problem mainly if it is large, persistent and financing consumption rather than investment, or if foreign lenders lose confidence \u2014 otherwise it can be sustainable."],
              note:"A 10-mark Assess wants about 6 marks of analysis and 4 of evaluation. Explain why a deficit can be harmful, then argue why it need not be, ending on what determines whether it is a genuine problem.",
              model:"A persistent current account deficit can be a problem. It means the country buys more goods and services from abroad than it sells, so net trade is negative &#8212; a leakage from the circular flow that drags on aggregate demand, growth and employment. The deficit must be financed by a surplus on the financial account, which means borrowing from abroad or selling assets such as property and companies to foreigners. Over time this builds up external debt and foreign ownership, and the interest and profits flowing out can worsen the deficit further. A long-running deficit may also signal that the country&apos;s goods are simply not competitive, a deeper structural weakness, and the extra supply of the currency to pay for imports can push its value down.<br><br>However, a deficit is not always a problem. If it finances imports of investment and capital goods, it can raise future productive capacity and export potential. With a floating exchange rate it can be partly <b>self-correcting</b>, as the currency depreciates to make exports cheaper and imports dearer. It may also simply reflect strong domestic demand in a fast-growing economy, and a large reserve-currency economy such as the United States can finance deficits with ease.<br><br>On balance, a current account deficit is a problem mainly when it is <b>large, persistent</b>, and funding consumption rather than investment, or if foreign lenders <b>lose confidence</b> in financing it. A moderate deficit in a healthy, growing economy can be perfectly sustainable." }
        ] },
        { code:"4.1.8", title:"Exchange rates", diagram:["forex","j-curve"], notes:`
            <p>An <span class="keyword">exchange rate</span> is the price of one currency in terms of another. There are three systems: a <strong>floating</strong> rate (set freely by market demand and supply), a <strong>fixed</strong> rate (pegged by the central bank), and a <strong>managed float</strong> (mostly floating, with occasional intervention).</p>
            <p>Under a float, a rise in the currency&apos;s value is an <em>appreciation</em> and a fall is a <em>depreciation</em>; under a fixed system the equivalents are <em>revaluation</em> and <em>devaluation</em>. The first diagram shows how the rate is set, and how a rise in demand for the currency causes an appreciation.</p>
            <p>What moves a floating exchange rate spells TICS:</p>
            <div class="mnemonic">
              <div class="word">TICS <span class="hint">(what moves a floating exchange rate)</span></div>
              <ul class="mnem-list">
                <li><span class="l">T</span><span><strong>Trade</strong> &#8212; demand for a country&apos;s exports creates demand for its currency; spending on imports supplies it.</span></li>
                <li><span class="l">I</span><span><strong>Interest rates</strong> &#8212; higher relative interest rates attract "hot money" inflows, raising demand for the currency.</span></li>
                <li><span class="l">C</span><span><strong>Confidence &amp; central bank</strong> &#8212; strong confidence and inward investment raise demand; a central bank can intervene to buy or sell its currency.</span></li>
                <li><span class="l">S</span><span><strong>Speculation</strong> &#8212; if traders expect the currency to rise, they buy now, which can be self-fulfilling.</span></li>
              </ul>
            </div>
            <p>The effects of a change follow SPICED (from 2.2.5): a <em>Strong Pound</em> means <em>Imports Cheaper, Exports Dearer</em> (and the reverse for a weak pound). So a depreciation tends to raise net exports and AD &#8212; but with a catch.</p>
            <blockquote><b>The J-curve &amp; Marshall&#8211;Lerner (second diagram):</b> a depreciation does not improve the current account straight away. In the <b>short run</b>, demand for exports and imports is price-inelastic, so the dearer imports outweigh the small rise in export volumes and the deficit first <em>worsens</em> &#8212; tracing a J. It only improves once volumes adjust, and only if the <em>Marshall&#8211;Lerner condition</em> holds: the combined elasticities of demand for exports and imports exceed 1.</blockquote>
        `, questions:[
            { cmd:"Assess", marks:10, context:"A country&apos;s currency depreciates by 15%, and the government hopes this will cut its current account deficit.",
              text:"Assess whether a depreciation of the currency will improve a country&apos;s current account.",
              kaa:["A depreciation makes exports cheaper in foreign currency and imports dearer at home (a weak pound: imports dearer, exports cheaper).","Cheaper exports should raise export volumes and dearer imports should reduce import volumes, improving net trade and the current account.","Higher net exports also raise aggregate demand, supporting growth and employment."],
              ev:["In the short run demand for exports and imports is inelastic, so the current account first worsens before improving \u2014 the J-curve effect.","It only improves overall if the Marshall\u2013Lerner condition holds: the combined price elasticities of demand for exports and imports must exceed 1.","Dearer imports raise costs and can cause imported (cost-push) inflation, and the gain depends on world demand and on whether other countries retaliate or also devalue.","Judgement: a depreciation can improve the current account, but only over time and only if demand is sufficiently elastic; it may also stoke inflation, so it is no guaranteed fix."],
              note:"Use both diagrams: the forex diagram to show the depreciation, and the J-curve to show the delayed improvement. The Marshall\u2013Lerner condition is the key evaluation point.",
              model:"A depreciation lowers the value of the currency, so the country&apos;s exports become cheaper in foreign currency while its imports become more expensive at home. In theory this should raise the volume of exports sold and reduce the volume of imports bought, so net trade improves and the current account deficit narrows. Higher net exports also boost aggregate demand, supporting growth and jobs.<br><br>However, the improvement is neither immediate nor guaranteed. In the <b>short run</b>, demand for exports and imports is price-inelastic &#8212; contracts and buying habits take time to change &#8212; so the higher cost of imports outweighs the small rise in export volumes, and the current account actually <em>worsens</em> first. This is the J-curve effect. The account only improves once trade volumes adjust, and only if the Marshall&#8211;Lerner condition holds: the combined <b>price elasticities</b> of demand for exports and imports must be greater than one. If demand is too inelastic, a depreciation can leave the current account worse off.<br><br>There are further risks: dearer imports raise firms&apos; costs and can cause imported, cost-push inflation, and the gain depends on healthy world demand and on other countries not retaliating or devaluing themselves. On balance, a depreciation can improve the current account, but only over time and only when demand is elastic enough &#8212; and it may import inflation in the process.",
              modelDiagram:["forex","j-curve"] }
        ] },
        { code:"4.1.9", title:"International competitiveness", notes:`
            <p><span class="keyword">International competitiveness</span> is a country&apos;s ability to sell its goods and services in world markets relative to other countries. It is usually measured by <strong>relative unit labour costs</strong> (wages compared with productivity) and <strong>relative export prices</strong>.</p>
            <p>What determines it spells SPUR:</p>
            <div class="mnemonic">
              <div class="word">SPUR <span class="hint">(what drives international competitiveness)</span></div>
              <ul class="mnem-list">
                <li><span class="l">S</span><span><strong>Skills &amp; productivity</strong> &#8212; a more skilled, productive workforce produces more per worker, lowering the cost per unit of output.</span></li>
                <li><span class="l">P</span><span><strong>Prices</strong> &#8212; relative inflation and the exchange rate set how expensive a country&apos;s exports are abroad.</span></li>
                <li><span class="l">U</span><span><strong>Unit labour costs</strong> &#8212; wages relative to productivity; lower unit labour costs make a country more cost-competitive.</span></li>
                <li><span class="l">R</span><span><strong>Regulation, tax &amp; innovation</strong> &#8212; lighter regulation and lower business taxes cut firms&apos; costs, while research and innovation raise non-price competitiveness (quality, design, reliability).</span></li>
              </ul>
            </div>
            <p>Being competitive brings a current account surplus, export-led growth and jobs; being uncompetitive does the reverse. Competitiveness is improved mainly by <strong>supply-side policies</strong> (education, training, infrastructure, investment incentives) and, in the short run, by a weaker currency &#8212; though that risks imported inflation.</p>
        `, questions:[
            { cmd:"Examine", marks:8, context:"A government is worried that its economy has been losing export market share to lower-cost rivals.",
              text:"Examine the policies a government could use to improve its country&apos;s international competitiveness.",
              kaa:["Investing in education and training raises workers&apos; skills and productivity, lowering unit labour costs.","Spending on infrastructure (transport, broadband) and offering investment incentives helps firms cut costs and innovate.","Lighter regulation and lower business taxes reduce firms&apos; costs, letting them price more competitively.","Allowing or encouraging a weaker exchange rate makes exports cheaper abroad in the short run."],
              ev:["Supply-side policies work only with long time lags \u2014 education and infrastructure take years to raise productivity.","They can be expensive and worsen the budget deficit, and their success is uncertain.","A weaker currency boosts competitiveness only temporarily and can cause imported inflation, which erodes the gain. Judgement: improving competitiveness sustainably relies on supply-side measures that raise productivity, but these are slow and costly, so the best approach depends on the time horizon and the public finances."],
              mnemonic:{ word:"SPUR", hint:"What drives international competitiveness.", points:[
                {l:"S", t:"Skills & productivity \u2014 more output per worker"},
                {l:"P", t:"Prices \u2014 relative inflation and the exchange rate"},
                {l:"U", t:"Unit labour costs \u2014 wages relative to productivity"},
                {l:"R", t:"Regulation, tax & innovation"}
              ]},
              note:"An 8-mark Examine wants about 5 marks of analysis and 3 of evaluation. Cover supply-side routes and the exchange-rate route, then evaluate the lags, cost and the temporary nature of a weaker currency.",
              model:"The most sustainable way to improve competitiveness is to raise productivity and lower unit costs. Investing in <b>skills</b> through education and training means each worker produces more, cutting the unit labour cost of output. Spending on infrastructure such as transport and broadband, together with investment incentives, helps firms produce and innovate more cheaply, improving both price and non-price competitiveness. Lighter <b>regulation</b> and lower business taxes also reduce firms&apos; costs, letting them set more competitive <b>prices</b>. In the short run, the government could also allow the exchange rate to weaken, which makes exports cheaper abroad and lowers <b>unit</b> costs relative to rivals in foreign-currency terms.<br><br>However, these policies have limits. Supply-side measures work only with <b>long time lags</b> &#8212; education and infrastructure take years to raise productivity &#8212; and they are <b>expensive</b>, which can worsen the budget deficit, with uncertain results. A weaker currency improves competitiveness only temporarily and tends to cause imported inflation, which raises firms&apos; costs and erodes the very advantage it created. On balance, lasting competitiveness depends on supply-side policies that raise productivity, but because these are slow and costly, the right approach depends on the time horizon and on how much the government can afford to spend." }
        ] },
        { code:"4.2.1", title:"Absolute and relative poverty", notes:`
            <p>Economists measure poverty in two distinct ways.</p>
            <p><span class="keyword">Absolute poverty</span> is when income is too low to afford the basic necessities of life &#8212; food, clean water, shelter and clothing. It is judged against a <em>fixed</em> standard, such as the World Bank&apos;s international poverty line (around $2.15 a day). Because the standard is fixed, economic growth can lift people out of absolute poverty.</p>
            <p><span class="keyword">Relative poverty</span> is when income is below a certain proportion of the <em>average</em> in that society &#8212; in the UK, typically below 60% of median income. It is measured <em>relative</em> to the society&apos;s living standards, so it rises and falls with them. Crucially, relative poverty can persist even as a country grows richer, if the gains are unequally shared.</p>
            <p>What pushes people into poverty spells SLUMP:</p>
            <div class="mnemonic">
              <div class="word">SLUMP <span class="hint">(the main causes of poverty)</span></div>
              <ul class="mnem-list">
                <li><span class="l">S</span><span><strong>Sickness &amp; disability</strong> &#8212; illness or disability can prevent work and raise living costs.</span></li>
                <li><span class="l">L</span><span><strong>Low wages</strong> &#8212; being in work but poorly paid ("the working poor").</span></li>
                <li><span class="l">U</span><span><strong>Unemployment</strong> &#8212; no earned income, leaving people reliant on benefits.</span></li>
                <li><span class="l">M</span><span><strong>Missing skills &amp; education</strong> &#8212; low skills trap people in low-paid or insecure work.</span></li>
                <li><span class="l">P</span><span><strong>Pensioners &amp; family circumstances</strong> &#8212; old age, lone-parent or large families with high needs and low income.</span></li>
              </ul>
            </div>
        `, questions:[
            { cmd:"Explain", marks:5, context:"A developing economy grows rapidly, yet many commentators say poverty remains widespread.",
              text:"Explain the difference between absolute and relative poverty.",
              kaa:["Absolute poverty is when income is too low to afford basic necessities (food, shelter, clothing), judged against a fixed standard such as $2.15 a day.","Relative poverty is when income falls below a set proportion of the average in that society (e.g. below 60% of median income).","Because absolute poverty uses a fixed line, growth can reduce it; relative poverty is measured against average incomes, so it can persist even as a country grows richer if inequality remains."],
              ev:[],
              note:"Define each clearly with its standard (fixed vs relative to average), then draw out the key implication: growth cuts absolute poverty but not necessarily relative poverty.",
              model:"Absolute poverty is when a person&apos;s income is too low to afford the basic necessities of life, such as food, clean water, shelter and clothing. It is measured against a <em>fixed</em> standard &#8212; for example the World Bank&apos;s line of around $2.15 a day &#8212; that does not change with average living standards.<br><br>Relative poverty is different: it is when income falls below a set proportion of the <em>average</em> in a particular society, such as 60% of median income in the UK. It is therefore measured relative to how well off everyone else is.<br><br>The key difference is what happens as a country grows richer. Because absolute poverty uses a fixed line, economic growth can lift people above it and reduce it. But relative poverty is judged against the average, so it can persist even in a fast-growing economy if the extra income flows mainly to those at the top &#8212; which is why poverty can remain widespread despite rapid growth." }
        ] },
        { code:"4.2.2", title:"Inequality", diagram:"lorenz", notes:`
            <p><span class="keyword">Income inequality</span> is the uneven distribution of income (a <em>flow</em>), while <span class="keyword">wealth inequality</span> is the uneven distribution of assets (a <em>stock</em>, such as property and shares). Wealth is usually distributed far more unequally than income.</p>
            <p><b>Measuring it.</b> The <span class="keyword">Lorenz curve</span> plots the cumulative share of income against the cumulative share of the population (shown below). The further it sags below the straight "line of equality", the more unequal the distribution. The <span class="keyword">Gini coefficient</span> turns this into a single number: the area between the line of equality and the Lorenz curve as a fraction of the whole triangle. It ranges from <strong>0</strong> (perfect equality) to <strong>1</strong> (perfect inequality).</p>
            {{diagram:lorenz}}
            <p>What drives inequality spells WEIGHT:</p>
            <div class="mnemonic">
              <div class="word">WEIGHT <span class="hint">(the causes of inequality)</span></div>
              <ul class="mnem-list">
                <li><span class="l">W</span><span><strong>Wages &amp; skills</strong> &#8212; large pay gaps between high- and low-skilled work.</span></li>
                <li><span class="l">E</span><span><strong>Education</strong> &#8212; unequal access to good education entrenches inequality across generations.</span></li>
                <li><span class="l">I</span><span><strong>Inheritance &amp; wealth</strong> &#8212; wealth (and the income it generates) is concentrated and passed down.</span></li>
                <li><span class="l">G</span><span><strong>Globalisation &amp; technology</strong> &#8212; these reward skilled workers and capital owners far more than the low-skilled.</span></li>
                <li><span class="l">H</span><span><strong>Health</strong> &#8212; poor health limits the ability to work and earn.</span></li>
                <li><span class="l">T</span><span><strong>Tax &amp; benefit system</strong> &#8212; how progressive it is shapes the final, post-tax distribution.</span></li>
              </ul>
            </div>
            <blockquote><b>The equity&#8211;efficiency trade-off:</b> some inequality is useful &#8212; it rewards effort, skill and risk-taking, creating the incentives that drive enterprise and growth. But too much inequality can harm social cohesion, lower social mobility, and even hold back growth if it denies opportunity to the poor. Governments reduce it through progressive taxes, benefits, the minimum wage and education.</blockquote>
        `, questions:[
            { cmd:"Discuss", marks:12, context:"A country&apos;s Gini coefficient has risen steadily, and there is debate about whether the government should act.",
              text:"Discuss whether a government should try to reduce income inequality.",
              kaa:["Reducing inequality can cut poverty and improve fairness and social cohesion, as the gap between rich and poor narrows.","Progressive taxes and benefits redistribute income, which can be shown as the Lorenz curve moving closer to the line of equality.","Because poorer households have a higher marginal propensity to consume, redistributing to them can raise total consumption and AD.","Greater equality of opportunity (e.g. via education) can raise long-run growth by using the whole population&apos;s talents."],
              ev:["Some inequality is necessary for incentives: rewarding effort, skill and risk encourages work and enterprise, so heavy redistribution can reduce efficiency \u2014 the equity-efficiency trade-off.","Very high taxes can create disincentives to work and invest, and may drive high earners and capital (money) abroad (a brain drain).","Redistribution is costly and, if done through benefits alone, may create dependency; supply-side routes such as education work better but slowly.","Judgement: a government should usually act to reduce <em>extreme</em> inequality, especially through education and opportunity, but it must avoid blunting incentives \u2014 so how it reduces inequality matters as much as whether it does."],
              note:"A 12-mark Discuss wants roughly 7\u20138 marks of analysis and 4\u20135 of evaluation. Make the case for reducing inequality (use the Lorenz curve), then weigh the incentive costs and the equity-efficiency trade-off, ending on how it should be done.",
