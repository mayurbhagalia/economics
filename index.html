      blurb:"Firms' growth and objectives, costs and revenues, market structures and labour.",
      papers:"Examined in Paper 1 & Paper 3",
      topics:[
        { code:"3.1.1", title:"Sizes and types of firms", notes:`
            <p>Firms range from one-person <strong>sole traders</strong> and <strong>partnerships</strong>, through <strong>private limited companies (Ltd)</strong>, up to large <strong>public limited companies (PLCs)</strong> whose shares are traded on a stock exchange. Not every firm wants to &#8212; or is able to &#8212; grow large.</p>
            <div class="mnemonic">
              <div class="word">NICHE <span class="hint">(why some firms stay small)</span></div>
              <ul class="mnem-list">
                <li><span class="l">N</span><span><strong>Niche market</strong> &#8212; demand is limited to a small, specialised segment, so there is simply no room to grow large. For example, a luthier (violin maker) or a specialist vintage-watch repairer serves only a small, dedicated market.</span></li>
                <li><span class="l">I</span><span><strong>Insufficient finance</strong> &#8212; small firms often cannot raise the capital (finance &#8212; money to invest, not capital equipment) needed to expand, especially without access to stock markets. For example, an independent caf&eacute; may be unable to secure a bank loan or attract investors to fund a second branch.</span></li>
                <li><span class="l">C</span><span><strong>Control / owner&apos;s choice</strong> &#8212; many owners run "lifestyle" businesses and prefer to keep personal control and a manageable workload rather than chase more profit. For example, a freelance designer or a family-run restaurant may stay small purely by choice.</span></li>
                <li><span class="l">H</span><span><strong>High-touch personal service</strong> &#8212; small size is the competitive edge: local, flexible and personal service that big firms struggle to match. For example, a bespoke Savile Row tailor or a local independent bookshop competes on personal attention, not scale.</span></li>
                <li><span class="l">E</span><span><strong>Escape diseconomies</strong> &#8212; staying small avoids the rising average costs and coordination problems that large firms can suffer. For example, a boutique consultancy or a small fine-dining restaurant stays small to protect quality and tight coordination.</span></li>
              </ul>
            </div>
            <h4>The divorce of ownership from control</h4>
            <p>In a large company, the people who <em>own</em> the firm (the shareholders) are usually different from the people who <em>run</em> it (the managers). This separation is called the <span class="keyword">divorce of ownership from control</span>.</p>
            <p>It creates the <span class="keyword">principal-agent problem</span>: the owners (the <em>principals</em>) want the managers (their <em>agents</em>) to maximise profit for them, but managers have their own goals &#8212; bigger salaries, perks, job security and "empire-building". Because managers know more about the business than owners do (<strong>asymmetric information</strong>), owners cannot fully monitor them, so managers may pursue their own interests instead of the owners&apos;.</p>
            <p>One common form this takes is <span class="keyword">satisficing</span> &#8212; doing just enough to keep shareholders satisfied and hold on to their jobs, rather than working flat out, since the extra profit from maximum effort would go to the owners and not to the managers themselves. Firms try to counter this by realigning incentives through <span class="keyword">performance-related pay</span> &#8212; bonuses, profit-sharing or <strong>share options</strong> (the right to buy shares cheaply) &#8212; so that managers gain personally when profits and the share price rise.</p>
        `, questions:[
            { cmd:"Explain", marks:5, context:"A successful local bakery with a loyal customer base has turned down an offer of finance to expand nationally.",
              text:"Explain two reasons why a firm might choose to remain small.",
              kaa:["It may serve a niche market \u2014 demand is limited to a small specialised segment, so there is no room to grow large.","The owner may choose to stay small to keep personal control, a manageable workload and a close relationship with customers, rather than take on the debt and delegation that expansion requires."],
              ev:[],
              mnemonic:{ word:"NICHE", hint:"why some firms stay small", points:[
                {l:"N", t:"Niche market \u2014 demand limited to a small, specialised segment"},
                {l:"I", t:"Insufficient finance \u2014 cannot raise the funds to expand"},
                {l:"C", t:"Control \u2014 owner prefers to keep personal control (a lifestyle business)"},
                {l:"H", t:"High-touch service \u2014 small size allows personal, flexible service"},
                {l:"E", t:"Escape diseconomies \u2014 staying small avoids rising average costs"}

              note:"A 5-mark &apos;explain two&apos; answer needs each reason clearly developed with a chain of reasoning. NICHE (shown above) lists every reason a firm might stay small \u2014 plan with it, then pick the two that best fit the context. The model develops the niche-market (N) and owner&apos;s-choice (C) points.",
              model:"A firm might remain small for several reasons. First, it may serve a <b>niche market</b> &#8212; a small, specialised segment of demand. If only a limited number of customers want the product, there is no room to grow large, so the firm stays small to match the size of its market.<br><br>Second, the owner may simply <b>choose</b> to stay small. Many people run lifestyle businesses and value keeping personal control, a manageable workload and a close relationship with customers more than the extra profit expansion would bring. Growing would mean delegating control and taking on debt, which they prefer to avoid." }
        ] },
        { code:"3.1.2", title:"Business growth", notes:`
            <p>Most firms that <em>can</em> grow choose to. The reasons are worth knowing well, because they recur throughout Theme 3.</p>
            <div class="mnemonic">
              <div class="word">PERMS <span class="hint">(why firms grow)</span></div>
              <ul class="mnem-list">
                <li><span class="l">P</span><span><strong>Profit</strong> &#8212; a larger firm selling more output can earn greater total profit.</span></li>
                <li><span class="l">E</span><span><strong>Economies of scale</strong> &#8212; as output rises, average (unit) costs fall, making the firm more competitive (see 3.3.3).</span></li>
                <li><span class="l">R</span><span><strong>Risk spread</strong> &#8212; diversifying into new products or markets cushions the firm, so a downturn in one area is offset by others.</span></li>
                <li><span class="l">M</span><span><strong>Market power</strong> &#8212; a bigger market share lets the firm influence price rather than simply accept it, and gives bargaining power over suppliers.</span></li>
                <li><span class="l">S</span><span><strong>Status (managerial motives)</strong> &#8212; managers may grow the firm for their own salary, power and prestige &#8212; a sign of the principal-agent problem.</span></li>
              </ul>
            </div>
            <h4>Methods of growth</h4>
            <p><b>Organic (internal) growth</b> means expanding using the firm&apos;s own resources &#8212; opening more outlets, launching new products, winning more customers. It is slower but lower-risk and keeps control in the owners&apos; hands.</p>
            <p><b>Inorganic (external) growth</b> means combining with other firms through mergers or takeovers (integration):</p>
            <ul>
              <li><strong>Horizontal integration</strong> &#8212; joining with a firm at the <em>same</em> stage of the <em>same</em> industry (e.g. two supermarkets). Boosts market share and brings economies of scale.</li>
              <li><strong>Vertical integration</strong> &#8212; joining with a firm at a <em>different</em> stage of the supply chain. <em>Backward</em> (towards a supplier) secures inputs; <em>forward</em> (towards the customer) secures distribution and retail.</li>
              <li><strong>Conglomerate integration</strong> &#8212; joining with a firm in an <em>unrelated</em> industry, mainly to diversify and spread risk.</li>
            </ul>
            <blockquote><b>Constraints on growth:</b> the size of the market, access to finance, the owners&apos; own objectives, and regulation &#8212; competition authorities (the Competition and Markets Authority, or CMA, in the UK) can block mergers judged to harm competition.</blockquote>
        `, questions:[
            { cmd:"Examine", marks:8, context:"A large retailer is considering whether to expand significantly, partly through acquiring rival firms.",
              text:"Examine why a firm might choose to grow in size.",
              kaa:["A larger firm can earn greater total profit by selling more output.","Greater scale brings economies of scale, lowering average costs and improving competitiveness.","Diversifying into new products or markets spreads risk.","A larger market share gives market power \u2014 influence over price and over suppliers.","Growth may reflect managers&apos; own motives (status, salary, power), since managers of larger firms tend to be better rewarded."],
              ev:["Beyond a certain size, firms can suffer diseconomies of scale as coordination and communication become harder, pushing average costs back up.","Growth driven by managers&apos; status rather than owners&apos; profit reflects the principal-agent problem, so it may not benefit shareholders.","Mergers can fail when company cultures clash, or be blocked by competition authorities such as the Competition and Markets Authority (CMA). Judgement: firms grow chiefly for profit, scale and market power, but the gains depend on avoiding diseconomies and integrating well."],
              mnemonic:{ word:"PERMS", hint:"Why firms grow.", points:[
                {l:"P", t:"Profit \u2014 greater total profit from selling more"},
                {l:"E", t:"Economies of scale \u2014 lower average costs"},
                {l:"R", t:"Risk spread \u2014 diversification cushions downturns"},
                {l:"M", t:"Market power \u2014 influence over price and suppliers"},
                {l:"S", t:"Status \u2014 managers&apos; own motives (principal-agent)"}
              ]},
              note:"An 8-mark Examine wants about 5 marks of analysis and 3 of evaluation. Run the PERMS reasons, then evaluate. The model deliberately shows several CAMELS angles for this acquisition context \u2014 long run vs short run (integration costs now, economies later), magnitude (how many and how large the deals are), alternatives (organic investment instead), and state of the economy (interest rates and financing). In a timed 8-marker you would develop just one or two of these well, not all of them.",
              model:"Firms grow for several reasons. The most basic is <b>profit</b>: a larger firm can earn greater total profit by selling more output. Growth also brings <b>economies</b> of scale, so average costs fall as output rises, making the firm more competitive. By diversifying into new products or markets, a firm can spread its <b>risk</b>, so a downturn in one area is cushioned by others. A bigger market share gives the firm more <b>market</b> power, letting it influence price rather than simply accept it. Finally, growth can reflect managers&apos; own motives &#8212; <b>status</b>, salary and power &#8212; since managers who run large firms tend to be better rewarded.<br><br>However, growth is not always beneficial, and for this retailer much depends on the detail. Beyond a certain size, firms suffer diseconomies of scale as coordination becomes harder, raising average costs, and growth driven by managers&apos; status rather than owners&apos; profit reflects the principal-agent problem. Acquisitions are especially risky: they can fail when company cultures clash, or be blocked by competition authorities such as the Competition and Markets Authority (CMA).<br><br>Whether growth pays off also depends on timing, scale and conditions. In the <b>short run</b>, buying rivals brings heavy costs \u2014 purchase premiums and the disruption of integration \u2014 so profits may dip during the acquisition phase, with the economies of scale appearing only in the <b>long run</b>. The <b>magnitude</b> matters: one small acquisition is far less risky than a string of large ones that could overstretch management. There is an <b>opportunity cost</b> too \u2014 the same funds could instead be invested organically in the existing business, say in new technology or staff training, to raise productivity more reliably. And the <b>state of the economy</b> is key: with low interest rates the retailer can finance the deals cheaply, whereas high rates load it with expensive debt.<br><br>So firms grow chiefly for profit, scale and market power, but for this retailer the verdict turns on how many and how large the acquisitions are, on financing costs, and on whether the long-run economies outweigh the short-run costs and the organic investment foregone." }
        ] },
        { code:"3.1.3", title:"Demergers", notes:`
            <p>A <span class="keyword">demerger</span> is when a firm splits into two or more separate, independent businesses &#8212; the opposite of a merger. A famous example is a large conglomerate spinning off a division as its own listed company.</p>
            <div class="mnemonic">
              <div class="word">DROPS <span class="hint">(why firms demerge &#8212; a firm "drops" a division)</span></div>
              <ul class="mnem-list">
                <li><span class="l">D</span><span><strong>Diseconomies of scale</strong> &#8212; the firm grew too large and inefficient; splitting into smaller units brings average costs back down.</span></li>
                <li><span class="l">R</span><span><strong>Refocus on core business</strong> &#8212; shedding non-core divisions lets the firm concentrate on what it does best.</span></li>
                <li><span class="l">O</span><span><strong>Obey regulators</strong> &#8212; a competition authority may force a break-up if the combined firm has too much market power.</span></li>
                <li><span class="l">P</span><span><strong>Profit / value unlocked</strong> &#8212; the parts are often worth more separately than together, and selling a division raises finance.</span></li>
                <li><span class="l">S</span><span><strong>Synergy lacking</strong> &#8212; if the merged parts never worked well together, separating them removes the drag.</span></li>
              </ul>
            </div>
            <blockquote><b>Impacts:</b> the businesses often become more focused and efficient (and more highly valued by investors); some workers may lose jobs in restructuring, though roles can become clearer; consumers may get better-focused service, but possibly less choice if product ranges are trimmed.</blockquote>
        `, questions:[
            { cmd:"Explain", marks:5, context:"A large conglomerate announces it will split its retail arm from its financial-services arm into two listed companies.",
              text:"Explain two reasons why a business might choose to demerge.",
              kaa:["It may have grown so large that it suffers diseconomies of scale; splitting into smaller units lowers average costs.","A demerger lets each business refocus on its core activity, so each can be run by specialists and is often valued more highly by investors."],
              ev:[],
              note:"A 5-mark &apos;explain two&apos; answer needs each reason developed with reasoning. The full set is captured by DROPS in the notes; you only need two here.",
              model:"A business might demerge for several reasons. First, it may have grown so large that it suffers <b>diseconomies</b> of scale &#8212; communication and coordination become difficult and average costs rise. Splitting into smaller, more manageable firms can bring those unit costs back down.<br><br>Second, a demerger lets each business <b>refocus</b> on its core activity. A firm spread across many unrelated markets can lose focus, so separating the divisions allows each to concentrate on what it does best and be managed by specialists. The separated parts are also often valued more highly by investors than the combined group was." }
        ] },
        { code:"3.2.1", title:"Business objectives", diagram:"firm-objectives",
          diagramIntro:`<p>Read the diagram by output level, left to right. As output rises you pass three key points, each matching a different objective: <b>profit maximisation</b> where MC = MR (Q1), <b>revenue maximisation</b> where MR = 0 (Q2), and <b>sales-volume maximisation</b> where AR = AC, the largest output that still covers all costs (Q3).</p>`,
          notes:`
            <p>Traditional theory assumes firms maximise profit, but real firms pursue a range of objectives. First, four pieces of jargon you will use throughout Theme 3:</p>
            <ul>
              <li><strong>Marginal revenue (MR)</strong> &#8212; the extra revenue from selling one more unit.</li>
              <li><strong>Marginal cost (MC)</strong> &#8212; the extra cost of producing one more unit.</li>
              <li><strong>Average revenue (AR)</strong> &#8212; revenue per unit, which equals the price; so the AR curve <em>is</em> the demand curve.</li>
              <li><strong>Average cost (AC)</strong> &#8212; cost per unit. <em>Normal profit</em> is just covered when AR = AC; anything above (AR &gt; AC) is <em>supernormal</em> (abnormal) profit.</li>
            </ul>
            <div class="mnemonic">
              <div class="word">PRESS <span class="hint">(the objectives a firm might pursue)</span></div>
              <ul class="mnem-list">
                <li><span class="l">P</span><span><strong>Profit maximisation</strong> &#8212; produce where <b>MC = MR</b>. This is where the gap between total revenue and total cost is largest; the traditional "rational" aim.</span></li>
                <li><span class="l">R</span><span><strong>Revenue maximisation</strong> &#8212; produce where <b>MR = 0</b>. Selling beyond this point would actually reduce total revenue. Often linked to managers&apos; pay and market share.</span></li>
                <li><span class="l">E</span><span><strong>Ethical / social objectives</strong> &#8212; pursuing environmental or social goals (fair pay, sustainability), accepting less profit in return.</span></li>
                <li><span class="l">S</span><span><strong>Sales-volume maximisation</strong> &#8212; the largest output that still earns normal profit, where <b>AR = AC</b>. Used to build market share or deter rivals.</span></li>
                <li><span class="l">S</span><span><strong>Survival &amp; satisficing</strong> &#8212; just staying in business (new firms, recessions); or <em>satisficing</em> (Simon) &#8212; settling for a satisfactory result to keep owners, workers and customers content, which arises from the principal-agent problem and imperfect information.</span></li>
              </ul>
            </div>
            <blockquote><b>The three "rules" in output order:</b> profit max <b>MC = MR</b> (smallest output) &#8594; revenue max <b>MR = 0</b> &#8594; sales max <b>AR = AC</b> (largest output). Why does output rise as you move along? Because between profit max and revenue max, each extra unit still adds <em>some</em> revenue (MR is positive), so a revenue-focused firm keeps producing past the profit-maximising point.</blockquote>
        `, questions:[
            { cmd:"Examine", marks:8, context:"A firm&apos;s managers are rewarded according to the firm&apos;s total sales revenue rather than its profit.",
              text:"Examine, using a diagram, why a firm aiming to maximise revenue will produce a higher output than one aiming to maximise profit.",
              kaa:["A profit maximiser produces where MC = MR (output Q1), because at that point the gap between total revenue and total cost is greatest.","A revenue maximiser produces where MR = 0 (output Q2), the point at which total revenue is highest.","Between Q1 and Q2 marginal revenue is still positive, so each extra unit adds to total revenue even though it adds less to profit; a revenue-focused firm therefore keeps expanding past the profit-maximising output.","Q2 therefore lies to the right of Q1 \u2014 the revenue maximiser produces more (and usually charges a lower price, read off the AR curve)."],
              ev:["Why a firm chooses revenue maximisation matters: it often reflects the principal-agent problem, where managers paid on sales pursue revenue rather than the owners&apos; profit.","Higher output may be a deliberate strategy to build market share or deter entry, which could raise long-run profit even if it lowers short-run profit.","In practice firms rarely maximise anything precisely \u2014 imperfect information means many satisfice. Judgement: the output gap arises because MR stays positive past the profit-maximising point, but how far a firm pushes output depends on why it favours revenue."],
              note:"This question is built around the diagram \u2014 you must draw it and mark Q1 (MC=MR) and Q2 (MR=0). The evaluation should question why a firm would sacrifice profit for revenue.",
              model:"A profit-maximising firm produces where <b>marginal cost equals marginal revenue</b> (MC = MR), at output Q1. This is the profit-maximising point because, up to Q1, each extra unit adds more to revenue than to cost; beyond it, each unit costs more than it earns. So profit is greatest at Q1.<br><br>A revenue-maximising firm instead produces where <b>marginal revenue is zero</b> (MR = 0), at output Q2. Total revenue is highest at this point, because while MR is positive each extra unit still adds to revenue, and the firm only stops when an extra unit would add nothing more.<br><br>The key link is what happens <em>between</em> Q1 and Q2. Over this range MR is positive but falling, so each extra unit still raises total revenue even though it now adds less to profit. A firm focused on revenue therefore keeps producing past Q1, up to Q2. This is why Q2 lies to the right of Q1, so the revenue maximiser produces more and, reading off the demand curve, charges a lower price.<br><br>However, this depends on why the firm targets revenue \u2014 often the principal-agent problem, where managers are paid on sales. Building market share may also raise <b>long-run</b> profit, so the two aims need not always conflict.",
              modelDiagram:"firm-objectives" }
        ] },
        { code:"3.3.1", title:"Revenue", diagram:["rev-pricemaker","rev-pricetaker"], notes:`
            <p><span class="keyword">Revenue</span> is the money a firm receives from selling its output. Three measures matter:</p>
            <ul>
              <li><strong>Total revenue (TR)</strong> = price &#215; quantity (P &#215; Q).</li>
              <li><strong>Average revenue (AR)</strong> = TR &#247; Q = the price. So the AR curve <em>is</em> the demand curve.</li>
              <li><strong>Marginal revenue (MR)</strong> = the change in TR from selling one more unit.</li>
            </ul>
            <p>How these behave depends on the type of firm:</p>
            <p><b>Price taker</b> (e.g. perfect competition). The firm is too small to affect the market price, so it can sell any amount at that price. Its demand curve is horizontal (perfectly elastic), so <strong>AR = MR = price</strong>, both constant, and TR rises in proportion to output.</p>
            <p><b>Price maker</b> (most firms). The firm faces a downward-sloping demand curve, so to sell more it must cut the price. AR slopes down, and MR lies <em>below</em> AR, falling twice as fast. This is because cutting the price to sell one extra unit also lowers the price on <em>all</em> the units before it, so the revenue gained from the last unit is less than its price.</p>
            <blockquote><b>Link to elasticity:</b> TR is maximised where <b>MR = 0</b>. Where MR is positive, demand is <em>elastic</em> (a price cut raises TR); where MR is negative, demand is <em>inelastic</em> (a price cut lowers TR); at MR = 0 demand is unit elastic and TR is at its peak.</blockquote>
        `, questions:[
            { cmd:"Explain", marks:5, context:"A firm with some market power is reviewing how its revenue changes as it sells more.",
              text:"Explain why, for a price-making firm, marginal revenue lies below average revenue.",
              kaa:["Average revenue equals the price, and a price maker faces a downward-sloping demand curve, so the price must be cut to sell more.","To sell one extra unit the firm must lower the price not just on that unit but on all the units it was already selling.","The revenue lost on those earlier units means the extra revenue from the last unit (MR) is less than its price (AR), so MR lies below AR."],
              ev:[],
              note:"The key chain is: down-sloping demand &#8594; price cut applies to all units &#8594; MR &lt; AR. The diagram earns marks by showing MR below AR.",
              model:"For a price maker, average revenue equals the price, and the firm faces a downward-sloping demand curve. This means that to sell an extra unit it must lower the price.<br><br>Crucially, the firm cannot lower the price for just the final customer; it must cut the price on <em>every</em> unit it sells. So when it sells one more unit, it gains the price of that unit but loses a little revenue on all the units it was previously selling at the higher price.<br><br>Marginal revenue is the net effect: the price of the last unit minus the revenue given up on the earlier units. Because that loss is subtracted, the extra revenue from the last unit is always less than its price. This is why the MR curve lies below the AR curve, and falls twice as steeply." }
        ] },
        { code:"3.3.2", title:"Costs", diagram:"sr-cost-curves", notes:`
            <p>Economists split the time horizon in two. In the <span class="keyword">short run</span> at least one factor of production is <em>fixed</em> (usually capital, e.g. the size of the factory). In the <span class="keyword">long run</span> <em>all</em> factors are variable.</p>
            <p><b>Fixed vs variable costs.</b> <strong>Fixed costs (FC)</strong> do not change with output (rent, insurance). <strong>Variable costs (VC)</strong> rise with output (raw materials, wages). Total cost TC = FC + VC.</p>
            <p><b>The averages.</b> <strong>AFC</strong> = FC &#247; Q (falls continuously, as fixed costs spread over more units). <strong>AVC</strong> = VC &#247; Q. <strong>ATC</strong> (=AC) = TC &#247; Q = AFC + AVC. <strong>Marginal cost (MC)</strong> is the extra cost of one more unit.</p>
            <p><b>Why the curves are U-shaped.</b> In the short run, the <span class="keyword">law of diminishing marginal returns</span> applies: as more of the variable factor (labour) is added to the fixed factor (capital), each extra worker eventually adds <em>less</em> extra output than the last. Falling marginal product means rising <strong>marginal cost</strong>. Rising MC pulls AVC and ATC up once it rises above them, giving the U shape. MC cuts AVC and ATC at their <em>minimum</em> points.</p>
            {{diagram:sr-cost-curves}}
            <blockquote><b>Reading the diagram:</b> AFC slopes down throughout. AVC and ATC fall then rise (U-shaped), with the gap between them (= AFC) narrowing as output grows. MC passes through the bottom of both U-shaped curves &#8212; if the cost of the next unit is below the average, it drags the average down; if above, it pushes it up.</blockquote>
            <div class="mnemonic">
              <div class="word">CURVES <span class="hint">(how to read the short-run cost curves)</span></div>
              <ul class="mnem-list">
                <li><span class="l">C</span><span><strong>Cuts at the minimum</strong> &#8212; MC passes through the lowest point of both the AVC and ATC curves.</span></li>
                <li><span class="l">U</span><span><strong>U-shaped</strong> &#8212; MC, AVC and ATC all fall then rise; AFC is the exception, sloping down throughout.</span></li>
                <li><span class="l">R</span><span><strong>Returns</strong> &#8212; the U-shape comes from the law of diminishing marginal returns: as marginal product falls, MC rises.</span></li>
                <li><span class="l">V</span><span><strong>Vertical gap = AFC</strong> &#8212; the gap between ATC and AVC equals average fixed cost, and it narrows as output rises.</span></li>
                <li><span class="l">E</span><span><strong>Equations</strong> &#8212; ATC = AFC + AVC, TC = FC + VC, and MC is the change in total cost from one more unit.</span></li>
                <li><span class="l">S</span><span><strong>Spreads</strong> &#8212; AFC falls continuously as fixed costs are spread over more units of output.</span></li>
              </ul>
            </div>
        `, questions:[
            { cmd:"Explain", marks:5, context:"A factory with a fixed amount of machinery takes on more and more workers.",
              text:"Explain why a firm&apos;s short-run marginal cost curve eventually slopes upward.",
              kaa:["In the short run at least one factor (capital) is fixed, while the variable factor (labour) can be increased.","The law of diminishing marginal returns means that beyond a point each extra worker adds less extra output than the previous one (marginal product falls).","If each extra worker produces less additional output, the extra cost of producing one more unit (marginal cost) rises, so the MC curve slopes upward."],
              ev:[],
              mnemonic:{ word:"FARM", hint:"why short-run marginal cost eventually rises", points:[
                {l:"F", t:"Fixed factor \u2014 in the short run capital (the factory/machinery) is fixed"},
                {l:"A", t:"Add labour \u2014 the firm piles more of the variable factor onto that fixed capital"},
                {l:"R", t:"Returns diminish \u2014 the law of diminishing marginal returns: each extra worker eventually adds less extra output (marginal product falls)"},
                {l:"M", t:"Marginal cost rises \u2014 fewer extra units per worker (same wage) means each extra unit costs more, so MC slopes up"}
              ]},
              note:"Plan with FARM (shown above): it walks the exact chain \u2014 fixed capital, more labour, diminishing returns (falling marginal product), so rising marginal cost. Define the law of diminishing returns explicitly, then make each causal link.",
              model:"In the short run a firm has at least one fixed factor &#8212; usually its capital, such as the size of the factory &#8212; while it can vary the amount of labour it employs.<br><br>As the firm adds more workers to this fixed amount of machinery, the law of diminishing marginal returns sets in. At first extra workers may raise output a lot, but beyond a certain point each additional worker has less capital to work with, so each one adds <em>less</em> extra output than the last. Marginal product falls.<br><br>Marginal cost is the cost of producing one more unit. If each extra worker (costing the same wage) produces fewer extra units, then the cost of each additional unit of output rises. This is why the marginal cost curve eventually slopes upward as output increases." }
        ] },
        { code:"3.3.3", title:"Economies and diseconomies of scale", diagram:"lrac-curve", notes:`
            <p>In the <em>long run</em> all factors are variable, so the firm can change its whole scale of operation. The <span class="keyword">long-run average cost (LRAC)</span> curve shows the lowest average cost achievable at each scale.</p>
            <p><span class="keyword">Economies of scale</span> are the fall in long-run average cost as a firm grows larger. The main <em>internal</em> economies (from the firm&apos;s own growth) spell FIRMS:</p>
            <div class="mnemonic">
              <div class="word">FIRMS <span class="hint">(internal economies of scale &#8212; big FIRMS have lower unit costs)</span></div>
              <ul class="mnem-list">
                <li><span class="l">F</span><span><strong>Financial</strong> &#8212; large firms borrow more cheaply, because banks see them as lower-risk and they can issue shares and bonds.</span></li>
                <li><span class="l">I</span><span><strong>Increased dimensions (technical)</strong> &#8212; bigger equipment is more efficient; e.g. doubling the size of a container ship more than doubles its capacity, cutting cost per unit.</span></li>
                <li><span class="l">R</span><span><strong>Risk-bearing</strong> &#8212; large firms can diversify across products and markets, so a setback in one area is cushioned by others.</span></li>
                <li><span class="l">M</span><span><strong>Managerial &amp; marketing</strong> &#8212; they can afford specialist managers (raising productivity) and spread advertising and branding costs over far more units.</span></li>
                <li><span class="l">S</span><span><strong>Supply / purchasing</strong> &#8212; buying inputs in bulk earns discounts, lowering the cost per unit of materials.</span></li>
              </ul>
            </div>
            <p><b>External economies</b> benefit <em>all</em> firms when an industry grows in one area &#8212; e.g. a pool of skilled labour or specialist suppliers (think tech firms clustering in Silicon Valley).</p>
            <p><span class="keyword">Diseconomies of scale</span> are rising long-run average costs when a firm becomes <em>too</em> big. The causes are often called the three C&apos;s plus M: <strong>Control</strong> (harder to monitor everyone), <strong>Coordination</strong> (more complex to organise), <strong>Communication</strong> (slower, more distorted), and <strong>Motivation</strong> (workers feel like a small cog and lose morale).</p>
            <blockquote><b>MES:</b> the <em>minimum efficient scale</em> is the lowest output at which LRAC is minimised &#8212; the smallest a firm can be and still be cost-competitive. In many industries the LRAC is actually L-shaped: costs fall then stay flat, because diseconomies are rare.</blockquote>
        `, questions:[
            { cmd:"Examine", marks:8, context:"A regional brewer is considering a large expansion that would treble its output.",
              text:"Examine the benefits a firm may gain from economies of scale.",
              kaa:["Financial economies: as a larger firm it can borrow more cheaply, lowering its costs.","Technical (increased dimensions) economies: larger, more efficient machinery lowers the cost per unit.","Managerial and marketing economies: specialist managers raise productivity and advertising is spread over more units.","Purchasing economies: bulk-buying inputs earns discounts, cutting material costs per unit.","Together these lower long-run average cost, making the firm more competitive and potentially more profitable."],
              ev:["If the firm grows too large it may suffer diseconomies of scale &#8212; weaker control, coordination, communication and motivation &#8212; which raise average costs again.","The size of the gains depends on the industry: where the minimum efficient scale is small, there is little to gain from getting much bigger.","The cost savings only help if the firm can sell the extra output; expanding into a limited market may leave it with spare capacity. Judgement: economies of scale can substantially lower unit costs, but only up to the minimum efficient scale and only if demand supports the larger output."],
              mnemonic:{ word:"FIRMS", hint:"Internal economies of scale.", points:[
                {l:"F", t:"Financial \u2014 cheaper borrowing for large firms"},
                {l:"I", t:"Increased dimensions (technical) \u2014 bigger kit, lower unit cost"},
                {l:"R", t:"Risk-bearing \u2014 diversification spreads risk"},
                {l:"M", t:"Managerial & marketing \u2014 specialists; ad costs spread"},
                {l:"S", t:"Supply / purchasing \u2014 bulk-buying discounts"}
              ]},
              note:"An 8-mark Examine wants about 5 marks of analysis and 3 of evaluation. Run the FIRMS economies and link them to a lower LRAC, then evaluate. The model shows several CAMELS angles \u2014 magnitude (how big the saving is, set by the minimum efficient scale), long run vs short run (savings come later, disruption first), alternatives (the opportunity cost of expanding) and state of the economy (can demand absorb the extra output?). In a timed 8-marker, develop just one or two of these well.",
              model:"Economies of scale lower a firm&apos;s long-run average cost as it grows. A larger brewer would enjoy <b>financial</b> economies, borrowing more cheaply because lenders see it as lower-risk. It would gain technical economies from <b>increased</b> dimensions, as larger, more efficient brewing and bottling equipment lowers the cost per unit. It could also afford specialist <b>managers</b> and spread its marketing across far more units, while bulk-buying ingredients and packaging would bring <b>supply</b> discounts. Each of these pushes the firm&apos;s long-run average cost down, making it more competitive and potentially more profitable.<br><br>However, the benefits are not guaranteed, and several factors affect how large they really are. If the brewer grows too large it may suffer diseconomies of scale, as control, coordination and communication weaken and motivation falls, pushing average costs back up.<br><br>The size of the gain depends on the detail. Its <b>magnitude</b> turns on the industry&apos;s minimum efficient scale: if that is reached at a low output, there is little to be won by trebling production. There is also a <b>long run</b> versus <b>short run</b> point \u2014 economies of scale are a long-run effect, so in the <b>short run</b> the disruption and investment of expanding may push costs up before any savings appear. Expanding carries an <b>opportunity cost</b> too: the funds tied up in new capacity could instead buy technology or training that cuts costs without the risk of growing unwieldy. And much depends on the <b>state of the economy</b> \u2014 lower unit costs only help if the firm can sell the extra beer, and in a downturn weak demand may leave the new capacity idle. On balance, economies of scale can cut costs significantly, but the payoff depends on staying near the minimum efficient scale, on demand absorbing the larger output, and on the long-run savings outweighing the short-run costs of getting there.",
              modelDiagram:"lrac-curve" }
        ] },
        { code:"3.3.4", title:"Normal profits, supernormal profits and losses", diagram:["profit-supernormal","profit-loss"], notes:`
            <p>Profit = total revenue &#8722; total cost. Economists divide it into three cases, all read off a cost and revenue diagram at the profit-maximising output (where MC = MR).</p>
            <p><b>Normal profit</b> is the <em>minimum</em> reward needed to keep the firm in the industry &#8212; just enough to stop the owner moving their resources elsewhere. It is an opportunity cost, so it is <em>included in costs</em>. Normal profit is earned when <strong>AR = AC</strong> (price equals average total cost), i.e. TR = TC.</p>
            <p><b>Supernormal (abnormal) profit</b> is any profit <em>above</em> normal profit, earned when <strong>AR &gt; AC</strong>. On the diagram it is the rectangle (AR &#8722; AC) &#215; Q.</p>
            <p><b>Loss (subnormal profit)</b> occurs when <strong>AR &lt; AC</strong> &#8212; the firm fails to cover all its costs.</p>
            <blockquote><b>The shut-down decision:</b> a loss-making firm should keep producing in the <em>short run</em> as long as the price covers <strong>average variable cost</strong> (AR &#8805; AVC), because it still contributes something towards its fixed costs. If the price falls below AVC, it should shut down. In the <em>long run</em> the firm must cover all costs (AR &#8805; ATC) or it will exit. So the shut-down point is the bottom of the AVC curve, and the break-even point is the bottom of the ATC curve.</blockquote>
        `, questions:[
            { cmd:"Examine", marks:8, context:"Two similar firms face the same market price: one is earning large profits, the other is making a loss.",
              text:"Examine the difference between normal profit, supernormal profit and a loss.",
              kaa:["Normal profit is the minimum reward needed to keep the firm in the industry; it is an opportunity cost included in costs and is earned when AR = AC.","Supernormal profit is profit above normal, earned when AR &gt; AC, shown as the rectangle (AR &#8722; AC) &#215; Q at the profit-maximising output.","A loss occurs when AR &lt; AC, so the firm cannot cover its average total cost.","All three are read at the output where MC = MR, with the price taken from the AR (demand) curve."],
              ev:["A short-run loss does not necessarily mean the firm shuts down: if the price still covers average variable cost, it minimises its loss by continuing to produce.","In a competitive market supernormal profit tends not to last, because it attracts new entrants whose extra supply drives the price down towards normal profit (a link to Theme 3.4).","Whether a loss is fatal depends on whether it is temporary (e.g. a recession) or permanent. Judgement: the three cases are distinguished by the position of AR relative to AC, but the firm&apos;s response depends on the time period and on average variable cost."],
              note:"Anchor every case on AR versus AC at the MC = MR output. Use both diagrams to show the supernormal-profit and loss rectangles. The evaluation should bring in the short-run shut-down rule and the erosion of profit by entry.",
              model:"All three cases are judged at the profit-maximising output, where MC = MR, with the price read off the AR (demand) curve.<br><br><b>Normal profit</b> is the minimum reward needed to keep the firm in its industry. Because it is the opportunity cost of the owner&apos;s resources, it is counted as a cost, and it is earned when average revenue equals average total cost (AR = AC). The firm is doing just well enough to stay put.<br><br><b>Supernormal profit</b> is anything above this. It arises when the price exceeds average total cost (AR &gt; AC), and on a diagram it is the rectangle found by multiplying the profit per unit (AR &#8722; AC) by the quantity sold. This is the case for the profitable firm.<br><br>A <b>loss</b> arises when average total cost lies above the price (AR &lt; AC), so the firm cannot cover all its costs &#8212; the case for the second firm.<br><br>However, the loss-making firm need not close immediately. In the <b>short run</b>, if the price still covers its average variable cost, it minimises its loss by continuing to produce. And in a competitive market, the first firm&apos;s supernormal profit is likely to attract new entrants, gradually competing it away. So the three cases differ by the position of AR relative to AC, but the firm&apos;s response depends on the time period.",
              modelDiagram:["profit-supernormal","profit-loss"] }
        ] },
        { code:"3.4.1", title:"Efficiency", notes:`
            <p><span class="keyword">Efficiency</span> is about getting the most from scarce resources. There are four types, and they are the yardstick we use to judge every market structure that follows.</p>
            <blockquote><b>The four efficiencies:</b>
            <br>&#8226; <b>Allocative efficiency</b> &#8212; resources go to what consumers most want. It occurs where <b>price = MC</b>: the price people pay for the last unit equals the cost of making it, so there is no over- or under-production.
            <br>&#8226; <b>Productive efficiency</b> &#8212; goods are made at the <em>lowest possible cost</em>, i.e. at the <b>minimum of ATC</b> (and on the PPF). No resources are wasted.
            <br>&#8226; <b>Dynamic efficiency</b> &#8212; efficiency <em>improving over time</em> through innovation, investment and new technology (funded by retained profit and R&amp;D).
            <br>&#8226; <b>X-inefficiency</b> &#8212; the <em>enemy</em>: when a firm lets its costs drift <em>above</em> the minimum (operating inside its cost curve) because a lack of competition removes the pressure to control costs.</blockquote>
            <p>Allocative and productive efficiency are <em>static</em> (judged at a point in time); dynamic efficiency is about progress <em>over</em> time. A key trade-off runs through Theme 3: very competitive markets (like perfect competition) tend to be statically efficient but <em>dynamically</em> weak, because firms make only normal profit and so have little spare cash to invest. Firms with market power may be statically inefficient yet able to fund innovation.</p>
        `, questions:[
            { cmd:"Explain", marks:4, context:"An economist is comparing two firms&apos; performance.",
              text:"Explain the difference between allocative and productive efficiency.",
              kaa:["Allocative efficiency occurs where price = MC, so resources are used to produce the goods consumers most value, with no over- or under-production.","Productive efficiency occurs where output is produced at the lowest possible average total cost (the minimum of the ATC curve), so no resources are wasted."],
              ev:[],
              note:"A 4-mark answer needs each term defined precisely with its rule (P = MC; minimum ATC) and a one-line meaning.",
              model:"Allocative efficiency is about producing the <em>right</em> goods. It occurs where price equals marginal cost (P = MC). At this point the value consumers place on the last unit (shown by the price) exactly equals the cost of producing it, so resources are allocated to what society most wants, with no over- or under-production.<br><br>Productive efficiency is about producing goods at the <em>lowest cost</em>. It occurs at the minimum point of the average total cost curve, where no resources are wasted. A firm can be productively efficient (making things cheaply) without being allocatively efficient (making the right things), so the two are distinct." }
        ] },
        { code:"3.4.2", title:"Perfect competition", diagram:["pc-sr-profit","pc-lr"], notes:`
            <p><span class="keyword">Perfect competition</span> is a theoretical market structure &#8212; a benchmark of the most competitive market possible. Its assumptions spell HELP:</p>
            <div class="mnemonic">
              <div class="word">HELP <span class="hint">(the assumptions of perfect competition)</span></div>
              <ul class="mnem-list">
                <li><span class="l">H</span><span><strong>Homogeneous products</strong> &#8212; every firm sells an identical good, so there is no brand loyalty.</span></li>
                <li><span class="l">E</span><span><strong>Entry and exit are free</strong> &#8212; there are no barriers, so firms can join or leave the industry easily.</span></li>
                <li><span class="l">L</span><span><strong>Lots of buyers and sellers</strong> &#8212; each firm is tiny relative to the market, so it is a <em>price taker</em> (it must accept the market price).</span></li>
                <li><span class="l">P</span><span><strong>Perfect information</strong> &#8212; everyone knows prices, technology and profits, so nothing can be hidden.</span></li>
              </ul>
            </div>
            <p><b>Short run.</b> Because the firm is a price taker, its demand curve is horizontal: AR = MR = price. It profit-maximises where MC = MR. If the market price is above ATC it earns <em>supernormal profit</em> (first diagram); it could equally make normal profit or a loss, depending on the price.</p>
            <p><b>Long run.</b> Supernormal profit, plus free entry and perfect information, attracts new firms. Their extra output raises market supply and pushes the price down. Entry continues until the price has fallen to the minimum of ATC, leaving only <em>normal profit</em> (second diagram). At this point P = MC = ATC at its lowest, so the firm is both <strong>productively efficient</strong> (min ATC) and <strong>allocatively efficient</strong> (P = MC).</p>
            <blockquote><b>The catch:</b> with only normal profit, firms have little spare cash for research, so perfect competition tends to be <em>dynamically</em> inefficient. And the assumptions (identical products, perfect information, no barriers) almost never hold in reality &#8212; it is a model, not a description of real markets.</blockquote>
        `, questions:[
            { cmd:"Assess", marks:10, context:"A commentator claims that the more competitive a market is, the better it is for society.",
              text:"Assess whether perfect competition always leads to an efficient allocation of resources.",
              kaa:["In long-run equilibrium the price equals marginal cost (P = MC), so the market is allocatively efficient \u2014 resources match what consumers want.","Firms produce at the minimum of ATC, so the market is also productively efficient, wasting no resources.","Free entry and exit ensure only normal profit is made in the long run, removing any persistent excess profit.","Intense competition keeps firms under pressure to keep costs down, minimising X-inefficiency."],
              ev:["The model is dynamically inefficient: with only normal profit, firms cannot fund research and development, so innovation is weak.","The assumptions \u2014 homogeneous products, perfect information, no barriers \u2014 almost never hold, so real markets rarely reach this outcome.","Large firms with market power may achieve economies of scale and fund innovation that tiny perfectly-competitive firms cannot, so they can sometimes serve consumers better. Judgement: perfect competition is statically efficient in theory, but it is dynamically weak and is a benchmark rather than a realistic description of markets."],
              note:"A 10-mark Assess wants about 6 marks of analysis and 4 of evaluation. Establish the static efficiency case (use the long-run diagram), then evaluate using dynamic efficiency and realism.",
              model:"In long-run equilibrium, perfect competition appears highly efficient. Free entry competes the price down to the minimum of average total cost, so the firm produces where P = MC = ATC. Because P = MC, the market is <b>allocatively efficient</b>: the value consumers place on the last unit equals the cost of making it, so resources match what society wants. Because output is at the lowest point of ATC, it is also <b>productively efficient</b>, wasting no resources. Constant competitive pressure also keeps X-inefficiency low, and free entry means no firm earns lasting excess profit.<br><br>However, this efficiency is only <em>static</em>. Earning just normal profit, firms have little spare cash to invest in research and development, so the model is <b>dynamically inefficient</b> &#8212; progress <b>over time</b> is weak. The <b>assumptions</b> are also unrealistic: products are rarely identical, information is rarely perfect, and barriers usually exist, so real markets seldom reach this outcome. Indeed, larger firms with some market power can sometimes fund innovation and reap economies of scale that tiny firms cannot, benefiting consumers in ways perfect competition does not. On balance, perfect competition is efficient in a narrow, static sense, but it sacrifices dynamic efficiency and is best seen as a theoretical benchmark.",
              modelDiagram:"pc-lr" }
        ] },
        { code:"3.4.3", title:"Monopolistic competition", diagram:["profit-supernormal","monopolistic-lr"], notes:`
            <p><span class="keyword">Monopolistic competition</span> sits between perfect competition and monopoly. It has <em>many</em> firms and <em>free entry and exit</em> (like perfect competition), but each firm sells a slightly <strong>differentiated</strong> product &#8212; through branding, quality or location. Think hairdressers, restaurants, coffee shops or plumbers.</p>
            <p>Because products are differentiated, each firm has a little price-setting power, so it faces a <em>downward-sloping</em> (but very elastic) demand curve, and MR lies below AR.</p>
            <p><b>Short run.</b> A firm can earn <em>supernormal profit</em> by producing where MC = MR, just like any price maker (first diagram).</p>
            <p><b>Long run.</b> Low barriers mean that supernormal profit attracts new entrants. As consumers spread across more firms, each existing firm&apos;s demand shrinks and becomes more elastic, until the AR curve is just <em>tangent</em> to the ATC curve at the profit-maximising output. At this point AR = ATC, so the firm earns only <strong>normal profit</strong> (second diagram).</p>
            <blockquote><b>Two efficiency problems:</b> in long-run equilibrium the firm produces <em>below</em> the minimum of ATC, so there is <b>excess capacity</b> (it is productively inefficient). And the price is <em>above</em> MC, so it is <b>allocatively inefficient</b> too. The trade-off is that consumers gain variety and choice from product differentiation.</blockquote>
        `, questions:[
            { cmd:"Examine", marks:8, context:"A town&apos;s independent coffee shops are currently very profitable, and several new ones are about to open.",
              text:"Examine why a firm in monopolistic competition earns only normal profit in the long run.",
              kaa:["In the short run a firm can earn supernormal profit by producing where MC = MR, because product differentiation gives it some price-setting power.","Low barriers to entry mean this profit attracts new firms into the market.","As new firms enter, customers are spread across more sellers, so each existing firm&apos;s demand falls and becomes more elastic.","Entry continues until the AR curve is tangent to the ATC curve, where AR = ATC, so only normal profit remains."],
              ev:["The outcome is normal profit but with excess capacity (output below minimum ATC), so the firm is productively inefficient.","Price also exceeds MC, making the firm allocatively inefficient \u2014 though consumers gain greater variety and choice in return.","In practice, entry may be limited by location or strong branding, allowing some supernormal profit to persist. Judgement: the erosion of profit follows directly from free entry, but the long-run result is less efficient than perfect competition, traded off against more consumer choice."],
              note:"The core chain is: SR supernormal profit &#8594; free entry &#8594; each firm&apos;s demand falls &#8594; tangency AR = ATC &#8594; normal profit. Use the long-run diagram and bring excess capacity / allocative inefficiency into the evaluation.",
              model:"In the short run a coffee shop with a distinctive brand or location has some price-setting power, so it faces a downward-sloping demand curve and can earn supernormal profit by producing where MC = MR.<br><br>However, barriers to entry are low. The supernormal profit signals an attractive market, so new coffee shops open. As they do, the town&apos;s customers are shared among more sellers, so each existing shop sees its own demand fall and become more elastic (customers now have more alternatives).<br><br>This process continues as long as supernormal profit remains. It only stops when each firm&apos;s demand has fallen so far that the AR curve is just tangent to the average total cost curve at the profit-maximising output. At that point average revenue equals average total cost, so the firm covers all its costs including normal profit but earns nothing extra.<br><br>The result is efficient in one sense &#8212; no lasting excess profit &#8212; but the firm produces below minimum ATC, leaving excess capacity, and charges a price above MC. So normal profit comes at the cost of some inefficiency, though from a <b>stakeholder</b> view consumers gain from the greater variety on offer.",
              modelDiagram:"monopolistic-lr" }
        ] },
        { code:"3.4.4", title:"Oligopoly", diagram:"kinked-demand", notes:`
            <p>An <span class="keyword">oligopoly</span> is a market dominated by a few large firms (e.g. UK supermarkets, banks, energy suppliers). Its structure is a FIB:</p>
            <div class="mnemonic">
              <div class="word">FIB <span class="hint">(the defining features of an oligopoly)</span></div>
              <ul class="mnem-list">
                <li><span class="l">F</span><span><strong>Few firms dominate</strong> &#8212; a high <em>concentration ratio</em> (the combined market share of the largest few firms is large).</span></li>
                <li><span class="l">I</span><span><strong>Interdependence</strong> &#8212; each firm&apos;s decisions affect its rivals, so firms constantly watch and react to one another.</span></li>
                <li><span class="l">B</span><span><strong>Barriers to entry</strong> &#8212; high barriers let dominant firms keep supernormal profit. Products are often differentiated, so competition is frequently <em>non-price</em> (advertising, loyalty schemes, quality).</span></li>
              </ul>
            </div>
            <p>Interdependence means firms can either <b>collude</b> or <b>compete</b>. <em>Collusion</em> (a cartel) means agreeing to fix prices or output to act like a monopoly and raise profits; overt collusion is illegal in the UK. <em>Tacit collusion</em> (e.g. price leadership) is an unspoken understanding. Cartels are unstable because each member has an incentive to cheat. Where firms compete, it may be through price wars or non-price competition.</p>
            <p><b>The kinked demand curve</b> explains why oligopoly prices are often <em>stable</em>. Each firm assumes rivals will ignore a price <em>rise</em> (so it loses lots of sales &#8212; demand is elastic above the current price) but match a price <em>cut</em> (so it gains few sales &#8212; demand is inelastic below it). This kink creates a gap in the MR curve, so costs can change within that gap without altering the profit-maximising price.</p>
            <p><b>Game theory</b> shows why firms may fail to collude. In the <em>prisoner&apos;s dilemma</em>, both firms have a dominant strategy to cut price (or advertise), even though both would be better off cooperating:</p>
            <table style="border-collapse:collapse;margin:.6rem 0;font-size:.85rem;">
              <tr><td style="padding:.3rem .5rem;"></td><td style="padding:.3rem .5rem;border:1px solid #d8cdb8;"><b>B: high price</b></td><td style="padding:.3rem .5rem;border:1px solid #d8cdb8;"><b>B: low price</b></td></tr>
              <tr><td style="padding:.3rem .5rem;border:1px solid #d8cdb8;"><b>A: high price</b></td><td style="padding:.3rem .5rem;border:1px solid #d8cdb8;">Both win big (&#163;10m, &#163;10m)</td><td style="padding:.3rem .5rem;border:1px solid #d8cdb8;">A loses (&#163;2m, &#163;14m)</td></tr>
              <tr><td style="padding:.3rem .5rem;border:1px solid #d8cdb8;"><b>A: low price</b></td><td style="padding:.3rem .5rem;border:1px solid #d8cdb8;">B loses (&#163;14m, &#163;2m)</td><td style="padding:.3rem .5rem;border:1px solid #d8cdb8;">Both modest (&#163;5m, &#163;5m)</td></tr>
            </table>
            <p>Fearing the other will undercut, both pick the low price and end up at (&#163;5m, &#163;5m) &#8212; worse than cooperating, but individually safest.</p>
        `, questions:[
            { cmd:"Examine", marks:8, context:"In a market with four large firms, the price of the product has not changed for two years despite rising input costs.",
              text:"Examine, using the kinked demand curve model, why prices may be stable in an oligopoly.",
              kaa:["Each firm believes rivals will not match a price rise, so demand is elastic above the current price \u2014 raising price would lose many customers and cut total revenue.","Each firm believes rivals will match a price cut, so demand is inelastic below the current price \u2014 cutting price gains few extra customers and lowers total revenue.","This kink in the demand curve produces a vertical gap in the marginal revenue curve directly below the kink.","Because MC can rise or fall within that gap while still equalling MR at the same output, the profit-maximising price stays unchanged \u2014 prices are rigid even when costs change."],
              ev:["The model explains why a price is stable but not how the original price was set in the first place.","Firms may instead collude to raise prices together, or launch price wars, so prices are not always stable.","If costs change by a large amount (beyond the MR gap), the price will move after all. Judgement: the kinked demand curve is a useful explanation of price rigidity, but it is only one of several possible oligopoly behaviours."],
              note:"This question is built on the diagram \u2014 draw the kink and the MR gap, and explain the elastic-above / inelastic-below assumptions. Evaluate the model&apos;s limits.",
              model:"In the kinked demand curve model, an oligopolist assumes its rivals will react asymmetrically to price changes. If it <em>raises</em> its price, it assumes rivals will hold theirs steady, so it loses many customers to them; demand is therefore elastic above the current price, and a price rise would reduce total revenue. If it <em>cuts</em> its price, it assumes rivals will match the cut to protect their share, so it gains very few extra customers; demand is therefore inelastic below the current price, and a price cut would also reduce total revenue.<br><br>These two beliefs create a kink in the demand curve at the current price. Because marginal revenue is derived from demand, the kink produces a vertical gap in the MR curve directly below it. The firm still maximises profit where MC = MR. Crucially, the firm&apos;s marginal cost can rise or fall anywhere within this gap and still cross MR at the same output, so the profit-maximising price does not change. This is why prices can stay stable even as input costs rise.<br><br>However, the model has limits. It explains why a price stays put but not how it was first set; it also rests on a strong <b>assumption</b> about how rivals react, and firms may instead collude or start price wars, so stability is not guaranteed.",
              modelDiagram:"kinked-demand" }
        ] },
        { code:"3.4.5", title:"Monopoly", diagram:["profit-supernormal","monopoly-dwl"], notes:`
            <p>A pure <span class="keyword">monopoly</span> is a single seller that <em>is</em> the industry. In UK law, a firm with at least a 25% market share is said to have monopoly power. A monopoly is a price maker protected by high barriers to entry, so it can earn supernormal profit in the long run (first diagram).</p>
            <p><b>Why monopoly can harm welfare (second diagram).</b> A monopoly profit-maximises where MC = MR, producing Qm and charging Pm. A competitive market would have produced more (Qc) at a lower price (Pc, where P = MC). So a monopoly <em>restricts output and raises price</em>. Because price exceeds MC it is <strong>allocatively inefficient</strong>; it does not produce at minimum ATC, so it is <strong>productively inefficient</strong>; and with no competition it may become <strong>X-inefficient</strong> (costs drift up). The shaded triangle is the <em>deadweight welfare loss</em>.</p>
            <p><b>Price discrimination</b> is charging different consumers different prices for the same good (e.g. peak vs off-peak rail). It needs market power, a way to separate groups by their willingness to pay, and no resale between them. It raises the firm&apos;s profit by capturing consumer surplus, though it can also let more consumers be served.</p>
            <p>But monopoly is not all bad. The case in its favour is ICED:</p>
            <div class="mnemonic">
              <div class="word">ICED <span class="hint">(the potential benefits of monopoly)</span></div>
              <ul class="mnem-list">
                <li><span class="l">I</span><span><strong>Innovation</strong> &#8212; the prospect of monopoly profit (protected by patents) rewards invention and risk-taking.</span></li>
                <li><span class="l">C</span><span><strong>Cross-subsidisation</strong> &#8212; profits from one area can fund socially valuable but loss-making services.</span></li>
                <li><span class="l">E</span><span><strong>Economies of scale</strong> &#8212; a single large producer may reach much lower average costs (a natural monopoly), potentially passing savings on as lower prices.</span></li>
                <li><span class="l">D</span><span><strong>Dynamic efficiency</strong> &#8212; supernormal profit can be reinvested in research and development, improving products over time.</span></li>
              </ul>
            </div>
        `, questions:[
            { cmd:"Discuss", marks:12, context:"A single firm supplies almost all of a country&apos;s broadband and earns large, persistent profits.",
              text:"Discuss whether a monopoly is always against the interests of consumers.",
              kaa:["A monopoly restricts output to Qm and charges a higher price Pm than a competitive market (Qc, Pc), reducing consumer surplus.","Because price exceeds marginal cost, the monopoly is allocatively inefficient, creating a deadweight welfare loss.","It need not produce at minimum ATC (productive inefficiency) and, lacking competition, may become X-inefficient with costs drifting upward.","Price discrimination can let it extract consumer surplus, charging different groups different prices for the same service."],
              ev:["Economies of scale mean a large single producer (a natural monopoly) can have much lower average costs than many small firms, potentially lowering prices.","Supernormal profit can fund research and development (dynamic efficiency) and innovation protected by patents, benefiting consumers over time.","The threat of entry (contestability) or regulation can discipline a monopoly into behaving competitively.","Judgement: monopoly can harm consumers through higher prices and inefficiency, but whether it does depends on economies of scale, whether profits are reinvested, and how contestable or well-regulated the market is."],
              mnemonic:{ word:"ICED", hint:"The potential benefits of monopoly (the other side of the argument).", points:[
                {l:"I", t:"Innovation \u2014 patents/profit reward invention"},
                {l:"C", t:"Cross-subsidisation \u2014 fund loss-making valuable services"},
                {l:"E", t:"Economies of scale \u2014 natural monopoly, lower average cost"},
                {l:"D", t:"Dynamic efficiency \u2014 profit reinvested in R&D"}
              ]},
              note:"A 12-mark Discuss wants roughly 7\u20138 marks of analysis and 4\u20135 of evaluation, ending in a judgement. Set out the harms (use the welfare-loss diagram), then the ICED benefits, then judge what it depends on.",
              model:"A monopoly can certainly harm consumers. As the sole supplier, it profit-maximises where MC = MR, producing less (Qm) and charging more (Pm) than a competitive market would (Qc at the lower Pc). This transfers consumer surplus to the firm and, because the price exceeds marginal cost, leaves the market allocatively inefficient, creating a deadweight welfare loss. With no rivals, the firm may also fail to produce at minimum average cost and may become X-inefficient, letting costs drift upward. It might even price-discriminate, charging different customers different prices to capture more of their surplus.<br><br>However, monopoly is not always against consumers&apos; interests. A single large broadband provider may achieve huge economies of scale &#8212; a natural monopoly &#8212; giving lower average costs than many small firms could, some of which may reach consumers as lower prices. Its supernormal profit can fund research and development, improving the network <b>over time</b> (dynamic efficiency), and the prospect of profit, protected by patents, rewards innovation. Crucially, the outcome <b>depends on context</b>: if the market is contestable, the threat of entry disciplines the firm, and regulation can cap prices or set quality standards.<br><br>On balance, a monopoly tends to raise prices and reduce efficiency, but whether it truly harms consumers depends on its economies of scale, whether it reinvests its profits, and how well it is regulated.",
              modelDiagram:"monopoly-dwl" }
        ] },
        { code:"3.4.6", title:"Monopsony", diagram:"labour-monopsony", notes:`
            <p>A <span class="keyword">monopsony</span> is a single (or dominant) <em>buyer</em> in a market &#8212; the mirror image of a monopoly, which is a dominant seller. Examples include a large supermarket buying from farmers, the government (e.g. the NHS) buying from suppliers, or a major employer buying labour in a small town.</p>
            <p>Monopsony power lets the buyer drive down the price it pays. Because suppliers have few alternative customers, the monopsonist can demand lower prices and better terms.</p>
            <p><b>Benefits</b> (to the buyer, and possibly to consumers): lower input costs raise the firm&apos;s profit and <em>may</em> be passed on as lower prices to consumers. A powerful buyer can also act as a <em>countervailing power</em> against monopoly suppliers, offsetting their market power.</p>
            <p><b>Costs</b>: suppliers are squeezed &#8212; lower prices cut their margins, which can reduce their investment, quality and even survival (e.g. dairy farmers paid below the cost of production). In a labour market, a monopsony employer can pay <em>lower wages</em> and hire <em>fewer</em> workers than a competitive market would (shown below; developed further in 3.5.3).</p>
            {{diagram:labour-monopsony}}
            <blockquote><b>It depends:</b> whether monopsony helps or harms overall turns on whether the buyer passes savings on to consumers, and on how badly suppliers (or workers) are squeezed.</blockquote>
        `, questions:[
            { cmd:"Examine", marks:8, context:"A supermarket chain accounts for the majority of one region&apos;s grocery sales and buys most of the local farmers&apos; produce.",
              text:"Examine the likely effects of a supermarket having monopsony power over its suppliers.",
              kaa:["As a dominant buyer, the supermarket can force down the prices it pays suppliers, who have few alternative customers.","Lower input costs reduce the supermarket&apos;s costs, raising its profit margins.","Some of these savings may be passed on to consumers as lower grocery prices.","The supermarket&apos;s buying power can also act as a countervailing power against large food manufacturers."],
              ev:["Suppliers are squeezed: lower prices cut farmers&apos; margins, which can reduce their investment and quality, and may force some out of business.","There is no guarantee savings are passed on; the supermarket may simply keep the higher profit.","If suppliers exit, the supermarket&apos;s long-run supply and choice could suffer. Judgement: monopsony power can lower costs and benefit consumers, but only if savings are passed on, and it risks lasting harm to suppliers."],
              note:"Balance the gains to the buyer/consumers against the squeeze on suppliers. The key evaluation is whether savings are actually passed on and whether suppliers can survive.",
              model:"With monopsony power, the supermarket is the main customer for the region&apos;s farmers, who have few other buyers. This lets the supermarket negotiate down the prices it pays for produce. Lower input prices reduce the supermarket&apos;s costs, which raises its profit margins, and in a competitive grocery market some of these savings may be passed on to shoppers as lower prices. The supermarket&apos;s scale also gives it countervailing power against large food manufacturers, helping to keep their prices in check.<br><br>However, the effects on suppliers can be damaging. Farmers paid very low prices see their margins squeezed, sometimes below the cost of production. This can force them to cut investment and quality, and may drive some out of business altogether. There is also no guarantee the savings reach consumers &#8212; the supermarket may keep the extra profit. And if too many suppliers fail, the supermarket&apos;s own <b>long-run</b> supply and product range could suffer. On balance, monopsony power can lower costs and potentially benefit consumers, but the gains depend on whether savings are passed on, and the effect varies sharply by <b>stakeholder</b> \u2014 a possible win for shoppers but a real risk to suppliers." }
        ] },
        { code:"3.4.7", title:"Contestability", notes:`
            <p>A <span class="keyword">contestable market</span> is one where firms can enter and leave easily. The crucial idea is that the <em>threat</em> of entry &#8212; not the number of firms &#8212; disciplines behaviour. Even a single firm in a highly contestable market will keep prices and profits low to avoid attracting "hit-and-run" entrants who would swoop in, grab the profit, and leave.</p>
            <p>So in a perfectly contestable market, firms make only <em>normal profit</em> and behave efficiently <strong>even if there are few of them</strong>. Conduct matters more than structure.</p>
            <p>What makes a market contestable spells BEST:</p>
            <div class="mnemonic">
              <div class="word">BEST <span class="hint">(what makes a market contestable)</span></div>
              <ul class="mnem-list">
                <li><span class="l">B</span><span><strong>Barriers to entry are low</strong> &#8212; no legal, technical or scale barriers blocking new firms.</span></li>
                <li><span class="l">E</span><span><strong>Exit is easy</strong> &#8212; assets can be sold on, so leaving the market is cheap.</span></li>
                <li><span class="l">S</span><span><strong>Sunk costs are low</strong> &#8212; the key factor. Sunk costs are costs that cannot be recovered on exit (e.g. specialised kit, advertising). Low sunk costs make hit-and-run entry safe, so the market is more contestable.</span></li>
                <li><span class="l">T</span><span><strong>Transparency &amp; weak brand loyalty</strong> &#8212; good information and customers willing to switch make it easy for entrants to win business.</span></li>
              </ul>
            </div>
            <blockquote><b>Reality check:</b> few markets are <em>perfectly</em> contestable. Incumbents often fight entry using limit pricing (setting prices low enough to deter entry) or predatory pricing, and high sunk costs in many industries make hit-and-run entry impossible.</blockquote>
        `, questions:[
            { cmd:"Examine", marks:8, context:"A market has only two large firms, yet they keep prices low and earn modest profits.",
              text:"Examine how the contestability of a market affects the behaviour of existing firms.",
              kaa:["In a contestable market, low barriers and low sunk costs mean new firms could enter quickly to grab any supernormal profit.","To avoid attracting such hit-and-run entrants, incumbent firms keep prices and profits low \u2014 the threat of entry alone disciplines them.","As a result, even with only a few firms, the market can reach an outcome close to normal profit, with prices near marginal cost.","This pushes the firms towards allocative and productive efficiency despite the small number of competitors."],
              ev:["The effect depends on how contestable the market really is: if sunk costs are high, hit-and-run entry is impossible and the threat is empty.","Incumbents may deter entry through limit pricing or predatory pricing, blunting the discipline of potential competition.","Perfect contestability is rare, so most real firms retain some market power. Judgement: contestability can make even a concentrated market behave competitively, but only where sunk costs and barriers are genuinely low."],
              mnemonic:{ word:"BEST", hint:"What makes a market contestable.", points:[
                {l:"B", t:"Barriers to entry low"},
                {l:"E", t:"Exit is easy (resaleable assets)"},
                {l:"S", t:"Sunk costs low \u2014 the key factor"},
                {l:"T", t:"Transparency & weak brand loyalty"}
              ]},
              note:"The core idea is that the <em>threat</em> of entry, not the number of firms, drives behaviour. Evaluation should hinge on sunk costs and entry-deterring strategies.",
              model:"In a contestable market, what matters is not how many firms there are but how easily new ones could enter. Where barriers and sunk costs are low, any supernormal profit would quickly attract hit-and-run entrants &#8212; firms that enter, take a share of the profit, and leave before incumbents can respond.<br><br>Knowing this, the existing firms keep their prices and profits low even without actual rivals, simply to remove the incentive for others to enter. The mere <em>threat</em> of competition therefore disciplines them. This is why a market with only two firms can still deliver low prices: the firms behave as if they were in a competitive market, edging towards normal profit and pricing close to marginal cost, which improves efficiency.<br><br>However, this depends on the market being <b>genuinely contestable</b>. If sunk costs are high &#8212; for example heavy spending on specialised equipment that cannot be recovered &#8212; hit-and-run entry is impossible and the threat is hollow. Incumbents may also deter entry deliberately through limit or predatory pricing. So contestability can make even a concentrated market behave competitively, but only where barriers and sunk costs are truly low." }
        ] },
        { code:"3.5.1", title:"Demand for labour", diagram:"labour-market", notes:`
            <p>The demand for labour is a <span class="keyword">derived demand</span>: firms do not want workers for their own sake, but for the goods and services those workers produce. So if demand for the product rises, demand for the labour that makes it rises too.</p>
            <p>How much a firm will pay for a worker depends on that worker&apos;s <span class="keyword">marginal revenue product (MRP)</span> &#8212; the extra revenue the worker generates:</p>
            <blockquote><b>MRP = marginal physical product &#215; marginal revenue (or price)</b><br>i.e. how much extra output the worker produces, multiplied by what each unit sells for.</blockquote>
