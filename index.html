      {"cmd": "Explain", "marks": 5, "text": "Explain the factors that determine the price elasticity of supply.", "plans": [{"word": "SEATS", "hint": "factors affecting price elasticity of supply", "points": [{"l": "S", "t": "Spare capacity"}, {"l": "E", "t": "Ease of switching production"}, {"l": "A", "t": "Availability of factors"}, {"l": "T", "t": "Time period (most important)"}, {"l": "S", "t": "Stocks / inventories"}]}], "model": "Supply is more elastic when firms can respond easily to a price change. <b>Spare</b> capacity lets a firm raise output quickly. <b>Ease</b> of switching production between goods makes supply more responsive. The <b>availability</b> of factors of production determines whether output can expand at all. The <b>time</b> period matters most: supply is far more elastic in the long run, when firms can adjust all inputs, than in the short run. Finally, holding <b>stocks</b> (inventories) lets a firm meet higher demand immediately, raising elasticity.", "why": "SEATS lists every PES determinant; the time-period point is the one examiners most want developed."},
      {"cmd": "Explain", "marks": 5, "context": "A government places a specific tax on a good for which demand is price-inelastic.", "text": "Explain how the burden of an indirect tax is shared between producers and consumers.", "plans": [{"word": "PIPS", "hint": "who bears the burden of a tax (incidence)", "points": [{"l": "P", "t": "Price rises as supply shifts"}, {"l": "I", "t": "Inelastic demand \u2014 consumer pays more"}, {"l": "P", "t": "Producers pass most on"}, {"l": "S", "t": "Split depends on elasticity"}]}], "model": "An indirect tax shifts supply left, so the <b>price</b> consumers pay rises, though usually by less than the full tax. How the burden splits depends on elasticity. If demand is <b>inelastic</b>, consumers keep buying despite the higher price, so they bear most of the tax, and <b>producers</b> can pass most of it on. The <b>split</b> of the burden therefore depends on the relative elasticities of demand and supply: the more inelastic demand is relative to supply, the larger the consumer's share, as the incidence diagram shows.", "modelDiagram": "tax-incidence", "why": "PIPS centres the answer on the key idea \u2014 incidence depends on elasticity."},
      {"cmd": "Assess", "marks": 10, "context": "A government introduces a subsidy for producers of solar panels.", "text": "Assess the effects of a government subsidy on a market.", "plans": [{"word": "SOLAR", "hint": "the effects of a subsidy on a market", "points": [{"l": "S", "t": "Subsidy lowers producers' costs"}, {"l": "O", "t": "Outward (rightward) supply shift"}, {"l": "L", "t": "Lower price, higher quantity"}, {"l": "A", "t": "Amount and PED determine the effect"}, {"l": "R", "t": "Risk: cost to the budget"}]}], "model": "A subsidy is a payment to producers that lowers their costs, so <b>supply</b> shifts to the right (<b>outward</b>). The result is a <b>lower</b> price for consumers and a higher quantity traded, as the diagram shows. For solar panels this is the aim: pushing a good with positive externalities towards the social optimum while supporting a strategic industry and jobs.<br><br>However, the effects depend on circumstances. The size of the impact depends on the <b>amount</b> of the subsidy and on the price elasticity of demand: if demand is <b>inelastic</b>, the subsidy mainly cuts price rather than boosting quantity, achieving less. There is also a <b>risk</b>: the subsidy is a cost to the government budget, carrying an <b>opportunity cost</b> and possibly widening the deficit, and it may prop up inefficient producers.<br><br>On balance, a subsidy can correct under-provision and grow a strategic industry, but its value depends on the elasticity of demand, whether the externality justifies the cost, and whether the support is temporary or becomes a permanent drain on public funds.", "modelDiagram": "subsidy-market", "why": "SOLAR runs the analysis (shift, price/quantity) and hands you the evaluation \u2014 the amount/elasticity point and the budgetary risk."},
      {"cmd": "Explain", "marks": 5, "context": "A poor harvest sharply reduces the supply of a staple food.", "text": "Explain how a supply shock affects the equilibrium price and quantity in a market.", "plans": [{"word": "LEANS", "hint": "how a supply shock changes equilibrium", "points": [{"l": "L", "t": "Left shift of supply"}, {"l": "E", "t": "Excess demand at the old price"}, {"l": "A", "t": "Adjustment: price rises"}, {"l": "N", "t": "Narrow fall in quantity if inelastic"}, {"l": "S", "t": "Short vs long run / size of shift"}]}], "model": "A negative supply shock, such as a bad harvest, shifts the supply curve <b>left</b>. At the old price there is now <b>excess</b> demand, because quantity demanded exceeds the reduced supply. This shortage forces an <b>adjustment</b>: the price rises until a new, higher equilibrium is reached. If demand is inelastic \u2014 as for food \u2014 there is only a <b>narrow</b> fall in quantity but a large rise in price. The eventual outcome also depends on the <b>short</b> versus long run and the size of the shift, since supply may recover over time.", "why": "LEANS walks the shift-to-new-equilibrium chain and flags the elasticity and time-period nuances."},
      {"cmd": "Explain", "marks": 5, "text": "Explain how an indirect tax can be used to correct a negative externality.", "plans": [{"word": "TAXED", "hint": "how a tax corrects a negative externality", "points": [{"l": "T", "t": "Tax raises the firm's cost"}, {"l": "A", "t": "Aligns MPC with MSC"}, {"l": "X", "t": "eXcess output removed"}, {"l": "E", "t": "Eliminates / reduces the externality"}, {"l": "D", "t": "Difficult to value the externality"}]}], "model": "A good with a negative externality is over-produced because firms ignore the external cost. An indirect (Pigouvian) <b>tax</b> raises the firm's private cost. Ideally the tax <b>aligns</b> the marginal private cost with the higher marginal social cost, so the firm faces the full cost of its actions. This removes the <b>excess</b> output beyond the social optimum, moving the market towards it and <b>eliminating</b> the welfare loss. The main weakness is that it is <b>difficult</b> to value the externality precisely, so the tax may be set too high or too low.", "modelDiagram": "neg-ext", "why": "TAXED gives the internalising mechanism and the standard evaluation (the valuation problem) in one word."},
      {"cmd": "Evaluate", "marks": 12, "text": "Evaluate the view that a free market is the best way to allocate resources.", "plans": [{"word": "PRICES", "hint": "the advantages of a free market", "points": [{"l": "P", "t": "Profit motive drives production"}, {"l": "R", "t": "Responsive to consumers"}, {"l": "I", "t": "Incentive to innovate"}, {"l": "C", "t": "Costs cut, prices fall"}, {"l": "E", "t": "Efficient allocation"}, {"l": "S", "t": "Spillovers (externalities) \u2014 a flaw"}]}, {"word": "PIE", "hint": "the sources of market failure \u2014 the evaluation", "points": [{"l": "P", "t": "Public goods under-provided"}, {"l": "I", "t": "Information gaps"}, {"l": "E", "t": "Externalities"}]}], "model": "The free market has powerful advantages. The <b>profit</b> motive drives firms to produce what people want, and the market is <b>responsive</b> to consumers, with the price mechanism signalling changing demand. Competition gives an <b>incentive</b> to innovate and forces firms to cut <b>costs</b>, so prices fall over time, delivering an <b>efficient</b> allocation without central planning.<br><br>However, free markets fail in important ways. They under-provide <b>public</b> goods such as defence, because of the free-rider problem. <b>Information</b> gaps lead to over- or under-consumption of demerit and merit goods. And <b>externalities</b> like pollution mean private and social costs diverge, so harmful goods are over-produced. Markets also tend to produce significant inequality, since resources go to those who can pay.<br><br>Whether the market is 'best' depends on the type of good and the <b>presence of failure</b>. For most private goods it allocates efficiently and beats central planning. But where public goods, externalities or information gaps are significant, intervention <b>improves welfare</b>. On balance, the free market is the most efficient allocator for the majority of goods, but a <em>mixed</em> economy \u2014 markets plus targeted intervention \u2014 corrects its failures and is generally superior to either extreme.", "why": "PRICES gives the case FOR the market; PIE gives the case AGAINST (its failures) \u2014 a ready-made two-sided plan."},
      {"cmd": "Explain", "marks": 5, "text": "Explain why a free market fails to provide public goods.", "plans": [{"word": "FIRMED", "hint": "why the market fails to provide a public good", "points": [{"l": "F", "t": "Free-rider problem"}, {"l": "I", "t": "No Incentive for firms"}, {"l": "R", "t": "Non-Rival"}, {"l": "M", "t": "Missing market"}, {"l": "E", "t": "Non-Excludable"}, {"l": "D", "t": "Defence (example)"}]}], "model": "A public good is non-<b>rival</b> (one person's use does not reduce another's) and non-<b>excludable</b> (people cannot be prevented from using it). Because they cannot be excluded, consumers can <b>free</b>-ride \u2014 enjoy the good without paying. Knowing this, firms have no <b>incentive</b> to provide it, since they cannot charge a price and profit. The result is a <b>missing</b> market: the good is not provided at all, even though it is valuable. <b>Defence</b> is the classic example, which is why the government must provide such goods directly.", "why": "FIRMED gives the two defining features plus the free-rider chain that explains the missing market."},
      {"cmd": "Explain", "marks": 5, "text": "Explain how information gaps can lead to market failure.", "plans": [{"word": "LIMBS", "hint": "how information gaps cause market failure", "points": [{"l": "L", "t": "Lemons (used-car market)"}, {"l": "I", "t": "Information gap / asymmetry"}, {"l": "M", "t": "Merit under-, demerit over-consumed"}, {"l": "B", "t": "Buyers hesitate"}, {"l": "S", "t": "Sellers of good cars withdraw"}]}], "model": "Markets work best when buyers and sellers are well informed; an <b>information</b> gap (asymmetry) causes failure. The classic <b>lemons</b> example is the used-car market: sellers know a car's quality but <b>buyers</b> cannot tell good cars from bad, so they hesitate and offer only a low average price. <b>Sellers</b> of good cars then withdraw, leaving mostly poor ones. More widely, information gaps mean <b>merit</b> goods such as healthcare are under-consumed and demerit goods over-consumed, because people misjudge the true costs and benefits \u2014 a misallocation of resources.", "why": "LIMBS embeds asymmetric information in the memorable lemons story and links it to merit and demerit goods."},
      {"cmd": "Assess", "marks": 10, "context": "A city government caps rents below the market level to improve affordability.", "text": "Assess the likely effects of imposing a maximum price in a market.", "plans": [{"word": "RENT", "hint": "the effects of a maximum price (rent cap)", "points": [{"l": "R", "t": "Reduced price (below equilibrium)"}, {"l": "E", "t": "Excess demand (shortage)"}, {"l": "N", "t": "Non-price rationing and black markets"}, {"l": "T", "t": "Trade-off: affordable but scarce"}]}], "model": "A maximum price set below equilibrium \u2014 such as a rent cap \u2014 <b>reduces</b> the price tenants pay, which is the policy's aim: to make housing more affordable for lower-income households. As the diagram shows, however, at this lower price quantity demanded exceeds quantity supplied, creating <b>excess</b> demand: a shortage. With price unable to ration the good, <b>non</b>-price rationing appears \u2014 waiting lists, landlords choosing tenants, and black markets above the cap.<br><br>This reveals the central <b>trade</b>-off: rents are more affordable for those who get housing, but there is less of it, so many would-be tenants find none. <b>Over time</b> the cap can discourage landlords from supplying or maintaining rental housing, worsening the shortage.<br><br>On balance, a maximum price helps those who secure the good at the lower price but creates shortages, rationing problems and reduced long-run supply. Whether it is justified depends on <b>how severe the affordability problem is</b> and whether it is paired with measures \u2014 such as building more housing \u2014 to tackle the shortage it causes.", "modelDiagram": "max-price", "why": "RENT runs straight from the cap to the shortage and its consequences, ending on the affordability-vs-availability trade-off."},
      {"cmd": "Explain", "marks": 5, "text": "Explain the different objectives a firm might pursue.", "plans": [{"word": "PRESS", "hint": "the objectives a firm might pursue", "points": [{"l": "P", "t": "Profit maximisation (MC=MR)"}, {"l": "R", "t": "Revenue maximisation (MR=0)"}, {"l": "E", "t": "Ethical / social objectives"}, {"l": "S", "t": "Sales-volume maximisation (AR=AC)"}, {"l": "S", "t": "Survival and satisficing"}]}], "model": "Although economists often assume firms <b>profit</b>-maximise (producing where MC=MR), firms pursue other goals. A firm may <b>revenue</b>-maximise (where MR=0) to boost market share or managers' pay. It may follow <b>ethical</b> or social objectives, sacrificing some profit for environmental or community goals to build reputation. It may pursue <b>sales</b>-volume maximisation, selling as much as possible while covering costs (AR=AC), to dominate a market. And in hard times it may aim simply at <b>survival</b>, or 'satisfice' \u2014 making enough profit to keep shareholders content while pursuing other aims.", "modelDiagram": "firm-objectives", "why": "PRESS lists every objective on the spec; the diagram pins each to its output rule."},
      {"cmd": "Discuss", "marks": 12, "text": "Discuss why some firms grow large while others choose to remain small.", "plans": [{"word": "PERMS", "hint": "why firms grow", "points": [{"l": "P", "t": "Profit \u2014 greater total profit"}, {"l": "E", "t": "Economies of scale"}, {"l": "R", "t": "Risk spread (diversification)"}, {"l": "M", "t": "Market power"}, {"l": "S", "t": "Status (managers' motive)"}]}, {"word": "NICHE", "hint": "why some firms stay small", "points": [{"l": "N", "t": "Niche market"}, {"l": "I", "t": "Insufficient finance"}, {"l": "C", "t": "Control / owner's choice"}, {"l": "H", "t": "High-touch personal service"}, {"l": "E", "t": "Escape diseconomies"}]}], "model": "Many firms seek to grow. Growth can raise total <b>profit</b> by selling more, and a larger firm reaps <b>economies</b> of scale, lowering average costs. Size lets a firm spread <b>risk</b> across products and markets and gain <b>market</b> power \u2014 influence over price and barriers that deter rivals. Managers may also pursue growth for <b>status</b> and higher pay.<br><br>Yet many firms stay small. Some serve a small <b>niche</b> a large firm would find unprofitable. Others face <b>insufficient</b> finance to expand. Some owners value <b>control</b>, preferring not to dilute ownership. Personal, <b>high</b>-touch service can be a selling point that scale would destroy. And staying small lets a firm <b>escape</b> the diseconomies of scale that raise costs in big organisations.<br><br>Which path a firm takes <b>depends on its market and motives</b>. Where <b>economies of scale are large</b> (cars, steel), growth is almost essential to compete on cost; in markets built on personalisation or craft, small firms thrive. The owner's objectives matter too. On balance, firms grow where scale brings competitive advantage and stay small where niche focus, control or finance constraints make smallness the better strategy.", "why": "PERMS gives every reason to grow; NICHE every reason to stay small \u2014 the two halves of the question in two words."},
      {"cmd": "Explain", "marks": 5, "text": "Explain why a firm might choose to demerge.", "plans": [{"word": "DROPS", "hint": "why firms demerge", "points": [{"l": "D", "t": "Diseconomies of scale"}, {"l": "R", "t": "Refocus on core business"}, {"l": "O", "t": "Obey regulators"}, {"l": "P", "t": "Profit / value unlocked"}, {"l": "S", "t": "Synergy lacking"}]}], "model": "Demerging means splitting a firm into separate businesses. A firm may demerge to escape <b>diseconomies</b> of scale, where it has grown too large to manage efficiently and average costs have risen. It may want to <b>refocus</b> on its core business, selling off unrelated divisions. It may be forced to <b>obey</b> regulators who order a break-up to protect competition. Demerging can also unlock <b>profit</b> or value if the parts are worth more apart than together. And it makes sense where the expected <b>synergy</b> between divisions never materialised.", "why": "DROPS gives five distinct, examinable reasons to split a firm up."},
      {"cmd": "Explain", "marks": 5, "text": "Explain the assumptions of a perfectly competitive market.", "plans": [{"word": "HELP", "hint": "the assumptions of perfect competition", "points": [{"l": "H", "t": "Homogeneous products"}, {"l": "E", "t": "Entry and exit are free"}, {"l": "L", "t": "Lots of buyers and sellers"}, {"l": "P", "t": "Perfect information"}]}], "model": "Perfect competition rests on four assumptions. Firms sell <b>homogeneous</b> (identical) products, so consumers have no reason to prefer one seller and each firm is a price-taker. <b>Entry</b> and exit are free, with no barriers, so supernormal profit is competed away in the long run. There are <b>lots</b> of buyers and sellers, so no single one can influence the market price. And there is <b>perfect</b> information, so everyone knows prices and products. Together these mean firms earn only normal profit in the long run.", "modelDiagram": "pc-lr", "why": "HELP is the four-assumption checklist; the diagram shows the long-run normal-profit outcome they produce."},
      {"cmd": "Examine", "marks": 8, "text": "Examine the key features of oligopolistic and contestable markets.", "plans": [{"word": "FIB", "hint": "the defining features of an oligopoly", "points": [{"l": "F", "t": "Few firms dominate"}, {"l": "I", "t": "Interdependence"}, {"l": "B", "t": "Barriers to entry"}]}, {"word": "BEST", "hint": "what makes a market contestable", "points": [{"l": "B", "t": "Barriers to entry low"}, {"l": "E", "t": "Exit is easy (resaleable assets)"}, {"l": "S", "t": "Sunk costs low (the key factor)"}, {"l": "T", "t": "Transparency, weak brand loyalty"}]}], "model": "An oligopoly has a <b>few</b> firms dominating the market (a high concentration ratio). Its defining feature is <b>interdependence</b>: each firm's actions depend on rivals' reactions, so prices are often stable (the kinked demand curve) while competition takes non-price forms. High <b>barriers</b> to entry protect incumbents' profits.<br><br>Contestability is almost the opposite. A market is contestable when <b>barriers</b> to entry are low, <b>exit</b> is easy because assets can be resold, <b>sunk</b> costs are low (the key factor, so a firm risks little by entering), and there is <b>transparency</b> with weak brand loyalty. In a contestable market the mere <em>threat</em> of hit-and-run entry forces even a single incumbent to keep prices and profits low. So oligopoly is defined by interdependence and barriers, while contestability is defined by their absence \u2014 it is the freedom of entry and exit, not the current number of firms, that disciplines behaviour.", "modelDiagram": "kinked-demand", "why": "FIB and BEST sit naturally together \u2014 one defines oligopoly, the other contestability, and the contrast is the answer."},
      {"cmd": "Explain", "marks": 5, "text": "Explain the factors that determine the supply of labour to a particular occupation.", "plans": [{"word": "SWAN", "hint": "what determines the supply of labour to a job", "points": [{"l": "S", "t": "Skills / qualifications needed"}, {"l": "W", "t": "Wages in other occupations"}, {"l": "A", "t": "Amenities and non-monetary factors"}, {"l": "N", "t": "Number of qualified people available"}]}], "model": "Several factors determine how many workers supply their labour to a job. The <b>skills</b> and qualifications required matter: jobs needing long training have a smaller, less elastic supply. <b>Wages</b> in alternative occupations affect supply, since workers compare what they could earn elsewhere. <b>Amenities</b> and non-monetary factors \u2014 conditions, status, job satisfaction \u2014 attract or deter workers regardless of pay. And the <b>number</b> of suitably qualified people available sets the overall pool. Together these explain why supply to some occupations is plentiful and to others scarce.", "modelDiagram": "labour-market", "why": "SWAN lists every determinant of labour supply to an occupation; the skills/training point drives its elasticity."}
    ]},

    { paper:"Paper 3 \u00b7 Microeconomics & Macroeconomics (synoptic)", blurb:"Synoptic \u2014 questions can draw on any topic across the course.", qs:[

        text:"Evaluate the most effective strategy for promoting economic development in a developing country.",
        plans:[ { word:"DRAFT", hint:"the menu of development strategies", points:[
            {l:"D", t:"Debt relief \u2014 frees revenue lost to interest"},
            {l:"R", t:"Reform & markets \u2014 liberalisation, privatisation, microfinance"},
            {l:"A", t:"Aid \u2014 fills the savings & foreign-currency gaps"},
            {l:"F", t:"FDI \u2014 capital (finance), jobs, technology, tax revenue"},
            {l:"T", t:"Training & infrastructure \u2014 human capital (interventionist)"} ]} ],
        model:"Developing countries can choose from several strategies, and the savings gap in the poverty-trap diagram explains why outside finance matters. <b>Debt</b> relief frees revenue currently lost to interest for development spending. Market <b>reform</b> \u2014 trade liberalisation, privatisation and microfinance \u2014 can raise efficiency and channel credit to entrepreneurs. <b>Aid</b>, financial and technical, can fill the savings and foreign-currency gaps directly. <b>FDI</b> from multinationals brings capital (finance), jobs, technology and tax revenue. And interventionist investment in <b>training</b>, health and infrastructure raises human capital and capacity over the long term.<br><br>Each has drawbacks. Debt relief and aid can create dependency and may be wasted where governance is weak. Market reforms can widen inequality and expose fragile industries to competition. FDI may see profits repatriated, exploit cheap labour, or create few jobs. Human-capital investment is powerful but slow. Crucially, almost all depend on the <b>quality of institutions</b>: aid, reform and FDI deliver far less where corruption is rife and property rights are insecure.<br><br>There is therefore no single best strategy \u2014 the most effective approach <b>depends on circumstances</b>. A country trapped by debt benefits most from relief; one with weak human capital needs education and health spending first; one with stable institutions can attract productive FDI. On balance, the strongest results usually come from a <em>combination</em>: building sound institutions and human capital so that aid, reform and foreign investment can work, rather than relying on any one measure alone.",
        modelDiagram:"poverty-cycle",
        why:"DRAFT lists the entire menu of strategies in one word \u2014 each becomes a point, and the evaluation (drawbacks + &apos;depends on governance&apos;) leads naturally to a &apos;use a combination&apos; judgement." },

      { cmd:"Assess", marks:12,
        context:"A government is considering imposing tariffs to shield its struggling steel industry from cheap imports.",
        text:"Assess the case for a country adopting protectionist policies.",
        plans:[ { word:"DISC", hint:"the arguments FOR protection", points:[
            {l:"D", t:"Dumping \u2014 counter unfair below-cost imports"},
            {l:"I", t:"Infant industries \u2014 time to grow & reach scale"},
            {l:"S", t:"Strategic & security industries"},
            {l:"C", t:"Current account & jobs \u2014 switch spending to domestic output"} ]} ],
        model:"There are several arguments for protection. Tariffs can counter <b>dumping</b>, where foreign firms sell below cost to drive out rivals; a tariff, as the diagram shows, raises the import price and protects domestic producers from unfair competition. Protection can shelter <b>infant</b> industries, giving new sectors time to grow and achieve economies of scale before facing world competition. It can safeguard <b>strategic</b> and security industries \u2014 steel, energy, food \u2014 judged too important to depend on imports for. And by switching spending from imports to domestic output, it can support the <b>current</b> account and protect jobs in the threatened industry.<br><br>However, protection carries serious costs. Tariffs raise prices for consumers and for firms using the import as an input, and they shield inefficiency, since protected industries have less incentive to cut costs or innovate. Protection misallocates resources by overriding comparative advantage. Worst of all, it invites retaliation: partners may impose their own tariffs, shrinking exports and risking a trade war. The infant-industry argument also fails if protection is never removed and the industry never matures.<br><br>On balance, there is a limited case for <b>temporary, targeted</b> protection \u2014 against genuine dumping or for a truly strategic industry \u2014 but as a general policy it tends to make a country poorer by raising prices, entrenching inefficiency and provoking retaliation. Whether tariffs on steel are justified here <b>depends on whether the threat is genuinely unfair dumping</b> or simply more efficient foreign production the economy would be better off importing.",
        modelDiagram:"tariff",
        why:"DISC gives the four arguments for protection (the KAA); the evaluation is the standard costs of protection (prices, inefficiency, retaliation). A neat reversal of the same word used for current-account deficits." },
      { cmd:"Assess", marks:10,
        context:"A developing country has a large proportion of its population living below the poverty line.",
        text:"Assess the main causes of poverty.",
        plans:[ { word:"SLUMP", hint:"the main causes of poverty", points:[
            {l:"S", t:"Sickness & disability"},
            {l:"L", t:"Low wages (the &apos;working poor&apos;)"},
            {l:"U", t:"Unemployment"},
            {l:"M", t:"Missing skills & education"},
            {l:"P", t:"Pensioners & family circumstances"} ]} ],
        model:"Poverty has several causes. <b>Sickness</b> and disability prevent people working or raise their costs, pushing them into poverty. <b>Low</b> wages mean even those in work \u2014 the &apos;working poor&apos; \u2014 may not earn enough to escape it. <b>Unemployment</b> removes earned income altogether and is a leading cause, especially where benefit support is weak. <b>Missing</b> skills and education trap people in low-paid, insecure work and pass disadvantage to the next generation. And <b>pensioners</b> and those whose family circumstances change, such as lone parents, are often left with low incomes.<br><br>These causes are deeply interlinked: missing education leads to low skills, which leads to unemployment or low wages, which entrenches poverty across generations \u2014 a poverty trap. That makes it hard to single out one cause, and the <b>most important varies by country</b>: where jobs are scarce, unemployment and low wages may dominate, while ill health and lack of education are root causes keeping the others in place.<br><br>On balance, poverty is rarely the result of a single factor; it stems from a cluster of reinforcing causes centred on a lack of earning power. That is why the most effective anti-poverty policies tackle the underlying drivers \u2014 education, health and job creation \u2014 rather than the symptoms alone, though the right priority <b>depends on the country&apos;s circumstances</b>.",
        why:"SLUMP captures every standard cause of poverty in one word; the analysis is then developing each into a chain, and the evaluation is how they interlink and which dominates." },

      { cmd:"Evaluate", marks:12,
        context:"A decade after a major banking crisis, regulators review why the financial sector failed so badly.",
        text:"Evaluate the view that the financial sector is inherently prone to market failure.",
        plans:[ { word:"SMEAR", hint:"market failure in the financial sector", points:[
            {l:"S", t:"Speculation & bubbles that burst"},
            {l:"M", t:"Moral hazard \u2014 &apos;too big to fail&apos;"},
            {l:"E", t:"Externalities \u2014 systemic risk"},
            {l:"A", t:"Asymmetric information \u2014 mis-selling"},
            {l:"R", t:"Rigging \u2014 rate/market manipulation"} ]} ],
        model:"The financial sector fails in several ways. <b>Speculation</b> and herding inflate asset bubbles that burst, destabilising the economy. <b>Moral</b> hazard makes banks take excessive risks because they expect to be bailed out if they are &apos;too big to fail&apos;. When a bank collapses it imposes huge negative <b>externalities</b> on the whole economy through systemic risk, as failures cascade through interlinked institutions. <b>Asymmetric</b> information means lenders and borrowers know different things, causing mis-selling and reckless lending. And markets can be <b>rigged</b> \u2014 rates and prices manipulated for private gain.<br><br>These failures are reinforcing: moral hazard encourages the very risk-taking that fuels bubbles, and asymmetric information makes both worse. The <b>most serious</b> is the externality of systemic risk, because finance underpins all other economic activity, so a banking collapse can drag the whole economy into recession \u2014 which is precisely why the sector attracts heavy regulation.<br><br>However, the failures are not wholly inherent or unfixable. Regulation \u2014 capital and liquidity requirements, ring-fencing, conduct rules \u2014 and a central bank acting as lender of last resort can substantially reduce them, even if they cannot be eliminated. How prone the sector is therefore <b>depends partly on the regime</b>: light-touch regulation makes failure far more likely than tight, well-enforced rules. On balance, the financial sector does have features \u2014 above all systemic externalities and moral hazard \u2014 that make it unusually prone to failure, but the <b>scale of that failure</b> depends heavily on how well it is regulated.",
        why:"SMEAR lists every form of financial-market failure for the analysis, and the evaluation writes itself: systemic risk is the worst, and the regime determines how prone the sector really is." },
      { cmd:"Evaluate", marks:12,
        context:"Two countries are deciding whether to remove all remaining trade barriers between them.",
        text:"Evaluate the view that free trade always benefits an economy.",
        plans:[ { word:"TRAPS", hint:"limitations of comparative advantage \u2014 your evaluation", points:[
            {l:"T", t:"Transport costs ignored"},
            {l:"R", t:"Returns to scale assumed constant"},
            {l:"A", t:"Assumes factor mobility (often false)"},
            {l:"P", t:"Protectionism assumed away (no retaliation)"},
            {l:"S", t:"Specialisation risks (over-dependence)"} ]} ],
        model:"The case for free trade rests on comparative advantage: if each country specialises in what it produces at lowest opportunity cost and then trades, total output rises and both can consume beyond their own production possibilities. Free trade also lowers prices, widens choice, allows economies of scale and sharpens competition and efficiency. On this reasoning, free trade benefits both partners.<br><br>However, the model&apos;s <b>assumptions</b> limit how far this always holds. It ignores <b>transport</b> costs, which can wipe out a small advantage. It assumes constant <b>returns</b> to scale, when increasing returns can entrench early movers. It assumes factors are mobile, but in reality <b>assumed</b> factor mobility rarely holds \u2014 workers cannot easily move between industries, so specialisation can cause structural unemployment. It assumes <b>protectionism</b> away, yet partners may not reciprocate. And over-<b>specialisation</b> leaves a country exposed if demand or the price of its key export collapses.<br><br>So free trade brings real gains, but not unconditionally. The gains can be <b>unevenly distributed</b> \u2014 some industries and workers lose even as the country gains overall \u2014 and developing economies may need temporary protection to build new industries. On balance, free trade tends to raise total welfare, but whether it benefits a particular economy depends on its structure, factor mobility and whether the gains are shared, so it does not <em>always</em> benefit everyone.",
        why:"The benefits of free trade are the analysis; TRAPS hands you five ready-made evaluation points \u2014 the assumptions that make comparative advantage break down." },

      { cmd:"Explain", marks:5,
        context:"A country&apos;s terms of trade have improved over the past year.",
        text:"Explain the factors that can cause a country&apos;s terms of trade to change.",
        plans:[ { word:"PIED", hint:"what changes the terms of trade", points:[
            {l:"P", t:"Productivity (relative)"},
            {l:"I", t:"Inflation (relative)"},
            {l:"E", t:"Exchange rate"},
            {l:"D", t:"Demand & commodity prices"} ]} ],
        model:"The terms of trade measure the ratio of export prices to import prices. Several factors move it. Relative <b>productivity</b> growth changes the price at which a country can sell its exports. Relative <b>inflation</b> matters: if a country&apos;s inflation is higher than its partners&apos;, its export prices rise, improving the ratio in the short term. A change in the <b>exchange</b> rate alters export and import prices directly. And shifts in world <b>demand</b> and commodity prices \u2014 such as a rise in the price of a key export \u2014 improve the terms of trade. A favourable movement means each export now buys more imports.",
        why:"PIED names the four drivers of the terms of trade \u2014 exactly the points a 5-mark &apos;explain the factors&apos; answer needs." },

      { cmd:"Assess", marks:10,
        context:"A country is considering joining a regional free-trade bloc.",
        text:"Assess the benefits to a country of joining a trading bloc.",
        plans:[ { word:"BEEF", hint:"the benefits of joining a trading bloc", points:[
            {l:"B", t:"Bigger market (tariff-free access)"},
            {l:"E", t:"Efficiency (scale & specialisation)"},
            {l:"E", t:"Export-led growth"},
            {l:"F", t:"FDI attracted into the bloc"} ]} ],
        model:"Joining a trading bloc brings several benefits. Members gain a <b>bigger</b> market with tariff-free access, so firms can sell to many more consumers. This raises <b>efficiency</b>, as wider competition and larger markets let firms exploit economies of scale and specialise by comparative advantage. It can drive <b>export</b>-led growth, as easier access to partner markets boosts demand for the country&apos;s goods. And the bloc tends to attract <b>FDI</b>, as foreign firms locate inside it to gain tariff-free access to the whole market.<br><br>However, there are costs to weigh. Joining can cause trade diversion, switching imports from a cheaper world producer to a less efficient bloc member behind the common external tariff. Some domestic industries may not survive the extra competition, causing <b>structural unemployment</b>, and membership means a loss of sovereignty over trade and sometimes regulatory policy.<br><br>On balance, a trading bloc usually benefits a country through scale, efficiency and investment, but the net gain depends on whether <b>trade creation outweighs trade diversion</b> and on how well its industries cope with competition.",
        why:"BEEF lists the four benefits of a bloc for the analysis; the evaluation (trade diversion, lost sovereignty) is the standard counterweight." },

      { cmd:"Explain", marks:5,
        context:"The pound has appreciated against the dollar over recent months.",
        text:"Explain the factors that can cause a floating exchange rate to change.",
        plans:[ { word:"TICS", hint:"what moves a floating exchange rate", points:[
            {l:"T", t:"Trade flows (exports raise demand for the currency)"},
            {l:"I", t:"Interest rates (hot money)"},
            {l:"C", t:"Confidence & central-bank intervention"},
            {l:"S", t:"Speculation"} ]} ],
        model:"A floating exchange rate is set by the demand for and supply of a currency, and several factors move it. <b>Trade</b> flows matter: strong exports raise demand for the currency and push it up, while heavy imports raise its supply. Higher domestic <b>interest</b> rates attract inflows of &apos;hot money&apos; seeking better returns, raising demand for the currency and appreciating it (as the forex diagram shows). <b>Confidence</b> in the economy, and any central-bank intervention, shift demand. And <b>speculation</b> \u2014 traders buying or selling in anticipation of future movements \u2014 can move the rate sharply in the short run.",
        modelDiagram:"forex",
        why:"TICS captures the four drivers of a floating exchange rate \u2014 just what a 5-mark &apos;explain&apos; needs, with the forex diagram for the interest-rate point." },

      { cmd:"Discuss", marks:12,
        context:"A country is concerned that it is losing competitiveness against its trading partners.",
        text:"Discuss the factors that determine a country&apos;s international competitiveness.",
        plans:[ { word:"SPUR", hint:"what drives international competitiveness", points:[
            {l:"S", t:"Skills & productivity"},
            {l:"P", t:"Prices (relative inflation)"},
            {l:"U", t:"Unit labour costs"},
            {l:"R", t:"Regulation, tax & innovation"} ]} ],
        model:"A country&apos;s international competitiveness \u2014 its ability to sell goods and services abroad \u2014 depends on several factors. The most fundamental is <b>skills</b> and productivity: a more productive, better-educated workforce produces more per worker, lowering costs. Relative <b>prices</b> matter directly, since lower domestic inflation keeps exports attractively priced. <b>Unit</b> labour costs \u2014 wage costs per unit of output \u2014 capture both wages and productivity, so rising productivity can offset higher wages. And the wider environment of <b>regulation</b>, tax and innovation shapes competitiveness, as light regulation, competitive taxes and strong R&amp;D help firms compete.<br><br>These factors interact and their importance varies. In the <b>short run</b>, the exchange rate and relative inflation dominate \u2014 a depreciation can restore price competitiveness quickly but only temporarily, and may import inflation. In the <b>long run</b>, productivity and innovation are decisive, because they raise competitiveness without relying on a weak currency or low wages. Non-price competitiveness \u2014 quality, design and reliability \u2014 also matters and is not captured by costs alone.<br><br>On balance, competitiveness is driven by both price factors and non-price factors, but sustainable competitiveness rests mainly on raising productivity, since cost- and currency-based advantages are easily eroded.",
        why:"SPUR organises the determinants of competitiveness; the evaluation \u2014 short-run price factors vs long-run productivity \u2014 follows from contrasting the letters." },

      { cmd:"Assess", marks:12,
        context:"Income inequality in a developed economy has widened over the past two decades.",
        text:"Assess the main causes of income inequality.",
        plans:[ { word:"WEIGHT", hint:"the causes of inequality", points:[
            {l:"W", t:"Wages & skills"},
            {l:"E", t:"Education"},
            {l:"I", t:"Inheritance & wealth"},
            {l:"G", t:"Globalisation & technology"},
            {l:"H", t:"Health"},
            {l:"T", t:"Tax & benefit system"} ]} ],
        model:"Income inequality has several causes. Differences in <b>wages</b> and skills are central: skilled workers command far higher pay than the low-skilled. <b>Education</b> reinforces this, as unequal access to good schooling passes advantage down the generations. <b>Inheritance</b> and wealth widen the gap further, since wealth generates income and is concentrated and passed on. <b>Globalisation</b> and technology have raised the rewards to high-skilled workers and capital while squeezing routine jobs. Differences in <b>health</b> affect earning capacity. And the <b>tax</b> and benefit system is decisive \u2014 a less progressive system, or weaker benefits, leaves more inequality after redistribution (the Lorenz curve bows further from the line of equality).<br><br>These causes interact and their relative importance is debated. Globalisation and technology are often blamed for the recent widening in developed economies, but the tax-and-benefit system <b>arguably matters most</b> because governments can directly offset the others through it. Some inequality also reflects effort and risk-taking and may incentivise productivity, so <b>not all of it is seen as a problem</b>.<br><br>On balance, inequality stems from a cluster of reinforcing causes centred on skills, wealth and the rewards to globalisation \u2014 but because the state can redress much of it through taxes and benefits, the policy framework is as important as the underlying market forces.",
        modelDiagram:"lorenz",
        why:"WEIGHT names six causes of inequality for the analysis; the evaluation \u2014 which matters most, and the role of tax and benefits \u2014 falls out of the final letter." },

      { cmd:"Assess", marks:10,
        context:"A low-income country has struggled to raise living standards for decades.",
        text:"Assess the main barriers to economic development.",
        plans:[ { word:"CAGED", hint:"barriers that trap development", points:[
            {l:"C", t:"Corruption & weak governance / instability"},
            {l:"A", t:"Absence of capital \u2014 finance (savings gap)"},
            {l:"G", t:"Goods dependency (volatile primary exports)"},
            {l:"E", t:"Education & health gaps"},
            {l:"D", t:"Debt"} ]} ],
        model:"Developing economies face several reinforcing barriers. <b>Corruption</b> and weak governance \u2014 with political instability or conflict \u2014 deter investment and divert resources. An <b>absence</b> of capital, through the savings gap shown in the poverty-trap diagram, means too little is invested to raise productivity. <b>Goods</b> dependency \u2014 reliance on a few volatile primary-product exports \u2014 leaves the economy exposed to price swings. <b>Education</b> and health gaps keep human capital and productivity low. And <b>debt</b> diverts scarce revenue into interest payments rather than development.<br><br>These barriers interlock: low capital and poor education trap the economy in low productivity, which keeps incomes and saving low. <b>Which barrier matters most varies by country</b> \u2014 in a resource-dependent economy, commodity-price volatility may dominate, while elsewhere corruption is the binding constraint. Crucially, weak governance undermines every other factor, because aid, investment and reform all deliver little where institutions are poor.<br><br>On balance, development is held back not by one factor but by a cluster of reinforcing barriers, with the quality of governance often the <b>most fundamental</b>, since it determines whether the others can be overcome.",
        modelDiagram:"poverty-cycle",
        why:"CAGED captures every standard barrier to development in one word, and the poverty-trap link plus &apos;governance underlies the rest&apos; gives the evaluation." },

      { cmd:"Discuss", marks:15,
        context:"A government wants to manage its economy but is highly exposed to global trade and capital flows.",
        text:"Discuss the difficulties of using macroeconomic policy to manage an economy in a globalised world.",
        plans:[ { word:"RISKS", hint:"why macro policy is hard in a global economy", points:[
            {l:"R", t:"Risk & uncertainty about effects"},
            {l:"I", t:"Information gaps & time lags"},
            {l:"S", t:"Shocks \u2014 external/global"},
            {l:"K", t:"Knock-on effects \u2014 interconnectedness"},
            {l:"S", t:"Side-effects & conflicting objectives"} ]} ],
        model:"Managing an economy in a globalised world is difficult for several reasons. First, the effects of any policy are subject to <b>risk</b> and uncertainty and to long, variable time lags, so a stimulus may arrive too late or prove the wrong size. Second, policymakers face <b>information</b> gaps: data is incomplete and lagged, so they may misjudge the economy&apos;s position, such as the size of the output gap. Third, openness invites <b>shocks</b> \u2014 an oil-price spike, a pandemic or a foreign crisis can overwhelm domestic policy. Fourth, <b>knock-on</b> effects matter: in an open economy much of a fiscal stimulus leaks abroad as imports, weakening the multiplier, and policy abroad spills back home. Fifth, policies have <b>side</b>-effects and conflict with other objectives \u2014 tightening to curb inflation raises unemployment, while a stimulus can worsen the deficit and current account.<br><br>These difficulties are real but not insurmountable. Independent central banks with clear inflation targets reduce the uncertainty and information problems by anchoring expectations. Coordinated international action \u2014 as after the 2008 crisis \u2014 can tackle shocks no country could manage alone, though countries may instead pursue conflicting policies such as competitive devaluations. Supply-side policy sidesteps some demand-side conflicts, but <b>works only slowly</b>.<br><br>On balance, a government in a globalised world can still influence its economy, but it cannot fully control it. Effective policy means combining tools, accepting <b>uncertainty</b>, and recognising the limits set by openness and external shocks \u2014 the central lesson of studying the global economy.",
        why:"RISKS lists every difficulty of policy in a global context for the analysis, and the evaluation (independent central banks, coordination, supply-side) follows by asking how each can be eased." },
      { cmd:"Evaluate", marks:25, context:"The central bank has raised the base rate sharply over the past year in response to inflation well above its 2% target.",
        text:"Evaluate the likely microeconomic and macroeconomic effects of a significant rise in interest rates. (25)",
        plans:[ { word:"BASE", hint:"the transmission channels of a rate change", points:[
            {l:"B", t:"Borrowing \\u2014 dearer credit cuts C and I"},
            {l:"A", t:"Asset prices \\u2014 housing & shares fall, wealth effect"},
            {l:"S", t:"Saving \\u2014 better rewarded, spending delayed"},
            {l:"E", t:"Exchange rate \\u2014 appreciation hits exports"} ]} ],
        model:"A significant rise in interest rates \u2014 the cost of borrowing and the reward for saving \u2014 works through several channels at once, touching both individual markets and the whole economy.<br><br>At the macro level, dearer <b>borrowing</b> discourages credit-financed consumption and makes fewer investment projects profitable, while higher mortgage payments cut homeowners&apos; discretionary income. Higher rates also reward <b>saving</b>, so households delay spending. Both effects reduce consumption and investment, shifting aggregate demand left: demand-pull inflation eases, but real output growth slows and unemployment may rise. A higher rate also tends to attract foreign funds seeking better returns, so the <b>exchange rate</b> appreciates \u2014 exports become dearer abroad and imports cheaper, reinforcing the disinflation but squeezing exporters.<br><br>At the micro level, the effects are uneven across markets and firms. Interest-sensitive markets \u2014 housing, cars, big-ticket durables \u2014 contract most, while necessities are barely touched. Highly geared firms (those with large debts) see costs rise immediately and may shelve expansion or shed workers, whereas cash-rich firms are largely insulated. There are labour-market knock-ons too: as interest-sensitive industries contract, demand for labour in those sectors falls, and some of the unemployment that follows can become structural if workers&apos; skills are tied to the shrinking industries. <b>Asset prices</b> such as houses and shares tend to fall as borrowing dries up, reducing household wealth and confidence and further damping spending.<br><br>However, the size of these effects is far from certain. The <b>magnitude</b> depends on how indebted households and firms are and on how many mortgages are fixed-rate \u2014 with mostly fixed deals, the squeeze arrives only as deals expire. Monetary policy also operates with <b>long and variable time lags</b> of up to two years, so the full effect lands well after the decision, risking overkill if the economy is already slowing. Much depends on the <b>state of the economy</b>: starting from a boom with inflation well above target, cooling demand is precisely the aim; starting near recession, the same rise could tip the economy into contraction. The cause of inflation matters too \u2014 if inflation is <b>cost-push</b> (say, imported energy), higher rates do little to the cause while still imposing the costs. And the policy creates clear winners and losers among <b>stakeholders</b>: savers and importers gain while borrowers, exporters and indebted firms lose, raising distributional questions.<br><br>On balance, a significant rate rise will reliably cool demand and ease demand-pull inflation, but at a real cost to growth, employment and interest-sensitive sectors. The verdict depends mainly on the starting position of the economy and the source of the inflation: against an overheating, demand-driven boom it is the right tool boldly used, whereas against imported cost-push inflation in a fragile economy its costs may well exceed its benefits \u2014 which is why central banks usually prefer gradual rises, watching the data as each step feeds through. A measured pace lets policymakers judge the <b>magnitude</b> of the response in real time and stop before the cumulative squeeze does lasting damage.",
        why:"BASE walks the transmission mechanism channel by channel \\u2014 each letter is an analysis paragraph, and the evaluation then asks how strong each channel really is (debt levels, lags, the state of the economy, who wins and loses). It is the 25-mark architecture from the Essay Clinic applied to a synoptic question." }
    ]}
  ]
};

  "lras-keynesian": {

  "multiplier": {
    caption:"The multiplier effect, shown on a flat (spare-capacity) AS. The initial injection shifts AD from AD1 to AD2, raising output from Y1 to Y2. That money then becomes others' income and is partly re-spent over many further rounds — each one smaller than the last — which together shift AD on to AD3, raising output to Y3. Because there are many rounds, their combined effect (Y2 to Y3) can exceed the initial injection (Y1 to Y2), so the final rise (Y1 to Y3) is a multiple of the injection.",

  "rev-pricetaker": {
    caption:"A price taker (e.g. a firm in perfect competition) is so small it must accept the market price. Its demand curve is perfectly elastic (horizontal), so every unit sells at the same price: average revenue and marginal revenue are equal and constant (AR = MR = price). Total revenue therefore rises in proportion to output.",

const app = document.getElementById('app');
const topnav = document.getElementById('topnav');
document.getElementById('foot-edit').textContent = 'One file. Edit SITE_DATA to add content.';

/* ---------- PROGRESS (per-device, localStorage with graceful fallback) ---------- */
/* ---------- SEARCH (client-side index over all content) ---------- */
const Search = (function(){
  let index = null;
  function strip(s){ return (s||'').replace(/<[^>]+>/g,' ')
      .replace(/&amp;/g,'&').replace(/&apos;/g,"'").replace(/&#8212;/g,'\u2014')
      .replace(/&#8211;/g,'\u2013').replace(/&minus;/g,'\u2212').replace(/&pound;/g,'\u00a3')
      .replace(/&ndash;/g,'\u2013').replace(/&mdash;/g,'\u2014').replace(/&rsquo;/g,"'")
      .replace(/&lsquo;/g,"'").replace(/&hellip;/g,'\u2026').replace(/&[a-z]+;/g,' ')
      .replace(/\s+/g,' ').trim(); }
  function build(){
    if(index) return index;
    index = [];
    SITE_DATA.themes.forEach(th=>{
      (th.topics||[]).forEach(t=>{
        const body = strip(t.notes) + ' ' + (t.questions||[]).map(q=>strip(q.text)+' '+strip(q.model)).join(' ');
        index.push({
          type:'Topic', code:t.code,
          title:t.code+' '+t.title,
          sub:'Theme '+th.id+' \u00b7 '+th.title,
          hash:'#/topic/'+t.code,
          hay:(t.code+' '+t.title+' '+body).toLowerCase()
        });
      });
    });
    // technique + clinic + data + quant as destinations
    (SITE_DATA.technique||[]).forEach(t=>index.push({type:'Technique', title:strip(t.title), sub:'Exam Technique', hash:'#/technique', hay:(strip(t.title)+' '+strip(t.body)).toLowerCase()}));
    (SITE_DATA.quant&&SITE_DATA.quant.skills||[]).forEach(s=>index.push({type:'Quant skill', title:strip(s.name), sub:'Quantitative Skills', hash:'#/quant', hay:(strip(s.name)+' '+strip(s.note)+' '+strip(s.formula)).toLowerCase()}));
    (SITE_DATA.dataResponse||[]).forEach(c=>index.push({type:'Data response', title:strip(c.title), sub:'Data Response', hash:'#/data', hay:(strip(c.title)+' '+strip(c.extract)).toLowerCase()}));
    index.push({type:'Section', title:'25-mark essay clinic', sub:'Essay technique', hash:'#/essay', hay:'25 mark essay clinic judgement evaluation kaa structure paragraph timing'});
    index.push({type:'Section', title:'Mnemonics index', sub:'Every memory hook', hash:'#/mnemonics', hay:'mnemonics memory hooks index'});
    index.push({type:'Section', title:'Key terms glossary', sub:'Every definition A\u2013Z', hash:'#/glossary', hay:'glossary key terms definitions vocabulary a-z dictionary'});
    index.push({type:'Section', title:'About this site', sub:'What it is, privacy, contact', hash:'#/about', hay:'about privacy contact who made this site teachers affiliated edexcel'});
    return index;
  }
  function query(q){
    q=(q||'').trim().toLowerCase(); if(q.length<2) return [];
    const terms=q.split(/\s+/);
    const out=[];
    build().forEach(item=>{
      let score=0, ok=true;
      terms.forEach(term=>{
        const inTitle=item.title.toLowerCase().indexOf(term)>=0;
        const inHay=item.hay.indexOf(term)>=0;
        if(!inHay && !inTitle){ ok=false; }
        if(inTitle) score+=5;
        if(inHay) score+=1;
      });
      if(ok){ if(item.title.toLowerCase().startsWith(q)) score+=10; out.push({item,score}); }
    });
    out.sort((a,b)=>b.score-a.score);
    return out.slice(0,12).map(x=>x.item);
  }
  return { query, build };
})();

function openSearch(){
  let ov=document.getElementById('searchOverlay');
  if(!ov){
    ov=document.createElement('div');
    ov.id='searchOverlay';
    ov.className='search-overlay';
    ov.innerHTML=`<div class="search-box" role="dialog" aria-label="Search">
      <input id="searchInput" type="text" placeholder="Search topics, notes, questions\u2026" autocomplete="off" aria-label="Search query">
      <div id="searchResults" class="search-results"><div class="search-hint">Type at least two letters. Try \u201celasticity\u201d, \u201cmonopoly\u201d or a topic code like \u201c3.4.5\u201d.</div></div>
    </div>`;
    document.body.appendChild(ov);
    ov.addEventListener('click', e=>{ if(e.target===ov) closeSearch(); });
    const input=document.getElementById('searchInput');
    input.addEventListener('input', ()=>renderSearchResults(input.value));
    input.addEventListener('keydown', e=>{
      if(e.key==='Escape') closeSearch();
      if(e.key==='Enter'){ const first=document.querySelector('#searchResults a'); if(first){ closeSearch(); go(first.getAttribute('href')); } }
    });
  }
  ov.classList.add('open');
  const inp=document.getElementById('searchInput'); inp.value=''; renderSearchResults('');
  setTimeout(()=>inp.focus(),30);
}
function closeSearch(){ const ov=document.getElementById('searchOverlay'); if(ov) ov.classList.remove('open'); }
function renderSearchResults(q){
  const box=document.getElementById('searchResults'); if(!box) return;
  q=(q||'').trim();
  if(q.length<2){ box.innerHTML=`<div class="search-hint">Type at least two letters. Try \u201celasticity\u201d, \u201cmonopoly\u201d or a topic code like \u201c3.4.5\u201d.</div>`; return; }
  const res=Search.query(q);
  if(!res.length){ box.innerHTML=`<div class="search-hint">No matches for \u201c${q.replace(/</g,'&lt;')}\u201d.</div>`; return; }

var refreshProgressUI = null;
const Progress = (function(){
  const KEY = 'tme_progress_v1';
  let mem = {};            // in-memory fallback if storage is unavailable
  let usable = true;
  try {
    const t = '__tme_test__';
    window.localStorage.setItem(t,'1'); window.localStorage.removeItem(t);
  } catch(e){ usable = false; }
  function readAll(){
    if(!usable) return mem;
    try { return JSON.parse(window.localStorage.getItem(KEY) || '{}'); }
    catch(e){ return {}; }
  }
  function writeAll(obj){
    if(!usable){ mem = obj; return; }
    try { window.localStorage.setItem(KEY, JSON.stringify(obj)); }
    catch(e){ usable = false; mem = obj; }
  }
  return {
    get: function(code){ return readAll()[code] || null; },           // 'red' | 'amber' | 'green' | null
    set: function(code, level){
      const all = readAll();
      if(level) all[code] = level; else delete all[code];
      writeAll(all);
    },
    all: function(){ return readAll(); },
    counts: function(codes){
      const all = readAll(); const c = {red:0, amber:0, green:0, none:0};
      codes.forEach(code=>{ const v = all[code]; if(v==='red')c.red++; else if(v==='amber')c.amber++; else if(v==='green')c.green++; else c.none++; });
      return c;
    },
    reset: function(){ writeAll({}); },
    available: function(){ return usable; }
  };
})();

/* Build a small RAG (red/amber/green) confidence selector for a topic code. */
function ragControl(code){
  const cur = Progress.get(code);
  const dot = (lvl,lbl)=>`<button class="rag-dot rag-${lvl}${cur===lvl?' on':''}" title="${lbl}" aria-label="${lbl}" onclick="event.preventDefault();event.stopPropagation();setRag('${code}','${lvl}',this)"></button>`;
  return `<span class="rag" data-code="${code}">${dot('red','Not confident')}${dot('amber','Getting there')}${dot('green','Confident')}</span>`;
}
/* Click handler used inline by the RAG dots. Toggles level off if re-clicked. */
function setRag(code, level, el){
  const cur = Progress.get(code);
  const next = (cur===level) ? null : level;
  Progress.set(code, next);
  const wrap = el.parentNode;
  wrap.querySelectorAll('.rag-dot').forEach(d=>d.classList.remove('on'));
  if(next) el.classList.add('on');
  // refresh any visible progress summaries without a full reload
  if(typeof refreshProgressUI==='function') refreshProgressUI();
}

/* ---------- GLOSSARY (auto-generated from every defined key term in the notes) ---------- */
function collectGlossary(){
  function strip(s){return (s||'').replace(/<[^>]+>/g,'').replace(/&#8212;/g,'\u2014').replace(/&#8211;/g,'\u2013')
    .replace(/&apos;/g,"'").replace(/&amp;/g,'&').replace(/&#163;/g,'\u00a3').replace(/&#247;/g,'\u00f7')
    .replace(/&#215;/g,'\u00d7').replace(/&#8722;/g,'\u2212').replace(/&#8226;/g,'\u2022')
    .replace(/&gt;/g,'>').replace(/&lt;/g,'<').replace(/\s+/g,' ').trim();}
  const entries=[]; const seen=new Set();
  SITE_DATA.themes.forEach(th=>th.topics.forEach(t=>{
    const notes=t.notes||'';
    const re=/<span class="keyword">([\s\S]*?)<\/span>/g; let m;
    while((m=re.exec(notes))){
      const term=strip(m[1]);
      const key=term.toLowerCase();
      if(!term || seen.has(key)) continue;
      seen.add(key);
      const after=notes.slice(m.index);
      const para=after.slice(0, after.indexOf('</p>')>=0 ? after.indexOf('</p>') : 400);
      let sent=strip(para)
        .replace(/\s*\((shown below|see diagram|see the Diagram tab|see the poverty-trap diagram, below)\)\s*/gi,' ')
        .replace(/\s+/g,' ').trim();
      const cut=sent.search(/\.( [A-Z(]|$)/);
      if(cut>20) sent=sent.slice(0,cut+1);
      if(sent.length>270) sent=sent.slice(0,267)+'\u2026';
      if(sent) sent=sent.charAt(0).toUpperCase()+sent.slice(1);
      entries.push({term, def:sent, code:t.code, title:t.title});
    }
  }));
  entries.sort((a,b)=>a.term.toLowerCase().localeCompare(b.term.toLowerCase()));
  return entries;
}
function viewGlossary(){
  const entries=collectGlossary();
  const groups={}; const letters=[];
  entries.forEach(e=>{
    const L=e.term[0].toUpperCase();
    if(!groups[L]){ groups[L]=[]; letters.push(L); }

/* ---------- MNEMONICS (auto-generated from every mnemonic in SITE_DATA) ---------- */
function viewMnemonics(){
  const out=[]; const seen=new Set();
  function strip(s){ return (s||'').replace(/<[^>]+>/g,'')
      .replace(/&amp;/g,'&').replace(/&#8722;/g,'\u2212').replace(/&#8211;/g,'\u2013')
      .replace(/&#8212;/g,'\u2014').replace(/&#215;/g,'\u00d7').replace(/&#163;/g,'\u00a3')
      .replace(/&apos;/g,"'").replace(/&gt;/g,'>').replace(/&lt;/g,'<').replace(/\s+/g,' ').trim(); }
  function shortKw(t){
    t=strip(t);
    let m=t.split(/\s+[\u2014\u2013-]\s+|:\s+|\s+\(/)[0];
    let w=m.split(/\s+/); if(w.length>7) w=w.slice(0,7);
    return w.join(' ');
  }
  function addQ(m, ctx){
    if(!m||!m.word||!m.points) return;
    const key=m.word.trim()+'@'+(ctx.topic||''); if(seen.has(key)) return; seen.add(key);
    out.push({theme:ctx.theme, word:m.word.trim(), ctx:strip(m.hint)||ctx.topic,
      letters:m.points.map(p=>({l:strip(p.l), w:shortKw(p.t)}))});
  }
  function addNotes(notes, ctx){
    if(typeof notes!=='string' || notes.indexOf('class="mnemonic"')<0) return;
    const parts=notes.split('<div class="word">');
    for(let i=1;i<parts.length;i++){
      const seg=parts[i];
      const wm=seg.match(/^([^<]*)/); const word=wm?strip(wm[1]):'';
      const key=word+'@'+(ctx.topic||'');
      if(!word || seen.has(key)) continue;
      const hm=seg.match(/<span class="hint">([\s\S]*?)<\/span>/);
      let hint=hm?strip(hm[1]).replace(/^\(|\)$/g,'').trim():'';
      const ulEnd=seg.indexOf('</ul>'); const scope=ulEnd>=0?seg.slice(0,ulEnd):seg;
      const letters=[]; const liR=/<li>([\s\S]*?)<\/li>/g; let lr;
      while((lr=liR.exec(scope))){
        const li=lr[1];
        const ll=li.match(/<span class="l">([\s\S]*?)<\/span>/);
        const sk=li.match(/<strong>([\s\S]*?)<\/strong>/);
        if(ll) letters.push({l:strip(ll[1]),
          w: sk?strip(sk[1]):shortKw(li.replace(/<span class="l">[\s\S]*?<\/span>/,''))});
      }
      if(letters.length){ seen.add(key); out.push({theme:ctx.theme, word:word, ctx:hint||ctx.topic, letters}); }
    }
  }
  function walk(node, ctx){
    if(Array.isArray(node)){ node.forEach(n=>walk(n,ctx)); return; }
    if(node && typeof node==='object'){
      let c=ctx;
      if(node.title && node.code) c={theme:ctx.theme, topic:node.code+' '+node.title};
      if(typeof node.notes==='string') addNotes(node.notes, c);
      if(typeof node.body==='string') addNotes(node.body, c);
      if(node.mnemonic) addQ(node.mnemonic, c);
      for(const k in node){ if(k!=='mnemonic') walk(node[k], c); }
    }
  }
  SITE_DATA.themes.forEach(th=> walk(th, {theme:'Theme '+th.id+' \u00b7 '+th.title, topic:''}));
  if(SITE_DATA.technique) walk(SITE_DATA.technique, {theme:'Skills & technique', topic:''});

  const groups=[]; const gmap={};
  out.forEach(m=>{ if(!gmap[m.theme]){ gmap[m.theme]=[]; groups.push(m.theme); } gmap[m.theme].push(m); });
  let mi=0;
  const body = groups.map(g=>`
    <h2 style="font-family:'Fraunces',serif;font-size:1.35rem;margin:1.8rem 0 .6rem;color:var(--ink)">${g}</h2>
    ${gmap[g].map(m=>{
      const uid='mn'+(mi++);
      return `
      <div class="mn-row" id="${uid}">
        <div class="mn-head">
        <span class="mn-word">${m.word}</span>
        ${m.ctx?`<span class="mn-ctx">${m.ctx}</span>`:''}
        <button class="mn-reveal" onclick="(function(b){var r=document.getElementById('${uid}');r.classList.toggle('show');b.textContent=r.classList.contains('show')?'Hide':'Reveal';})(this)">Reveal</button>
        </div>
        <div class="mn-letters">
          ${m.letters.map(x=>`<span class="mn-li"><b>${x.l}</b>&nbsp;<span class="mn-kw">${x.w}</span></span>`).join(' <span style="color:var(--ink-faint)">\u00b7</span> ')}
        </div>
      </div>`;
    }).join('')}`).join('');

  app.innerHTML = `<div class="view">
    <div class="crumb"><a href="#/home">Home</a> \u00b7 Mnemonics</div>
    <h1 style="font-size:clamp(2rem,5vw,3rem)">Mnemonics <em style="font-style:italic;color:var(--oxblood)">index</em></h1>
    <p class="lede" style="margin-bottom:.7rem">Every memory hook used across the site, in one place. Each line shows the word, what it is for, and the key term behind each letter.</p>
    <div class="mn-toolbar">
      <span style="color:var(--ink-faint);font-size:.9rem">${out.length} mnemonics</span>
      <label class="mn-toggle"><input type="checkbox" id="mnQuiz" onchange="document.getElementById('mnList').classList.toggle('quiz', this.checked)"> <span><b>Test me</b> &mdash; hide the keywords, then reveal each to check</span></label>
    </div>
    <div id="mnList">${body}</div>
    ${pageNav('#/mnemonics')}
  </div>`;
}

    <button class="reveal-btn" onclick="(function(b){var m=document.getElementById('${uid}');m.classList.toggle('open');b.textContent=m.classList.contains('open')?'Hide model answer':'Show model answer';})(this)">Show model answer</button>
    <div class="ms" id="${uid}">
      <div class="model"><h5 class="kaa">Model answer</h5><div class="model-box">${q.model}${mdgm}</div></div>
      ${why}
    </div>
  </div>`;
}

/* ---------- ROUTER (works both on GitHub Pages and in the in-app preview) ---------- */
let currentHash = (location.hash && location.hash.indexOf('#/')===0) ? location.hash : '#/home';

function pageSeq(){
  const seq=[{hash:'#/home', label:'Home'}];
  SITE_DATA.themes.slice().sort(function(a,b){return a.id-b.id;}).forEach(function(th){
    seq.push({hash:'#/theme/'+th.id, label:'Theme '+th.id+': '+th.title});
    th.topics.slice().sort(codeSort).filter(isReady).forEach(function(t){
      seq.push({hash:'#/topic/'+t.code, label:t.code+' \u00b7 '+t.title});
    });
  });
  seq.push({hash:'#/technique', label:'Exam Technique'});
  seq.push({hash:'#/essay', label:'25-mark Essay Clinic'});
  seq.push({hash:'#/data', label:'Data Response'});
  seq.push({hash:'#/quant', label:'Quant Skills'});
  seq.push({hash:'#/mnemonics', label:'Mnemonics'});
  seq.push({hash:'#/glossary', label:'Key Terms Glossary'});
  seq.push({hash:'#/papers', label:'Past Papers'});
  return seq;
}
function pageNav(curHash){
  if(curHash==='#/home') return '';
  const seq=pageSeq();
  const i=seq.findIndex(function(p){return p.hash===curHash;});
  if(i<0) return '';
  const prev=i>0?seq[i-1]:null, next=i<seq.length-1?seq[i+1]:null;
  const mk=function(p,dir){ return p
    ? `<a class="pn ${dir}" href="${p.hash}"><span class="pn-dir">${dir==='prev'?'\u2190 Previous':'Next \u2192'}</span><span class="pn-lbl">${p.label}</span></a>`
    : `<span class="pn ghost"></span>`; };
  return `<nav class="pagenav">${mk(prev,'prev')}${mk(next,'next')}</nav>`;
}
function expandNoteDiagrams(s){
  return (s||'').replace(/\{\{diagram:([a-z0-9\-]+)\}\}/g, function(m,id){
    var d=DIAGRAMS[id];
    return d ? `<figure class="diagram" style="margin:1.4rem auto;background:var(--paper)">${d.svg}<figcaption>${d.caption}</figcaption></figure>` : '';
  });
}
function render(h){
  currentHash = h;
  renderNav(h);
  try{ window.scrollTo({top:0,behavior:'auto'}); }catch(e){ window.scrollTo(0,0); }
  const parts = h.replace('#/','').split('/');
  if(parts[0]==='theme') viewTheme(parts[1]);
  else if(parts[0]==='topic') viewTopic(parts.slice(1).join('/'));
  else if(parts[0]==='technique') viewTechnique();
  else if(parts[0]==='essay') viewEssay();
  else if(parts[0]==='data') viewData();
  else if(parts[0]==='quant') viewQuant();
  else if(parts[0]==='mnemonics') viewMnemonics();
  else if(parts[0]==='glossary') viewGlossary();
  else if(parts[0]==='about') viewAbout();
  else if(parts[0]==='papers') viewPastPapers();
  else viewHome();
}

function go(h){
  if(!h || h.indexOf('#/')!==0) h = '#/home';
  /* Best-effort address-bar update for real browsers (enables the back button
     and shareable links). Safely ignored where the sandbox blocks it. */
  try{ if(location.hash !== h) location.hash = h; }catch(e){}
  render(h);
}

/* Intercept clicks on internal links and route in code, so navigation works
   even where the preview sandbox blocks address changes or never fires
   the 'hashchange' event. */
document.addEventListener('click', function(e){
  const a = e.target.closest ? e.target.closest('a[href^="#/"]') : null;
  if(a){ e.preventDefault(); if(typeof closeSearch==='function') closeSearch(); go(a.getAttribute('href')); }
});

/* Search: open via header button or the "/" key; close with Escape. */
(function(){
  const btn=document.getElementById('searchBtn');
  if(btn) btn.addEventListener('click', openSearch);
  try{ var fy=document.getElementById('foot-year'); if(fy) fy.textContent=new Date().getFullYear(); }catch(e){}
  document.addEventListener('keydown', function(e){
    const tag=(e.target&&e.target.tagName)||'';
    if(e.key==='/' && tag!=='INPUT' && tag!=='TEXTAREA'){ e.preventDefault(); openSearch(); }
  });
})();

/* Browser back/forward + deep links on the hosted site. */
window.addEventListener('hashchange', function(){
  const h = (location.hash && location.hash.indexOf('#/')===0) ? location.hash : '#/home';
  if(h !== currentHash) render(h);
});

render(currentHash);
</script>
